<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://dl.dropboxusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070910;
      --bg-1: #0b0e17;
      --panel: rgba(255,255,255,0.038);
      --panel-2: rgba(255,255,255,0.055);
      --panel-hi: rgba(255,255,255,0.085);
      --glass: rgba(13,17,27,0.72);
      --card-border: rgba(255,255,255,0.07);
      --card-border-2: rgba(255,255,255,0.11);
      --ink: #eef1f8;
      --ink-dim: #c7cdda;
      --muted: #8b93a7;
      --muted-2: #5c6478;
      --line: rgba(255,255,255,0.07);
      --accent: #2dd4bf;
      --accent-2: #5b9df6;
      --accent-3: #818cf8;
      --grad: linear-gradient(115deg, #2dd4bf 0%, #5b9df6 55%, #818cf8 100%);
      --grad-soft: linear-gradient(115deg, rgba(45,212,191,.18), rgba(129,140,248,.18));
      --ok: #34d399;
      --ok-soft: rgba(52,211,153,.13);
      --warn: #fbbf24;
      --warn-soft: rgba(251,191,36,.13);
      --bad: #fb7185;
      --bad-soft: rgba(251,113,133,.13);
      --field: rgba(255,255,255,0.055);
      --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -16px rgba(0,0,0,.7);
      --shadow-2: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 56px -28px rgba(0,0,0,.78);
      --glow: 0 8px 24px -8px rgba(45,212,191,.5);
      --r-sm: 9px;
      --r-md: 12px;
      --r-lg: 16px;
      --header-h: 64px;
      --side-w: 248px;
      --side-w-collapsed: 76px;
      font-family: "Zen Kaku Gothic New", "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-display: "Outfit", "Zen Kaku Gothic New", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 4% -10%, rgba(45,212,191,.14), transparent 58%),
        radial-gradient(1000px 620px at 106% -8%, rgba(129,140,248,.16), transparent 56%),
        radial-gradient(700px 500px at 80% 120%, rgba(91,157,246,.10), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(140%);
      border-bottom: 1px solid var(--line);
    }
    .menu-toggle {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      transition: .16s;
    }
    .menu-toggle:hover { background: var(--panel-hi); color: var(--ink); }
    .menu-toggle svg { width: 20px; height: 20px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo {
      width: 38px; height: 38px; flex: none;
      border-radius: 11px;
      background: var(--grad);
      display: grid; place-items: center;
      box-shadow: var(--glow);
    }
    .logo svg { width: 21px; height: 21px; display: block; }
    h1 {
      margin: 0;
      font: 800 18px/1.1 var(--font-display);
      letter-spacing: 0;
      background: linear-gradient(90deg, var(--ink), var(--ink-dim));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: var(--muted); font-size: 11.5px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .header-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    button {
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 8px 13px;
      font: inherit;
      font-weight: 700;
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
    }
    button:hover { background: var(--panel-hi); color: var(--ink); }
    button:disabled { opacity: .55; cursor: wait; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    .header-control select {
      width: auto;
      min-width: 96px;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    input:focus {
      outline: none;
      border-color: rgba(45,212,191,0.55);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.14);
    }
    .app {
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr);
      min-height: 100vh;
      padding-top: var(--header-h);
      transition: grid-template-columns .2s ease;
    }
    body.menu-collapsed .app {
      grid-template-columns: var(--side-w-collapsed) minmax(0, 1fr);
    }
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--side-w);
      height: calc(100vh - var(--header-h));
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(18px);
      padding: 16px 12px;
      transition: width .2s ease;
    }
    body.menu-collapsed .sidebar { width: var(--side-w-collapsed); }
    .brand-sub {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-top: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(52,211,153,.3);
      background: var(--ok-soft);
      color: var(--ok);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .03em;
    }
    .live-dot i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(52,211,153,.55);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
      70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }
    .nav-group { display: grid; gap: 4px; }
    .nav-label {
      padding: 8px 10px 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .nav-item {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink-dim);
      box-shadow: none;
      text-align: left;
      transition: .14s;
      font-weight: 700;
    }
    .nav-item:hover { background: var(--panel-2); color: var(--ink); }
    .nav-item.active {
      background: var(--grad-soft);
      border-color: rgba(45,212,191,0.32);
      color: var(--ink);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 50%;
      width: 3px;
      height: 22px;
      border-radius: 0 3px 3px 0;
      background: var(--grad);
      transform: translateY(-50%);
    }
    .nav-parent {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      text-align: left;
      font-weight: 800;
      transition: .14s;
    }
    .nav-parent:hover {
      background: var(--panel-2);
    }
    .nav-caret {
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1;
      transition: transform .18s ease;
    }
    .nav-parent[aria-expanded="false"] .nav-caret {
      transform: rotate(-90deg);
    }
    .nav-subgroup {
      display: grid;
      gap: 4px;
      margin: 2px 0 8px 12px;
      padding-left: 13px;
      border-left: 1px solid var(--card-border-2);
    }
    .nav-subgroup.collapsed { display: none; }
    .nav-item.sub {
      padding: 8px 11px;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 10px;
      font-size: 13px;
    }
    .nav-item.sub .nav-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      font-size: 10px;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--ink-dim);
      font-size: 12px;
      font-weight: 800;
      font-family: var(--font-display);
    }
    .nav-item.active .nav-icon {
      background: rgba(45,212,191,.18);
      color: var(--accent);
    }
    .nav-badge {
      font: 700 10px var(--font-mono);
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.menu-collapsed .nav-item {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-parent {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-caret { display: none; }
    body.menu-collapsed .nav-subgroup {
      margin-left: 0;
      padding-left: 0;
      border-left: 0;
    }
    body.menu-collapsed .nav-text,
    body.menu-collapsed .nav-label {
      display: none;
    }
    .content { min-width: 0; grid-column: 2; }
    .page { animation: fade .26s ease; }
    .page.hidden { display: none; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .page-wrap { padding: 20px; max-width: 1320px; margin: 0 auto; }
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
    .page-title { margin: 0; font: 800 22px/1.15 var(--font-display); letter-spacing: 0; }
    .page-desc { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; margin-bottom: 18px; }
    .kpi {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 16px 16px 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .kpi::after {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--grad);
      opacity: .85;
    }
    .kpi-top { display: flex; align-items: center; justify-content: space-between; }
    .kpi-label { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .kpi-ico { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: var(--grad-soft); color: var(--accent); }
    .kpi-ico svg { width: 16px; height: 16px; }
    .kpi-val { font: 800 30px/1 var(--font-display); margin: 12px 0 6px; font-variant-numeric: tabular-nums; }
    .kpi-val small { font-size: 14px; color: var(--muted); font-weight: 700; }
    .kpi-foot { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--muted); }
    .trend { display: inline-flex; align-items: center; gap: 3px; font-weight: 800; padding: 1px 6px; border-radius: 6px; }
    .trend.up { color: var(--ok); background: var(--ok-soft); }
    .trend.down { color: var(--bad); background: var(--bad-soft); }
    .trend.flat { color: var(--muted); background: var(--panel-2); }
    .trend svg { width: 11px; height: 11px; }
    .spark { display: block; width: 100%; height: 30px; margin-top: 8px; overflow: visible; }
    .dash-grid { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 16px; align-items: start; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .card-title { display: flex; align-items: center; gap: 9px; font: 800 14px var(--font-display); }
    .card-title .bar { width: 4px; height: 16px; border-radius: 2px; background: var(--grad); }
    .card-body { padding: 14px 16px; }
    .toolbar { display: flex; gap: 10px; align-items: center; padding: 0 16px 12px; }
    .search-wrap { position: relative; flex: 1; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted-2); }
    input.search { padding-left: 36px; border-color: var(--card-border-2); background: var(--panel-2); }
    .seg { display: inline-flex; padding: 3px; gap: 2px; border: 1px solid var(--card-border-2); border-radius: var(--r-sm); background: var(--panel-2); }
    .seg button { border: 0; border-radius: 6px; padding: 7px 12px; font: 700 12px var(--font-display); background: transparent; color: var(--muted); box-shadow: none; }
    .seg button.on { background: var(--panel-hi); color: var(--ink); }
    .dev-list { display: grid; gap: 10px; }
    .dev {
      position: relative;
      display: grid;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 13px 14px;
      background: var(--panel-2);
      transition: .16s;
    }
    .dev:hover { border-color: var(--card-border-2); background: var(--panel-hi); transform: translateY(-1px); }
    .dev.off { opacity: .82; }
    .dev-head { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px; align-items: center; }
    .dev-name { font: 800 14.5px var(--font-display); overflow-wrap: anywhere; }
    .dev-id { font: 600 11px var(--font-mono); color: var(--muted); margin-top: 1px; }
    .dev-actions { display: flex; align-items: center; gap: 8px; justify-self: end; }
    .dev-meta { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .dev-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-2); }
    .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; }
    .metric { border: 1px solid var(--line); border-radius: 7px; padding: 8px 9px; background: var(--panel); }
    .metric-k { color: var(--muted); font-size: 10.5px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .metric-k svg { width: 12px; height: 12px; opacity: .8; }
    .metric-v { font: 800 17px/1.1 var(--font-display); font-variant-numeric: tabular-nums; margin-top: 3px; }
    .metric-v u { font-size: 11px; color: var(--muted); font-weight: 700; text-decoration: none; margin-left: 1px; }
    .mbar { height: 3px; border-radius: 99px; background: var(--panel-hi); margin-top: 6px; overflow: hidden; }
    .mbar > i { display: block; height: 100%; border-radius: 99px; background: var(--grad); }
    .batt {
      --bc: #94a3b8;
      --bp: 0%;
      position: relative;
      display: inline-grid;
      place-items: center;
      flex: none;
      width: 52px;
      height: 23px;
      border: 1.5px solid var(--bc);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font: 800 10.5px var(--font-mono);
      overflow: visible;
    }
    .batt::after { content: ""; position: absolute; right: -5px; top: 6px; width: 3.5px; height: 9px; border-radius: 0 3px 3px 0; background: var(--bc); }
    .batt > i { position: absolute; left: 2.5px; top: 2.5px; bottom: 2.5px; width: var(--bp); max-width: calc(100% - 5px); border-radius: 3px; background: var(--bc); opacity: .85; }
    .batt > span { position: relative; z-index: 1; color: #06111f; text-shadow: 0 1px 1px rgba(255,255,255,.5); }
    .batt.b-hi { --bc: var(--ok); }
    .batt.b-mid { --bc: var(--warn); }
    .batt.b-lo { --bc: var(--bad); }
    .batt.b-un { --bc: #94a3b8; }
    .batt.sm { width: 44px; height: 18px; border-width: 1.25px; font-size: 8.5px; }
    .batt.sm::after { right: -4px; top: 5px; width: 2.5px; height: 7px; }
    .side-stack { display: grid; gap: 16px; position: sticky; top: calc(var(--header-h) + 20px); }
    .legend-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
    .legend-row:last-child { border-bottom: 0; }
    .legend-row .k { display: flex; align-items: center; gap: 8px; color: var(--ink-dim); }
    .legend-row .k i { width: 9px; height: 9px; border-radius: 3px; }
    .legend-row .v { font: 700 13px var(--font-mono); }
    .ring-wrap { display: flex; align-items: center; gap: 16px; }
    .ring-big { width: 92px; height: 92px; flex: none; }
    .ring-center { font: 800 22px var(--font-display); fill: var(--ink); }
    .ring-sub { font: 600 9px var(--font-display); fill: var(--muted); }
    .bar-list { display: grid; gap: 11px; }
    .bar-item .bar-top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
    .bar-item .bar-top b { font-weight: 700; }
    .bar-item .bar-top span { color: var(--muted); font: 700 11px var(--font-mono); }
    .bar-track { height: 7px; border-radius: 99px; background: var(--panel-hi); overflow: hidden; }
    .bar-track > i { display: block; height: 100%; border-radius: 99px; background: var(--grad); }
    .map-page, .devices-page, .camera-page { min-height: calc(100vh - var(--header-h)); }
    .placeholder {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 12px;
      min-height: 440px;
      border: 1px dashed var(--card-border-2);
      border-radius: var(--r-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      padding: 40px;
    }
    .placeholder h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .placeholder h2::before { display: none; }
    .placeholder p {
      margin: 0;
      color: var(--muted);
      max-width: 560px;
    }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 24;
      background: rgba(0,0,0,0.45);
      display: none;
    }
    #stageWrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      background: var(--panel);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      padding: 20px;
      box-shadow: var(--shadow-2);
    }
    #stage {
      position: relative;
      width: 100%;
      max-width: 1320px;
      aspect-ratio: var(--aspect, 1.5);
      background-color: #0d1422;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: var(--r-md);
      box-shadow: 0 24px 60px -24px rgba(0,0,0,.75), 0 0 0 1px var(--line);
      overflow: hidden;
    }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #8a94a8;
      text-align: center;
      padding: 24px;
      font-size: 13px;
    }
    .widget {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 142px;
      max-width: 220px;
      padding: 10px 11px;
      border-radius: var(--r-sm);
      border: 1px solid rgba(15,23,42,.1);
      background: rgba(255,255,255,.97);
      color: #141a26;
      box-shadow: 0 14px 32px -10px rgba(8,12,20,.55), 0 2px 6px rgba(8,12,20,.2);
      backdrop-filter: blur(4px);
      user-select: none;
    }
    .widget::before {
      content: "";
      position: absolute;
      left: 11px;
      right: 11px;
      top: 0;
      height: 2.5px;
      border-radius: 0 0 3px 3px;
      background: var(--grad);
    }
    .widget.off { opacity: .75; }
    .widget-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
    }
    .widget-title {
      color: #5a6680;
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-lines { display: grid; gap: 4px; margin-top: 7px; }
    .metric-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      align-items: baseline;
    }
    .metric-name {
      color: #7a8498;
      font-size: 9.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-value {
      font: 800 16px/1 var(--font-display);
      color: #141a26;
      font-variant-numeric: tabular-nums;
    }
    .widget-time { color: #94a0b4; font: 600 9px var(--font-mono); margin-top: 6px; }
    .widget-battery {
      justify-self: end;
    }
    .map-point {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      padding: 0;
      border-radius: 50%;
      border: 3px solid #ffffff;
      background: var(--accent);
      box-shadow: 0 7px 18px -7px rgba(0,0,0,.65), 0 0 0 0 rgba(45,212,191,.5);
      animation: pulse 2.4s infinite;
      cursor: pointer;
    }
    .map-point.off {
      background: var(--bad);
      animation: none;
      box-shadow: 0 7px 18px -7px rgba(0,0,0,.65), 0 0 0 2px rgba(251,113,133,.3);
    }
    .map-popup {
      position: absolute;
      transform: translate(-50%, calc(-100% - 18px));
      z-index: 6;
    }
    .map-popup::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      background: rgba(255,255,255,0.96);
      border-right: 1px solid rgba(15,23,42,0.12);
      border-bottom: 1px solid rgba(15,23,42,0.12);
    }
    aside.stack,
    section {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    aside.stack { overflow: auto; }
    .stack { display: grid; gap: 12px; }
    h2 {
      margin: 0 0 10px;
      font: 800 14px/1.2 var(--font-display);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: "";
      width: 4px;
      height: 14px;
      border-radius: 2px;
      background: var(--grad);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 10px;
      background: var(--panel-2);
    }
    .stat-label { color: var(--muted); font-size: 10px; font-weight: 800; letter-spacing: .04em; }
    .stat-value { font: 800 24px/1.1 var(--font-display); font-variant-numeric: tabular-nums; }
    .device {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 13px 14px 12px;
      background: var(--panel-2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      transition: .16s;
    }
    .device:hover { border-color: var(--card-border-2); background: var(--panel-hi); transform: translateY(-1px); }
    .device + .device { margin-top: 8px; }
    .device-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .device-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      justify-self: end;
      margin-left: auto;
    }
    .device-name { font: 800 14.5px/1.25 var(--font-display); overflow-wrap: anywhere; }
    .device-meta { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      justify-content: center;
      min-width: 56px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(52,211,153,.3);
      color: var(--ok);
      background: var(--ok-soft);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .pill.off {
      color: var(--bad);
      border-color: rgba(251,113,133,.3);
      background: var(--bad-soft);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 4px 8px;
      color: var(--ink-dim);
      background: var(--panel);
      font-size: 11px;
    }
    .battery-badge {
      --battery-color: #94a3b8;
      position: relative;
      display: inline-grid;
      place-items: center;
      flex: none;
      width: 48px;
      height: 22px;
      border: 1.5px solid var(--battery-color);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(241,245,249,0.95));
      color: #0f172a;
      font: 800 10px/1 "Outfit", sans-serif;
      overflow: visible;
      box-shadow: 0 6px 14px -8px rgba(15,23,42,0.55), inset 0 1px 0 rgba(255,255,255,0.95);
    }
    .battery-badge::after {
      content: "";
      position: absolute;
      right: -4.5px;
      top: 6px;
      width: 3.5px;
      height: 9px;
      border-radius: 0 3px 3px 0;
      background: var(--battery-color);
    }
    .battery-fill {
      position: absolute;
      left: 3px;
      top: 3px;
      bottom: 3px;
      width: var(--battery-pct, 0%);
      max-width: calc(100% - 6px);
      border-radius: 3px;
      background: var(--battery-color);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24);
    }
    .battery-text {
      position: relative;
      z-index: 1;
      letter-spacing: 0;
      text-shadow: 0 1px 1px rgba(255,255,255,0.72);
    }
    .battery-high { --battery-color: #10b981; }
    .battery-mid { --battery-color: #f59e0b; }
    .battery-low { --battery-color: #ef4444; }
    .battery-unknown { --battery-color: #94a3b8; }
    .battery-badge.widget-battery {
      width: 42px;
      height: 18px;
      border-width: 1.25px;
      border-radius: 5px;
      font-size: 8.5px;
    }
    .battery-badge.widget-battery::after {
      right: -3.5px;
      top: 5px;
      width: 2.5px;
      height: 7px;
    }
    .battery-badge.device-battery {
      width: 52px;
      height: 23px;
      font-size: 10.5px;
    }
    .battery-badge.device-battery::after {
      right: -4.5px;
      top: 6px;
      width: 3.5px;
      height: 9px;
    }
    .status { color: var(--ink-dim); font-size: 12.5px; min-height: 19px; }
    .status.error { color: #fca5a5; }
    .muted { color: var(--muted); }
    .hidden { display: none !important; }
    code {
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 11.5px;
      color: #c8ccff;
      background: rgba(129,140,248,0.13);
      border: 1px solid rgba(129,140,248,0.18);
      border-radius: 5px;
      padding: 1px 5px;
    }
    @media (max-width: 920px) {
      header { height: auto; align-items: flex-start; flex-direction: column; padding: 12px; }
      .app,
      body.menu-collapsed .app { display: block; padding-top: 118px; }
      .map-page { grid-template-columns: 1fr; height: auto; }
      .devices-page { padding: 16px; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 25;
        width: min(300px, 86vw);
        height: 100vh;
        transform: translateX(-105%);
        transition: transform .18s ease;
        background: rgba(11,13,19,0.96);
      }
      body.menu-open .sidebar { transform: translateX(0); }
      body.menu-open .sidebar-backdrop { display: block; }
      #stage { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <button id="menuToggle" class="menu-toggle" type="button" aria-label="メニュー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h16"/>
        </svg>
      </button>
      <span class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14.5l5-5 4 4 7-7" fill="none" stroke="#052420" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="6.5" r="2.4" fill="#052420"/>
        </svg>
      </span>
      <div>
        <h1 id="title"></h1>
        <div class="brand-sub" data-i18n="dashboard.header.subtitle"></div>
      </div>
    </div>
    <div class="row header-right">
      <span class="live-dot"><i></i>LIVE</span>
      <label class="header-control"><span data-i18n="dashboard.refresh.label"></span><select id="refreshInterval">
        <option value="60">1m</option>
        <option value="300">5m</option>
        <option value="600">10m</option>
      </select></label>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="nav-group">
        <div class="nav-label">Navigation</div>
        <button class="nav-parent" id="iotMenuParent" type="button" aria-expanded="true"><span class="nav-icon">I</span><span class="nav-text" data-i18n="dashboard.menu.label"></span><span class="nav-caret">▾</span></button>
        <div class="nav-subgroup" id="iotMenuGroup">
          <button class="nav-item sub active" type="button" data-page-target="dashboard"><span class="nav-icon">D</span><span class="nav-text" data-i18n="dashboard.menu.dashboard"></span><span class="nav-badge" id="navDevCount">0</span></button>
          <button class="nav-item sub" type="button" data-page-target="map"><span class="nav-icon">M</span><span class="nav-text" data-i18n="dashboard.menu.map"></span></button>
          <button class="nav-item sub" type="button" data-page-target="meeting"><span class="nav-icon">N</span><span class="nav-text" data-i18n="dashboard.menu.meeting"></span></button>
        </div>
        <button class="nav-item" type="button" data-page-target="lpr"><span class="nav-icon">L</span><span class="nav-text" data-i18n="dashboard.menu.lpr"></span></button>
        <button class="nav-item" type="button" data-page-target="pmc"><span class="nav-icon">P</span><span class="nav-text" data-i18n="dashboard.menu.pmc"></span></button>
      </div>
    </aside>

    <main class="content">
      <div class="page map-page hidden" data-page="map">
        <div class="page-wrap">
          <div class="page-head">
            <div>
              <h2 class="page-title" data-i18n="dashboard.menu.map"></h2>
              <div class="page-desc" data-i18n="dashboard.map.description"></div>
            </div>
          </div>
          <div id="stageWrap">
            <div id="stage"><div id="empty" class="empty"></div></div>
          </div>
        </div>
      </div>

      <div class="page devices-page" data-page="dashboard">
        <div class="page-wrap">
          <div class="page-head">
            <div>
              <h2 class="page-title" data-i18n="dashboard.menu.dashboard"></h2>
              <div class="page-desc" data-i18n="dashboard.devices.description"></div>
            </div>
            <div id="status" class="status"></div>
          </div>
          <div class="kpi-grid" id="kpiGrid"></div>
          <div class="dash-grid">
            <div class="card">
              <div class="card-head">
                <div class="card-title"><span class="bar"></span><span data-i18n="dashboard.devices.title"></span></div>
                <div class="seg" id="filterSeg">
                  <button type="button" class="on" data-filter="all" data-i18n="dashboard.filter.all"></button>
                  <button type="button" data-filter="on">Online</button>
                  <button type="button" data-filter="off">Offline</button>
                </div>
              </div>
              <div class="toolbar">
                <div class="search-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                  <input id="search" class="search" type="search">
                </div>
              </div>
              <div class="card-body"><div id="deviceList" class="dev-list"></div></div>
            </div>
            <div class="side-stack">
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.onlineRatio"></span></div></div>
                <div class="card-body">
                  <div class="ring-wrap">
                    <svg class="ring-big" viewBox="0 0 100 100" id="onlineRing"></svg>
                    <div style="display:grid;gap:6px;flex:1" id="ringLegend"></div>
                  </div>
                </div>
              </div>
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.byArea"></span></div></div>
                <div class="card-body"><div class="bar-list" id="areaBars"></div></div>
              </div>
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.byType"></span></div></div>
                <div class="card-body"><div id="typeLegend"></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="page camera-page hidden" data-page="lpr">
        <div class="page-wrap"><section class="placeholder"><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.camera.lprTitle"></h2><p data-i18n="dashboard.camera.lprText"></p></section></div>
      </div>

      <div class="page camera-page hidden" data-page="meeting">
        <div class="page-wrap"><section class="placeholder"><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.meeting.title"></h2><p data-i18n="dashboard.meeting.text"></p></section></div>
      </div>

      <div class="page camera-page hidden" data-page="pmc">
        <div class="page-wrap"><section class="placeholder"><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.camera.parkingTitle"></h2><p data-i18n="dashboard.camera.parkingText"></p></section></div>
      </div>
    </main>
  </div>

  <script>
    const I18N = {
      ja: {
        common: {
          actions: { refresh: '更新' },
          status: { loading: '読み込み中...', ready: '表示中', cached: 'キャッシュを表示中、同期しています...' }
        },
        dashboard: {
          header: { title: 'Milesight IoT', subtitle: '社内展示ダッシュボード' },
          refresh: { label: '更新間隔' },
          menu: { label: 'Milesight IoT', dashboard: 'Dashboard', map: 'Map', meeting: '会議室Now', lpr: 'LPR', pmc: 'PMC' },
          summary: { title: 'サマリー', devices: 'デバイス', active: '有効', placed: '配置' },
          devices: { title: 'デバイス', searchPlaceholder: 'デバイス ID、エリア、場所、種別で検索', description: 'デバイスの稼働状態とセンサー指標をリアルタイムに俯瞰します。' },
          map: { description: '平面図上に配置したデバイスの状態を表示します。' },
          filter: { all: 'すべて' },
          insight: { onlineRatio: '稼働率', byArea: 'エリア別デバイス', byType: 'センサー種別' },
          status: { noMetric: '表示指標未設定', noValue: '--', noDevices: 'デバイスがありません', noPlaced: '配置済みデバイスがありません', noBackground: '背景画像が未設定です' },
          label: { on: 'Online', off: 'Offline', lastSeen: '最終更新', unknown: '未設定' },
          camera: {
            lprTitle: 'LPR カメラ',
            lprText: 'ナンバープレート認識カメラの一覧、状態、検知ログをここに表示します。',
            parkingTitle: '車位管理カメラ',
            parkingText: '車位管理カメラの稼働状況、占有状態、イベント情報をここに表示します。'
          },
          meeting: { title: '会議室Now', text: '会議室の利用状況、予約、センサー情報をここに統合します。' }
        }
      }
    };
    const LANG = 'ja';
    const DASHBOARD_CACHE_KEY = 'iotDashboard.dashboardState';
    const DASHBOARD_PAGE_KEY = 'iotDashboard.activePage';
    const DASHBOARD_QUERY_KEY = 'iotDashboard.deviceQuery';
    const DASHBOARD_MENU_KEY = 'iotDashboard.menuCollapsed';
    const DASHBOARD_REFRESH_KEY = 'iotDashboard.refreshIntervalSec';
    const DASHBOARD_IOT_GROUP_KEY = 'iotDashboard.iotGroupCollapsed';
    const DASHBOARD_ALLOWED_STORAGE_KEYS = [DASHBOARD_CACHE_KEY, DASHBOARD_PAGE_KEY, DASHBOARD_QUERY_KEY, DASHBOARD_MENU_KEY, DASHBOARD_REFRESH_KEY, DASHBOARD_IOT_GROUP_KEY];
    const DASHBOARD_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const state = { data: null, deviceMap: {}, query: '', filter: 'all', timer: 0 };
    const $ = (id) => document.getElementById(id);

    function t(path) {
      return path.split('.').reduce((cur, key) => cur && cur[key], I18N[LANG]) || path;
    }

    function initText() {
      $('title').textContent = t('dashboard.header.title');
      $('search').placeholder = t('dashboard.devices.searchPlaceholder');
      state.query = getStored(DASHBOARD_QUERY_KEY, '');
      $('search').value = state.query;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      $('empty').textContent = t('common.status.loading');
      activatePage(getStored(DASHBOARD_PAGE_KEY, 'dashboard'), false);
    }

    function callServer(name, args, ok, options) {
      const silent = options && options.silent;
      if (!silent) {
        setStatus(t('common.status.loading'));
        document.querySelectorAll('button').forEach((b) => b.disabled = true);
      }
      google.script.run
        .withSuccessHandler((res) => {
          if (!silent) {
            document.querySelectorAll('button').forEach((b) => b.disabled = false);
            setStatus(t('common.status.ready'));
          }
          ok(res);
        })
        .withFailureHandler((err) => {
          if (!silent) document.querySelectorAll('button').forEach((b) => b.disabled = false);
          setStatus(err && err.message ? err.message : String(err), true);
        })[name](...args);
    }

    function load(silent) {
      callServer('apiGetDashboardState', [], render, { silent: !!silent });
    }

    function render(data) {
      state.data = data || {};
      state.deviceMap = buildDeviceMap(state.data.devices || []);
      saveCachedDashboard(state.data);
      applyRefreshIntervalControl(state.data.config || {});
      applyBackground(state.data.config || {});
      renderStats();
      renderKpis();
      renderInsights();
      renderWidgets();
      renderDeviceList();
      $('navDevCount').textContent = (state.data.devices || []).length;
      scheduleRefresh();
    }

    function renderStats() {
      const devices = state.data.devices || [];
      const activeLayout = (state.data.layout || []).filter((i) => i.enabled !== false);
      const statDevices = $('statDevices');
      const statActive = $('statActive');
      const statPlaced = $('statPlaced');
      if (statDevices) statDevices.textContent = devices.length;
      if (statActive) statActive.textContent = devices.filter((d) => isOnline(d)).length;
      if (statPlaced) statPlaced.textContent = activeLayout.length;
    }

    function renderKpis() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const placed = (state.data.layout || []).filter((i) => i.enabled !== false).length;
      const lowBatt = devices.filter((d) => {
        const key = batteryMetricKey(d);
        const hit = key && d.metrics && d.metrics[key];
        const n = hit ? Number(hit.value) : NaN;
        return isFinite(n) && n < 30;
      }).length;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      const cards = [
        { label: t('dashboard.summary.devices'), val: devices.length, unit: '', foot: 'enabled ' + devices.filter((d) => d.enabled !== false).length, tone: 'flat' },
        { label: t('dashboard.summary.active'), val: online, unit: '/' + devices.length, foot: ratio + '% online', tone: ratio >= 70 ? 'up' : 'down' },
        { label: t('dashboard.summary.placed'), val: placed, unit: '', foot: 'map widgets', tone: 'flat' },
        { label: '低バッテリー', val: lowBatt, unit: '', foot: '< 30%', tone: lowBatt ? 'down' : 'up' }
      ];
      $('kpiGrid').innerHTML = cards.map((c, idx) => {
        const icon = ['M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 17v4h8v-4z', 'M22 12h-4l-3 9L9 3l-3 9H2', 'M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2z', 'M2 8h16v8H2zM20 11v2'][idx];
        return '<div class="kpi">' +
          '<div class="kpi-top"><span class="kpi-label">' + esc(c.label) + '</span><span class="kpi-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + icon + '"/></svg></span></div>' +
          '<div class="kpi-val">' + esc(c.val) + '<small>' + esc(c.unit) + '</small></div>' +
          '<div class="kpi-foot"><span class="trend ' + c.tone + '">' + esc(c.tone === 'up' ? 'OK' : c.tone === 'down' ? '注意' : 'INFO') + '</span>' + esc(c.foot) + '</div>' +
          sparkline([1, 2, 2, 3, 2, 4, Number(c.val) || 0]) +
          '</div>';
      }).join('');
    }

    function renderInsights() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      $('onlineRing').innerHTML = ringSvg(ratio);
      $('ringLegend').innerHTML =
        '<div class="legend-row"><span class="k"><i style="background:var(--ok)"></i>Online</span><span class="v">' + online + '</span></div>' +
        '<div class="legend-row"><span class="k"><i style="background:var(--bad)"></i>Offline</span><span class="v">' + (devices.length - online) + '</span></div>';
      renderBars('areaBars', groupCount(devices, (d) => d.area_id || d.location || t('dashboard.label.unknown')));
      const types = groupCount(devices, (d) => d.sensor_type || d.type || t('dashboard.label.unknown'));
      $('typeLegend').innerHTML = Object.keys(types).sort((a, b) => types[b] - types[a]).slice(0, 8).map((k, i) =>
        '<div class="legend-row"><span class="k"><i style="background:' + ['var(--accent)','var(--accent-2)','var(--accent-3)','var(--warn)'][i % 4] + '"></i>' + esc(k) + '</span><span class="v">' + types[k] + '</span></div>'
      ).join('');
    }

    function groupCount(rows, keyFn) {
      return (rows || []).reduce((acc, row) => {
        const key = keyFn(row);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(id, counts) {
      const keys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 8);
      const max = Math.max(1, ...keys.map((k) => counts[k]));
      $(id).innerHTML = keys.map((k) =>
        '<div class="bar-item"><div class="bar-top"><b>' + esc(k) + '</b><span>' + counts[k] + '</span></div><div class="bar-track"><i style="width:' + Math.round(counts[k] / max * 100) + '%"></i></div></div>'
      ).join('');
    }

    function ringSvg(ratio) {
      const c = 2 * Math.PI * 38;
      const off = c * (1 - ratio / 100);
      return '<circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/>' +
        '<circle cx="50" cy="50" r="38" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 50 50)"/>' +
        '<defs><linearGradient id="ringGrad" x1="0" x2="1"><stop stop-color="#2dd4bf"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs>' +
        '<text x="50" y="48" text-anchor="middle" class="ring-center">' + ratio + '%</text><text x="50" y="63" text-anchor="middle" class="ring-sub">ONLINE</text>';
    }

    function sparkline(vals) {
      const w = 100, h = 30, max = Math.max(1, ...vals), min = Math.min(...vals);
      const span = Math.max(1, max - min);
      const d = vals.map((v, i) => (i ? 'L' : 'M') + (i / (vals.length - 1) * w).toFixed(1) + ' ' + (h - ((v - min) / span) * (h - 4) - 2).toFixed(1)).join(' ');
      return '<svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="' + d + '" fill="none" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function renderWidgets() {
      const stage = $('stage');
      stage.querySelectorAll('.widget,.map-point,.map-popup').forEach((n) => n.remove());
      const layout = (state.data.layout || []).filter((i) => i.enabled !== false && (i.bind_type || 'device') === 'device');
      const devices = state.deviceMap;
      const bg = (state.data.config && state.data.config.background_url) || '';
      $('empty').classList.toggle('hidden', !!layout.length || !!bg);
      $('empty').textContent = bg ? t('dashboard.status.noPlaced') : t('dashboard.status.noBackground');

      layout.forEach((item) => {
        const device = devices[item.bind_ref] || {};
        const title = item.label || device.area_id || device.name || item.bind_ref;
        const config = item.style_config || parseStyle(item.style);
        const metrics = (config.metrics || []).slice(0, 3);
        const mode = config.displayMode === 'popup' ? 'popup' : 'card';
        if (mode === 'popup') {
          const point = document.createElement('button');
          point.type = 'button';
          point.className = 'map-point' + (!isOnline(device) ? ' off' : '');
          point.style.left = (Number(item.x_norm) * 100) + '%';
          point.style.top = (Number(item.y_norm) * 100) + '%';
          point.setAttribute('aria-label', title);
          point.addEventListener('click', (ev) => {
            ev.stopPropagation();
            showMapPopup(item, device, title, metrics);
          });
          stage.appendChild(point);
          return;
        }
        const el = document.createElement('div');
        el.className = 'widget' + (!isOnline(device) ? ' off' : '');
        el.style.left = (Number(item.x_norm) * 100) + '%';
        el.style.top = (Number(item.y_norm) * 100) + '%';
        const batteryBadge = renderBatteryBadge(device, 'widget-battery');
        el.innerHTML =
          '<div class="widget-head">' +
          '<div class="widget-title">' + esc(title) + '</div>' +
          batteryBadge +
          '</div>' +
          '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
          '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
        stage.appendChild(el);
      });
    }

    function showMapPopup(item, device, title, metrics) {
      const stage = $('stage');
      stage.querySelectorAll('.map-popup').forEach((n) => n.remove());
      const popup = document.createElement('div');
      popup.className = 'widget map-popup' + (!isOnline(device) ? ' off' : '');
      popup.style.left = (Number(item.x_norm) * 100) + '%';
      popup.style.top = (Number(item.y_norm) * 100) + '%';
      const batteryBadge = renderBatteryBadge(device, 'widget-battery');
      popup.innerHTML =
        '<div class="widget-head">' +
        '<div class="widget-title">' + esc(title) + '</div>' +
        batteryBadge +
        '</div>' +
        '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
        '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
      stage.appendChild(popup);
    }

    function renderWidgetMetrics(device, metrics) {
      const configured = metrics || [];
      metrics = configured.filter((metric) => !isBatteryMetric(metric));
      if (!metrics.length) {
        if (configured.length && batteryMetricKey(device)) return '';
        return '<div class="metric-line"><span class="metric-name">' + esc(t('dashboard.status.noMetric')) + '</span><span class="metric-value">--</span></div>';
      }
      return metrics.map((metric) => {
        const meta = metricMeta(metric);
        const hit = device.metrics && device.metrics[metric];
        return '<div class="metric-line">' +
          '<span class="metric-name">' + esc(meta.label || metric) + '</span>' +
          '<span class="metric-value">' + esc(hit ? formatValue(hit.value, meta.unit) : t('dashboard.status.noValue')) + '</span>' +
          '</div>';
      }).join('');
    }

    function renderDeviceList() {
      const q = state.query.toLowerCase();
      const rows = (state.data.devices || []).filter((d) => {
        const hay = [d.device_id, d.name, d.area_id, d.location, d.type, d.sensor_type].join(' ').toLowerCase();
        const queryOk = !q || hay.indexOf(q) > -1;
        const filterOk = state.filter === 'all' || (state.filter === 'on' ? isOnline(d) : !isOnline(d));
        return queryOk && filterOk;
      }).sort((a, b) => String(a.area_id || a.device_id).localeCompare(String(b.area_id || b.device_id)));

      $('deviceList').innerHTML = rows.map((d) => {
        const metrics = (d.metricKeys || []).filter((m) => !isBatteryMetric(m)).slice(0, 6).map((m) => {
          const hit = d.metrics && d.metrics[m];
          const meta = metricMeta(m);
          const raw = hit ? Number(hit.value) : NaN;
          const pct = isFinite(raw) ? Math.max(4, Math.min(100, Math.round(raw / metricMax(m) * 100))) : 0;
          return '<div class="metric">' +
            '<div class="metric-k">' + metricIcon(m) + '<span>' + esc(meta.label || m) + '</span></div>' +
            '<div class="metric-v">' + esc(hit ? formatValue(hit.value, meta.unit) : '--') + '</div>' +
            '<div class="mbar"><i style="width:' + pct + '%"></i></div>' +
            '</div>';
        }).join('');
        return '<div class="dev ' + (!isOnline(d) ? 'off' : '') + '">' +
          '<div class="dev-head">' +
          '<div><div class="dev-name">' + esc(d.area_id || d.name || d.device_id) + '</div><div class="dev-id">' + esc(d.device_id) + '</div></div>' +
          '<div class="dev-actions">' +
          renderBatteryBadge(d, 'device-battery') +
          '<span class="pill ' + (!isOnline(d) ? 'off' : '') + '">' + esc(isOnline(d) ? t('dashboard.label.on') : t('dashboard.label.off')) + '</span>' +
          '</div>' +
          '</div>' +
          '<div class="dev-meta">' + esc([d.location, d.type, d.sensor_type].filter(Boolean).join(' / ') || t('dashboard.label.unknown')) + '<span class="dot"></span>' + esc(t('dashboard.label.lastSeen') + ': ' + (shortDate(d.last_seen) || t('dashboard.label.unknown'))) + '</div>' +
          '<div class="metrics">' + metrics + '</div>' +
          '</div>';
      }).join('') || '<div class="muted">' + esc(t('dashboard.status.noDevices')) + '</div>';
    }

    function applyBackground(config) {
      const w = Number(config.map_width || 1200);
      const h = Number(config.map_height || 800);
      const url = config.background_url || '';
      $('stage').style.setProperty('--aspect', String(w / h));
      $('stage').style.backgroundImage = url ? 'url("' + url + '")' : '';
    }

    function deviceMap() {
      return state.deviceMap || {};
    }

    function buildDeviceMap(devices) {
      const out = {};
      (devices || []).forEach((d) => out[d.device_id] = d);
      return out;
    }

    function metricMeta(metric) {
      return (state.data.metricMeta && state.data.metricMeta[metric]) || { label: metric, unit: '' };
    }

    function renderBatteryBadge(device, extraClass) {
      const key = batteryMetricKey(device);
      if (!key) return '';
      const hit = device.metrics && device.metrics[key];
      const value = hit ? Number(hit.value) : NaN;
      const pct = isFinite(value) ? Math.max(0, Math.min(100, Math.round(value))) : 0;
      const label = isFinite(value) ? pct + '%' : '--';
      const small = extraClass === 'widget-battery' ? ' sm' : '';
      return '<span class="batt ' + batteryClass(pct, isFinite(value)) + small + '" style="--bp:' + pct + '%">' +
        '<i></i><span>' + esc(label) + '</span></span>';
    }

    function isOnline(device) {
      if (!device) return false;
      if (typeof device.online === 'boolean') return device.online;
      return device.enabled !== false;
    }

    function batteryMetricKey(device) {
      const metrics = (device && device.metrics) || {};
      const keys = Object.keys(metrics);
      const preferred = ['battery', 'battery_level', 'battery_percent', 'battery_percentage'];
      for (let i = 0; i < preferred.length; i++) {
        if (Object.prototype.hasOwnProperty.call(metrics, preferred[i])) return preferred[i];
      }
      for (let j = 0; j < keys.length; j++) {
        if (isBatteryMetric(keys[j])) return keys[j];
      }
      return '';
    }

    function isBatteryMetric(metric) {
      const key = String(metric || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
      return key === 'battery' || key === 'battery_level' || key === 'battery_percent' || key === 'battery_percentage' || /(^|_)battery($|_)/.test(key);
    }

    function batteryClass(pct, hasValue) {
      if (!hasValue) return 'b-un';
      if (pct >= 60) return 'b-hi';
      if (pct >= 30) return 'b-mid';
      return 'b-lo';
    }

    function metricIcon(metric) {
      const key = String(metric || '').toLowerCase();
      const paths = {
        temperature: '<path d="M14 14.76V5a2 2 0 0 0-4 0v9.76a4 4 0 1 0 4 0z"/>',
        humidity: '<path d="M12 3c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11z"/>',
        co2: '<circle cx="12" cy="12" r="9"/><path d="M8 12h8"/>',
        occupancy: '<circle cx="12" cy="8" r="3"/><path d="M6 20a6 6 0 0 1 12 0"/>',
        people_count_all: '<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/>',
        voltage: '<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>',
        power_consumption: '<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>'
      };
      const p = paths[key] || '<circle cx="12" cy="12" r="3"/>';
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>';
    }

    function metricMax(metric) {
      const key = String(metric || '').toLowerCase();
      const max = { temperature: 40, humidity: 100, co2: 2000, tvoc: 1000, pm2_5: 100, pressure: 1100, occupancy: 1, people_count_all: 20, voltage: 240, power_consumption: 100 };
      return max[key] || 100;
    }

    function parseStyle(style) {
      try {
        const obj = JSON.parse(style || '{}');
        return { metrics: Array.isArray(obj.metrics) ? obj.metrics : [], displayMode: obj.displayMode === 'popup' ? 'popup' : 'card' };
      } catch (err) {
        return { metrics: [], displayMode: 'card' };
      }
    }

    function getCachedDashboard() {
      try {
        const raw = localStorage.getItem(DASHBOARD_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (isExpiredCache(cached, DASHBOARD_CACHE_MAX_AGE_MS)) {
          localStorage.removeItem(DASHBOARD_CACHE_KEY);
          return null;
        }
        return cached;
      } catch (err) {
        try { localStorage.removeItem(DASHBOARD_CACHE_KEY); } catch (e) {}
        return null;
      }
    }

    function saveCachedDashboard(data) {
      try {
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({
          data: data,
          cached_at: new Date().toISOString()
        }));
      } catch (err) {}
    }

    function applyCachedDashboard() {
      const cached = getCachedDashboard();
      if (!cached) return;
      const data = cached.data || cached;
      state.data = data;
      render(data);
      setStatus(t('common.status.cached'));
    }

    function getStored(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v == null ? fallback : v;
      } catch (err) {
        return fallback;
      }
    }

    function setStored(key, value) {
      try { localStorage.setItem(key, value); } catch (err) {}
    }

    function cleanupLocalStorage(namespace, allowedKeys, maxAgeMs) {
      try {
        const allowed = {};
        allowedKeys.forEach((key) => allowed[key] = true);
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (!key || key.indexOf(namespace) !== 0) continue;
          if (!allowed[key]) {
            localStorage.removeItem(key);
            continue;
          }
          if (key === DASHBOARD_CACHE_KEY) {
            const cached = JSON.parse(localStorage.getItem(key) || 'null');
            if (isExpiredCache(cached, maxAgeMs)) localStorage.removeItem(key);
          }
        }
      } catch (err) {}
    }

    function isExpiredCache(cached, maxAgeMs) {
      if (!cached || !cached.cached_at) return false;
      const t = new Date(cached.cached_at).getTime();
      return isFinite(t) && Date.now() - t > maxAgeMs;
    }

    function activatePage(page, persist) {
      const target = normalizePage(page || 'dashboard');
      document.querySelectorAll('[data-page-target]').forEach((n) => {
        n.classList.toggle('active', n.getAttribute('data-page-target') === target);
      });
      document.querySelectorAll('[data-page]').forEach((section) => {
        section.classList.toggle('hidden', section.getAttribute('data-page') !== target);
      });
      if (persist !== false) setStored(DASHBOARD_PAGE_KEY, target);
    }

    function normalizePage(page) {
      if (page === 'iot') return 'map';
      if (page === 'devices') return 'dashboard';
      if (page === 'parking') return 'pmc';
      return page || 'dashboard';
    }

    function scheduleRefresh() {
      clearTimeout(state.timer);
      const seconds = selectedRefreshIntervalSec();
      state.timer = setTimeout(() => load(true), Math.max(60, seconds) * 1000);
    }

    function selectedRefreshIntervalSec() {
      const n = Number($('refreshInterval').value || getStored(DASHBOARD_REFRESH_KEY, ''));
      return n === 300 || n === 600 ? n : 60;
    }

    function applyRefreshIntervalControl(config) {
      const stored = getStored(DASHBOARD_REFRESH_KEY, '');
      const fromConfig = Number(config.refresh_interval_sec || 60);
      const value = stored || String(fromConfig === 300 || fromConfig === 600 ? fromConfig : 60);
      $('refreshInterval').value = value;
    }

    function setIotGroupCollapsed(collapsed) {
      $('iotMenuParent').setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      $('iotMenuGroup').classList.toggle('collapsed', !!collapsed);
      setStored(DASHBOARD_IOT_GROUP_KEY, collapsed ? '1' : '0');
    }

    function setStatus(text, isError) {
      $('status').textContent = text || '';
      $('status').className = 'status' + (isError ? ' error' : '');
    }

    function formatValue(v, unit) {
      const n = Number(v);
      const body = isFinite(n) ? String(Math.round(n * 100) / 100) : String(v == null ? '' : v);
      return unit ? body + unit : body;
    }

    function shortDate(v) {
      if (!v) return '';
      const d = new Date(v);
      return isNaN(d.getTime()) ? v : d.toLocaleString('ja-JP');
    }

    function esc(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    $('refreshInterval').addEventListener('change', () => {
      setStored(DASHBOARD_REFRESH_KEY, String(selectedRefreshIntervalSec()));
      scheduleRefresh();
    });
    $('iotMenuParent').addEventListener('click', () => {
      setIotGroupCollapsed($('iotMenuParent').getAttribute('aria-expanded') !== 'false');
    });
    $('stage').addEventListener('click', () => {
      $('stage').querySelectorAll('.map-popup').forEach((n) => n.remove());
    });
    $('menuToggle').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 920px)').matches) {
        document.body.classList.toggle('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DASHBOARD_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarBackdrop').addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
    document.querySelectorAll('[data-page-target]').forEach((btn) => {
      btn.addEventListener('click', () => {
        activatePage(btn.getAttribute('data-page-target'), true);
        document.body.classList.remove('menu-open');
      });
    });
    $('search').addEventListener('input', (ev) => {
      state.query = ev.target.value || '';
      setStored(DASHBOARD_QUERY_KEY, state.query);
      renderDeviceList();
    });
    document.querySelectorAll('#filterSeg [data-filter]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.filter = btn.getAttribute('data-filter') || 'all';
        document.querySelectorAll('#filterSeg [data-filter]').forEach((b) => b.classList.toggle('on', b === btn));
        renderDeviceList();
      });
    });
    cleanupLocalStorage('iotDashboard.', DASHBOARD_ALLOWED_STORAGE_KEYS, DASHBOARD_CACHE_MAX_AGE_MS);
    initText();
    if (getStored(DASHBOARD_MENU_KEY, '0') === '1') document.body.classList.add('menu-collapsed');
    setIotGroupCollapsed(getStored(DASHBOARD_IOT_GROUP_KEY, '0') === '1');
    applyCachedDashboard();
    load();
  </script>
</body>
</html>

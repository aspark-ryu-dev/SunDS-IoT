<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://dl.dropboxusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070910;
      --bg-1: #0b0e17;
      --panel: rgba(255,255,255,0.038);
      --panel-2: rgba(255,255,255,0.055);
      --panel-hi: rgba(255,255,255,0.085);
      --glass: rgba(13,17,27,0.72);
      --card-border: rgba(255,255,255,0.07);
      --card-border-2: rgba(255,255,255,0.11);
      --ink: #eef1f8;
      --ink-dim: #c7cdda;
      --muted: #8b93a7;
      --muted-2: #5c6478;
      --line: rgba(255,255,255,0.07);
      --accent: #2dd4bf;
      --accent-2: #5b9df6;
      --accent-3: #818cf8;
      --grad: linear-gradient(115deg, #2dd4bf 0%, #5b9df6 55%, #818cf8 100%);
      --grad-soft: linear-gradient(115deg, rgba(45,212,191,.18), rgba(129,140,248,.18));
      --ok: #34d399;
      --ok-soft: rgba(52,211,153,.13);
      --warn: #fbbf24;
      --warn-soft: rgba(251,191,36,.13);
      --bad: #fb7185;
      --bad-soft: rgba(251,113,133,.13);
      --field: rgba(255,255,255,0.055);
      --map-card-bg: rgba(13,17,27,0.78);
      --map-card-bg-strong: rgba(13,17,27,0.88);
      --map-card-border: rgba(255,255,255,0.14);
      --map-card-ink: #eef1f8;
      --map-card-muted: #9aa4b8;
      --map-card-shadow: 0 18px 38px -18px rgba(0,0,0,.82), 0 2px 8px rgba(0,0,0,.26);
      --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -16px rgba(0,0,0,.7);
      --shadow-2: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 56px -28px rgba(0,0,0,.78);
      --glow: 0 8px 24px -8px rgba(45,212,191,.5);
      --r-sm: 9px;
      --r-md: 12px;
      --r-lg: 16px;
      --header-h: 64px;
      --side-w: 248px;
      --side-w-collapsed: 76px;
      font-family: "Zen Kaku Gothic New", "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-display: "Outfit", "Zen Kaku Gothic New", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    body.theme-light {
      color-scheme: light;
      --bg: #eef1f7;
      --bg-1: #f6f8fc;
      --panel: rgba(15,23,42,0.028);
      --panel-2: rgba(15,23,42,0.045);
      --panel-hi: rgba(15,23,42,0.07);
      --glass: rgba(255,255,255,0.78);
      --card-border: rgba(15,23,42,0.09);
      --card-border-2: rgba(15,23,42,0.14);
      --ink: #0f1626;
      --ink-dim: #36405a;
      --muted: #687288;
      --muted-2: #97a0b4;
      --line: rgba(15,23,42,0.09);
      --field: rgba(15,23,42,0.045);
      --map-card-bg: rgba(255,255,255,0.78);
      --map-card-bg-strong: rgba(255,255,255,0.9);
      --map-card-border: rgba(15,23,42,0.14);
      --map-card-ink: #0f1626;
      --map-card-muted: #687288;
      --map-card-shadow: 0 18px 36px -22px rgba(15,23,42,.44), 0 2px 8px rgba(15,23,42,.12);
      --shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 8px 22px -16px rgba(15,23,42,.4);
      --shadow-2: 0 1px 0 rgba(255,255,255,.7) inset, 0 24px 50px -28px rgba(15,23,42,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 4% -10%, rgba(45,212,191,.14), transparent 58%),
        radial-gradient(1000px 620px at 106% -8%, rgba(129,140,248,.16), transparent 56%),
        radial-gradient(700px 500px at 80% 120%, rgba(91,157,246,.10), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(140%);
      border-bottom: 1px solid var(--line);
    }
    .menu-toggle {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      transition: .16s;
    }
    .menu-toggle:hover { background: var(--panel-hi); color: var(--ink); }
    .menu-toggle svg { width: 20px; height: 20px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
      position: relative;
    }
    .brand-copy::after {
      content: "";
      width: 100%;
      max-width: 260px;
      height: 1px;
      background: linear-gradient(90deg, rgba(45,212,191,.85), rgba(129,140,248,.42), transparent);
      box-shadow: 0 0 14px rgba(45,212,191,.35);
    }
    .logo {
      position: relative;
      width: 50px; height: 50px; flex: none;
      border-radius: 12px;
      background: transparent;
      display: grid; place-items: center;
      box-shadow: none;
      overflow: visible;
    }
    .logo::before {
      content: ""; position: absolute; inset: -7px; z-index: -1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,157,246,.42), rgba(45,212,191,.18) 45%, transparent 72%);
      filter: blur(7px);
    }
    .logo-img { width: 50px; height: 50px; object-fit: contain; display: block; filter: drop-shadow(0 3px 9px rgba(45,212,191,.45)); }
    h1 {
      margin: 0;
      font: 900 22px/1.05 var(--font-display);
      letter-spacing: .01em;
      background: linear-gradient(100deg, #e8c887 0%, #2dd4bf 26%, #5b9df6 50%, #9aa6ff 72%, #e8c887 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 1px 6px rgba(91,157,246,.24));
      animation: titleSheen 9s ease-in-out infinite;
    }
    @keyframes titleSheen {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) { h1 { animation: none; } }
    .sub { color: var(--muted); font-size: 11.5px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .header-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    button {
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 8px 13px;
      font: inherit;
      font-weight: 700;
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
    }
    button:hover { background: var(--panel-hi); color: var(--ink); }
    button:disabled { opacity: .55; cursor: wait; }
    .icon-btn {
      width: 40px;
      height: 40px;
      flex: none;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
      transition: .16s;
      box-shadow: none;
    }
    .icon-btn:hover { background: var(--panel-hi); color: var(--ink); }
    .icon-btn svg { width: 19px; height: 19px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    .header-control select {
      width: auto;
      min-width: 66px;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 6px 7px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    select option {
      background: var(--bg-1);
      color: var(--ink);
    }
    input:focus {
      outline: none;
      border-color: rgba(45,212,191,0.55);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.14);
    }
    .app {
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr);
      min-height: 100vh;
      padding-top: var(--header-h);
      transition: grid-template-columns .2s ease;
    }
    body.menu-collapsed .app {
      grid-template-columns: var(--side-w-collapsed) minmax(0, 1fr);
    }
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--side-w);
      height: calc(100vh - var(--header-h));
      overflow: auto;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(18px);
      padding: 16px 12px;
      transition: width .2s ease;
    }
    body.menu-collapsed .sidebar { width: var(--side-w-collapsed); }
    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .sidebar-footer .footer-refresh { width: 100%; justify-content: space-between; }
    .sidebar-footer .footer-refresh select { width: auto; min-width: 76px; }
    .sidebar-footer .footer-row { display: flex; align-items: center; gap: 8px; }
    .sidebar-footer .footer-spacer { flex: 1; }
    #sidebarCollapse svg { transition: transform .2s ease; }
    body.menu-collapsed #sidebarCollapse svg { transform: rotate(180deg); }
    body.menu-collapsed .sidebar-footer .footer-refresh { display: none; }
    body.menu-collapsed .sidebar-footer .footer-row { flex-direction: column; gap: 8px; }
    body.menu-collapsed .sidebar-footer .footer-spacer { display: none; }
    /* settings popover (gear) */
    .settings-panel {
      position: fixed; left: 16px; bottom: 74px; z-index: 50;
      width: 244px; max-width: calc(100vw - 32px);
      display: none; padding: 14px; border-radius: var(--r-md);
      background: var(--glass); backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--card-border-2); box-shadow: var(--shadow-2);
    }
    .settings-panel.open { display: grid; gap: 14px; animation: fade .2s ease; }
    .settings-title { font: 800 13px var(--font-display); display: flex; align-items: center; gap: 8px; }
    .settings-title::before { content: ""; width: 4px; height: 14px; border-radius: 2px; background: var(--grad); }
    .settings-section { display: grid; gap: 7px; }
    .settings-label { font-size: 10.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .theme-seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 3px; border: 1px solid var(--card-border-2); border-radius: var(--r-sm); background: var(--panel-2); }
    .theme-seg button { border: 0; border-radius: 6px; padding: 8px 4px; font: 700 11px var(--font-display); background: transparent; color: var(--muted); cursor: pointer; transition: .14s; }
    .theme-seg button:hover { color: var(--ink); }
    .theme-seg button.on { background: var(--grad); color: #052420; box-shadow: 0 6px 14px -8px rgba(45,212,191,.6); }
    .settings-panel select { width: 100%; }
    .settings-panel button.secondary { width: 100%; }
    /* hero icon on empty map */
    .empty-hero { display: inline-grid; place-items: center; margin-bottom: 16px; }
    .empty-hero .logo-img { width: 112px; height: 112px; object-fit: contain; filter: drop-shadow(0 8px 22px rgba(45,212,191,.4)); animation: heroFloat 4s ease-in-out infinite; }
    @keyframes heroFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .brand-sub {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .header-right .header-control { border-left: 1px solid var(--line); padding-left: 14px; }
    .clock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .clock-time { font: 700 15px var(--font-mono); color: var(--ink); }
    .clock-date { font-size: 10.5px; color: var(--muted); font-weight: 700; }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(52,211,153,.3);
      background: var(--ok-soft);
      color: var(--ok);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .03em;
    }
    .live-dot i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(52,211,153,.55);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
      70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }
    .nav-group { display: grid; gap: 4px; }
    .nav-label {
      padding: 8px 10px 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .nav-item {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink-dim);
      box-shadow: none;
      text-align: left;
      transition: .14s;
      font-weight: 700;
    }
    .nav-item:hover { background: var(--panel-2); color: var(--ink); }
    .nav-item.active {
      background: var(--grad-soft);
      border-color: rgba(45,212,191,0.32);
      color: var(--ink);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 50%;
      width: 3px;
      height: 22px;
      border-radius: 0 3px 3px 0;
      background: var(--grad);
      transform: translateY(-50%);
    }
    .nav-parent {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      text-align: left;
      font-weight: 800;
      transition: .14s;
    }
    .nav-parent:hover {
      background: var(--panel-2);
    }
    .nav-caret {
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1;
      transition: transform .18s ease;
    }
    .nav-parent[aria-expanded="false"] .nav-caret {
      transform: rotate(-90deg);
    }
    .nav-subgroup {
      display: grid;
      gap: 4px;
      margin: 2px 0 8px 12px;
      padding-left: 13px;
      border-left: 1px solid var(--card-border-2);
    }
    .nav-subgroup.collapsed { display: none; }
    .nav-item.sub {
      padding: 8px 11px;
      grid-template-columns: 20px minmax(0, 1fr) auto;
      gap: 10px;
      font-size: 13px;
    }
    .nav-badge { justify-self: end; }
    .nav-item.sub .nav-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      font-size: 10px;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--ink-dim);
      font-size: 12px;
      font-weight: 800;
      font-family: var(--font-display);
    }
    .nav-icon svg { width: 15px; height: 15px; }
    .nav-item.sub .nav-icon svg { width: 13px; height: 13px; }
    .nav-item.active .nav-icon {
      background: rgba(45,212,191,.18);
      color: var(--accent);
    }
    .nav-badge {
      font: 700 10px var(--font-mono);
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.menu-collapsed .nav-item {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-parent {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-caret { display: none; }
    body.menu-collapsed .nav-subgroup {
      margin-left: 0;
      padding-left: 0;
      border-left: 0;
    }
    body.menu-collapsed .nav-text,
    body.menu-collapsed .nav-label {
      display: none;
    }
    .content { min-width: 0; grid-column: 2; }
    .page { animation: fade .26s ease; }
    .page.hidden { display: none; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .page-wrap { padding: 20px; max-width: 1320px; margin: 0 auto; }
    .map-page .page-wrap {
      max-width: none;
      min-height: calc(100vh - var(--header-h));
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    .page-title { margin: 0; font: 800 25px/1.1 var(--font-display); letter-spacing: -.015em; display: flex; align-items: center; gap: 14px; }
    .page-title::before { display: none; }
    .page-ico {
      width: 48px; height: 48px; flex: none; display: grid; place-items: center;
      border-radius: 14px; background: var(--grad); color: #052420;
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .page-ico svg { width: 26px; height: 26px; }
    .page-title .page-txt {
      background: linear-gradient(90deg, var(--ink), var(--ink-dim));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-desc { color: var(--muted); font-size: 12.5px; margin-top: 6px; padding-left: 62px; }
    @media (max-width: 920px) { .page-desc { padding-left: 0; } }
    .page-head .status {
      align-self: center;
      min-height: 0;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .page-head .status:empty { display: none; }
    .page-head .status.error { color: var(--bad); border-color: rgba(251,113,133,.3); background: var(--bad-soft); }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; margin-bottom: 18px; }
    .kpi {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 16px 16px 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .kpi::after {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--grad);
      opacity: .85;
    }
    .kpi-top { display: flex; align-items: center; justify-content: space-between; }
    .kpi-label { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .kpi-ico { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: var(--grad-soft); color: var(--accent); }
    .kpi-ico svg { width: 16px; height: 16px; }
    .kpi-val { font: 800 30px/1 var(--font-display); margin: 12px 0 6px; font-variant-numeric: tabular-nums; }
    .kpi-val small { font-size: 14px; color: var(--muted); font-weight: 700; }
    .kpi-foot { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--muted); }
    .trend { display: inline-flex; align-items: center; gap: 3px; font-weight: 800; padding: 1px 6px; border-radius: 6px; }
    .trend.up { color: var(--ok); background: var(--ok-soft); }
    .trend.down { color: var(--bad); background: var(--bad-soft); }
    .trend.flat { color: var(--muted); background: var(--panel-2); }
    .trend svg { width: 11px; height: 11px; }
    .spark { display: block; width: 100%; height: 30px; margin-top: 8px; overflow: visible; }
    .dash-grid { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 16px; align-items: start; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .card-head {
      display: flex;

<body>
  <header>
    <div class="brand">
      <button id="menuToggle" class="menu-toggle" type="button" aria-label="メニュー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h16"/>
        </svg>
      </button>
      <span class="logo">
        <img class="logo-img" alt="" src="https://www.dropbox.com/scl/fi/bwxb55mrt1qg4aqih5bxt/icon_dark.png?rlkey=g2mb3yooo636lr4qfa8zg8dlb&amp;st=icn9wq0m&amp;dl=1">
      </span>
      <div class="brand-copy">
        <h1 id="title"></h1>
        <div class="brand-sub" data-i18n="dashboard.header.subtitle"></div>
      </div>
    </div>
    <div class="row header-right">
      <span class="live-dot"><i></i>LIVE</span>
      <div class="clock"><span class="clock-time" id="clkTime">--:--:--</span><span class="clock-date" id="clkDate">----</span></div>
      <button class="icon-btn" id="fullscreenBtn" type="button" aria-label="fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M21 16v3a2 2 0 0 1-2 2h-3"/></svg>
      </button>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="nav-group">
        <div class="nav-label">Navigation</div>
        <button class="nav-parent" id="iotMenuParent" type="button" aria-expanded="true"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.label"></span><span class="nav-caret">▾</span></button>
        <div class="nav-subgroup" id="iotMenuGroup">
          <button class="nav-item sub active" type="button" data-page-target="dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 17v4h8v-4z"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.dashboard"></span><span class="nav-badge" id="navDevCount">0</span></button>
          <button class="nav-item sub" type="button" data-page-target="map"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2z"/><path d="M9 3v16M15 5v16"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.map"></span></button>
          <button class="nav-item sub" type="button" data-page-target="meeting"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.meeting"></span></button>
        </div>
        <button class="nav-item" type="button" data-page-target="lpr"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><circle cx="12" cy="14" r="3"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.lpr"></span></button>
        <button class="nav-item" type="button" data-page-target="pmc"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg></span><span class="nav-text" data-i18n="dashboard.menu.pmc"></span></button>
      </div>
      <div class="sidebar-footer">
        <div class="footer-row">
          <button class="icon-btn" id="sidebarCollapse" type="button" aria-label="メニュー折りたたみ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg></button>
          <span class="footer-spacer"></span>
          <button class="icon-btn" id="settingsBtn" type="button" aria-label="設定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        </div>
      </div>
    </aside>
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-title">設定</div>
      <div class="settings-section">
        <div class="settings-label">テーマ</div>
        <div class="theme-seg" id="themeSeg">
          <button type="button" data-theme="light">Light</button>
          <button type="button" data-theme="dark">Dark</button>
          <button type="button" data-theme="system">System</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="dashboard.refresh.label"></div>
        <select id="refreshInterval">
          <option value="60">1m</option>
          <option value="300">5m</option>
          <option value="600">10m</option>
        </select>
      </div>
    </div>

    <main class="content">
      <div class="page map-page hidden" data-page="map">
        <div class="page-wrap">
          <div id="stageWrap">
            <button class="stage-fullscreen-btn" id="stageFullscreenBtn" type="button" aria-label="fullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M21 16v3a2 2 0 0 1-2 2h-3"/></svg>
            </button>
            <div id="stage"><div id="empty" class="empty"><span class="empty-hero"><img class="logo-img" alt=""></span><span id="emptyText"></span></div></div>
          </div>
        </div>
      </div>

      <div class="page devices-page" data-page="dashboard">
        <div class="page-wrap">
          <div class="page-head">
            <div>
              <h2 class="page-title"><span class="page-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 17v4h8v-4z"/></svg></span><span class="page-txt" data-i18n="dashboard.menu.dashboard"></span></h2>
              <div class="page-desc" data-i18n="dashboard.devices.description"></div>
            </div>
            <div id="status" class="status"></div>
          </div>
          <div class="kpi-grid" id="kpiGrid"></div>
          <div class="dash-grid">
            <div class="card">
              <div class="card-head">
                <div class="card-title"><span class="bar"></span><span data-i18n="dashboard.devices.title"></span></div>
                <div class="seg" id="filterSeg">
                  <button type="button" class="on" data-filter="all" data-i18n="dashboard.filter.all"></button>
                  <button type="button" data-filter="on">Online</button>
                  <button type="button" data-filter="off">Offline</button>
                </div>
              </div>
              <div class="toolbar">
                <div class="search-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                  <input id="search" class="search" type="search">
                </div>
              </div>
              <div class="card-body"><div id="deviceList" class="dev-list"></div></div>
            </div>
            <div class="side-stack">
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.onlineRatio"></span></div></div>
                <div class="card-body">
                  <div class="ring-wrap">
                    <svg class="ring-big" viewBox="0 0 100 100" id="onlineRing"></svg>
                    <div style="display:grid;gap:6px;flex:1" id="ringLegend"></div>
                  </div>
                </div>
              </div>
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.byArea"></span></div></div>
                <div class="card-body"><div class="bar-list" id="areaBars"></div></div>
              </div>
              <div class="card">
                <div class="card-head"><div class="card-title"><span class="bar"></span><span data-i18n="dashboard.insight.byType"></span></div></div>
                <div class="card-body"><div id="typeLegend"></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="page camera-page hidden" data-page="lpr">
        <div class="page-wrap"><section class="placeholder"><span class="ph-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><circle cx="12" cy="14" r="3"/></svg></span><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.camera.lprTitle"></h2><p data-i18n="dashboard.camera.lprText"></p></section></div>
      </div>

      <div class="page camera-page hidden" data-page="meeting">
        <div class="page-wrap"><section class="placeholder"><span class="ph-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg></span><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.meeting.title"></h2><p data-i18n="dashboard.meeting.text"></p></section></div>
      </div>

      <div class="page camera-page hidden" data-page="pmc">
        <div class="page-wrap"><section class="placeholder"><span class="ph-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg></span><span class="ph-tag">COMING SOON</span><h2 data-i18n="dashboard.camera.parkingTitle"></h2><p data-i18n="dashboard.camera.parkingText"></p></section></div>
      </div>
    </main>
  </div>

  <script>
    const I18N = {
      ja: {
        common: {
          actions: { refresh: '更新' },
          status: { loading: '読み込み中...', ready: '表示中', cached: 'キャッシュを表示中、同期しています...' }
        },
        dashboard: {
          header: { title: 'Sun Digital System シナプス', subtitle: '社内展示ダッシュボード' },
          refresh: { label: '更新間隔' },
          menu: { label: 'Milesight IoT', dashboard: 'Dashboard', map: 'Map', meeting: '会議室Now', lpr: 'LPR', pmc: 'PMC' },
          summary: { title: 'サマリー', devices: 'デバイス', active: '有効', placed: '配置' },
          devices: { title: 'デバイス', searchPlaceholder: 'デバイス ID、エリア、場所、種別で検索', description: 'デバイスの稼働状態とセンサー指標をリアルタイムに俯瞰します。' },
          map: { description: '平面図上に配置したデバイスの状態を表示します。', collapseAll: 'すべて閉じる' },
          filter: { all: 'すべて' },
          insight: { onlineRatio: '稼働率', byArea: 'エリア別デバイス', byType: 'センサー種別' },
          status: { noMetric: '表示指標未設定', noValue: '--', noDevices: 'デバイスがありません', noPlaced: '配置済みデバイスがありません', noBackground: '背景画像が未設定です' },
          label: { on: 'Online', off: 'Offline', lastSeen: '最終更新', unknown: '未設定' },
          camera: {
            lprTitle: 'LPR カメラ',
            lprText: 'ナンバープレート認識カメラの一覧、状態、検知ログをここに表示します。',
            parkingTitle: '車位管理カメラ',
            parkingText: '車位管理カメラの稼働状況、占有状態、イベント情報をここに表示します。'
          },
          meeting: { title: '会議室Now', text: '会議室の利用状況、予約、センサー情報をここに統合します。' }
        }
      }
    };
    const LANG = 'ja';
    const DASHBOARD_CACHE_KEY = 'iotDashboard.dashboardState';
    const DASHBOARD_PAGE_KEY = 'iotDashboard.activePage';
    const DASHBOARD_QUERY_KEY = 'iotDashboard.deviceQuery';
    const DASHBOARD_MENU_KEY = 'iotDashboard.menuCollapsed';
    const DASHBOARD_REFRESH_KEY = 'iotDashboard.refreshIntervalSec';
    const DASHBOARD_IOT_GROUP_KEY = 'iotDashboard.iotGroupCollapsed';
    const DASHBOARD_THEME_KEY = 'iotDashboard.theme';
    const DASHBOARD_METRIC_PREFS_KEY = 'iotDashboard.deviceMetricPrefs';
    const DASHBOARD_LOGO_KEY = 'iotDashboard.logoUrl';
    const DASHBOARD_ALLOWED_STORAGE_KEYS = [DASHBOARD_CACHE_KEY, DASHBOARD_PAGE_KEY, DASHBOARD_QUERY_KEY, DASHBOARD_MENU_KEY, DASHBOARD_REFRESH_KEY, DASHBOARD_IOT_GROUP_KEY, DASHBOARD_THEME_KEY, DASHBOARD_METRIC_PREFS_KEY, DASHBOARD_LOGO_KEY];
    const DASHBOARD_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const DEFAULT_LOGO_URL = 'https://www.dropbox.com/scl/fi/bwxb55mrt1qg4aqih5bxt/icon_dark.png?rlkey=g2mb3yooo636lr4qfa8zg8dlb&st=icn9wq0m&dl=1';
    const state = { data: null, deviceMap: {}, query: '', filter: 'all', timer: 0, metricEditorDeviceId: '', metricPages: {} };
    const $ = (id) => document.getElementById(id);

    function t(path) {
      return path.split('.').reduce((cur, key) => cur && cur[key], I18N[LANG]) || path;
    }

    function initText() {
      $('title').textContent = t('dashboard.header.title');
      $('search').placeholder = t('dashboard.devices.searchPlaceholder');
      state.query = getStored(DASHBOARD_QUERY_KEY, '');
      $('search').value = state.query;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      $('emptyText').textContent = t('common.status.loading');
      activatePage(getStored(DASHBOARD_PAGE_KEY, 'dashboard'), false);
    }

    function callServer(name, args, ok, options) {
      const silent = options && options.silent;
      if (!silent) {
        setStatus(t('common.status.loading'));
        document.querySelectorAll('button').forEach((b) => b.disabled = true);
      }
      google.script.run
        .withSuccessHandler((res) => {
          if (!silent) {
            document.querySelectorAll('button').forEach((b) => b.disabled = false);
            setStatus(t('common.status.ready'));
          }
          ok(res);
        })
        .withFailureHandler((err) => {
          if (!silent) document.querySelectorAll('button').forEach((b) => b.disabled = false);
          setStatus(err && err.message ? err.message : String(err), true);
        })[name](...args);
    }

    function load(silent) {
      callServer('apiGetDashboardState', [], render, { silent: !!silent });
    }

    function render(data) {
      state.data = data || {};
      state.deviceMap = buildDeviceMap(state.data.devices || []);
      saveCachedDashboard(state.data);
      applyRefreshIntervalControl(state.data.config || {});
      applyBackground(state.data.config || {});
      applyLogoConfig(state.data.config || {});
      renderStats();
      renderKpis();
      renderInsights();
      renderWidgets();
      renderDeviceList();
      $('navDevCount').textContent = (state.data.devices || []).length;
      scheduleRefresh();
    }

    function renderStats() {
      const devices = state.data.devices || [];
      const activeLayout = (state.data.layout || []).filter((i) => i.enabled !== false);
      const statDevices = $('statDevices');
      const statActive = $('statActive');
      const statPlaced = $('statPlaced');
      if (statDevices) statDevices.textContent = devices.length;
      if (statActive) statActive.textContent = devices.filter((d) => isOnline(d)).length;
      if (statPlaced) statPlaced.textContent = activeLayout.length;
    }

    function renderKpis() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const placed = (state.data.layout || []).filter((i) => i.enabled !== false).length;
      const lowBatt = devices.filter((d) => {
        const key = batteryMetricKey(d);
        const hit = key && d.metrics && d.metrics[key];
        const n = hit ? Number(hit.value) : NaN;
        return isFinite(n) && n < 20;
      }).length;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      const cards = [
        { label: t('dashboard.summary.devices'), val: devices.length, unit: '', foot: 'enabled ' + devices.filter((d) => d.enabled !== false).length, tone: 'flat' },
        { label: t('dashboard.summary.active'), val: online, unit: '/' + devices.length, foot: ratio + '% online', tone: ratio >= 70 ? 'up' : 'down' },
        { label: t('dashboard.summary.placed'), val: placed, unit: '', foot: 'map widgets', tone: 'flat' },
        { label: '低バッテリー', val: lowBatt, unit: '', foot: '< 20%', tone: lowBatt ? 'down' : 'up' }
      ];
      $('kpiGrid').innerHTML = cards.map((c, idx) => {
        const icon = ['M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 17v4h8v-4z', 'M22 12h-4l-3 9L9 3l-3 9H2', 'M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2z', 'M2 8h16v8H2zM20 11v2'][idx];
        return '<div class="kpi">' +
          '<div class="kpi-top"><span class="kpi-label">' + esc(c.label) + '</span><span class="kpi-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + icon + '"/></svg></span></div>' +
          '<div class="kpi-val">' + esc(c.val) + '<small>' + esc(c.unit) + '</small></div>' +
          '<div class="kpi-foot"><span class="trend ' + c.tone + '">' + esc(c.tone === 'up' ? 'OK' : c.tone === 'down' ? '注意' : 'INFO') + '</span>' + esc(c.foot) + '</div>' +
          sparkline([1, 2, 2, 3, 2, 4, Number(c.val) || 0]) +
          '</div>';
      }).join('');
    }

    function renderInsights() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      $('onlineRing').innerHTML = ringSvg(ratio);
      $('ringLegend').innerHTML =
        '<div class="legend-row"><span class="k"><i style="background:var(--ok)"></i>Online</span><span class="v">' + online + '</span></div>' +
        '<div class="legend-row"><span class="k"><i style="background:var(--bad)"></i>Offline</span><span class="v">' + (devices.length - online) + '</span></div>';
      renderBars('areaBars', groupCount(devices, (d) => d.area_id || d.location || t('dashboard.label.unknown')));
      const types = groupCount(devices, (d) => d.sensor_type || d.type || t('dashboard.label.unknown'));
      $('typeLegend').innerHTML = Object.keys(types).sort((a, b) => types[b] - types[a]).slice(0, 8).map((k, i) =>
        '<div class="legend-row"><span class="k"><i style="background:' + ['var(--accent)','var(--accent-2)','var(--accent-3)','var(--warn)'][i % 4] + '"></i>' + esc(k) + '</span><span class="v">' + types[k] + '</span></div>'
      ).join('');
    }

    function groupCount(rows, keyFn) {
      return (rows || []).reduce((acc, row) => {
        const key = keyFn(row);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(id, counts) {
      const keys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 8);
      const max = Math.max(1, ...keys.map((k) => counts[k]));
      $(id).innerHTML = keys.map((k) =>
        '<div class="bar-item"><div class="bar-top"><b>' + esc(k) + '</b><span>' + counts[k] + '</span></div><div class="bar-track"><i style="width:' + Math.round(counts[k] / max * 100) + '%"></i></div></div>'
      ).join('');
    }

    function ringSvg(ratio) {
      const c = 2 * Math.PI * 38;
      const off = c * (1 - ratio / 100);
      return '<circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/>' +
        '<circle cx="50" cy="50" r="38" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 50 50)"/>' +
        '<defs><linearGradient id="ringGrad" x1="0" x2="1"><stop stop-color="#2dd4bf"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs>' +
        '<text x="50" y="48" text-anchor="middle" class="ring-center">' + ratio + '%</text><text x="50" y="63" text-anchor="middle" class="ring-sub">ONLINE</text>';
    }

    function sparkline(vals) {
      const w = 100, h = 30, max = Math.max(1, ...vals), min = Math.min(...vals);
      const span = Math.max(1, max - min);
      const d = vals.map((v, i) => (i ? 'L' : 'M') + (i / (vals.length - 1) * w).toFixed(1) + ' ' + (h - ((v - min) / span) * (h - 4) - 2).toFixed(1)).join(' ');
      return '<svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="' + d + '" fill="none" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function renderWidgets() {
      const stage = $('stage');
      const openPopups = {};
      stage.querySelectorAll('.map-popup').forEach((n) => {
        const id = n.getAttribute('data-popup-id');
        if (id) openPopups[id] = true;
      });
      stage.querySelectorAll('.widget,.map-point,.map-popup').forEach((n) => n.remove());
      const layout = (state.data.layout || []).filter((i) => i.enabled !== false && (i.bind_type || 'device') === 'device');
      const devices = state.deviceMap;
      const bg = (state.data.config && state.data.config.background_url) || '';
      $('empty').classList.toggle('hidden', !!layout.length || !!bg);
      $('emptyText').textContent = bg ? t('dashboard.status.noPlaced') : t('dashboard.status.noBackground');

      layout.forEach((item) => {
        const device = devices[item.bind_ref] || {};
        const title = item.label || deviceDisplayTitle(device) || item.bind_ref;
        const config = item.style_config || parseStyle(item.style);
        const metrics = (config.metrics || []).slice(0, 12);
        const mode = config.displayMode === 'popup' ? 'popup' : 'card';
        if (mode === 'popup') {
          const point = document.createElement('button');
          point.type = 'button';
          point.className = 'map-point' + (!isOnline(device) ? ' off' : '');
          point.style.left = (Number(item.x_norm) * 100) + '%';
          point.style.top = (Number(item.y_norm) * 100) + '%';
          point.setAttribute('aria-label', title);
          point.addEventListener('click', (ev) => {
            ev.stopPropagation();
            showMapPopup(item, device, title, metrics);
          });
          stage.appendChild(point);
          if (openPopups[item.item_id]) showMapPopup(item, device, title, metrics);
          return;
        }
        const el = document.createElement('div');
        el.className = 'widget' + (!isOnline(device) ? ' off' : '');
        el.style.left = (Number(item.x_norm) * 100) + '%';
        el.style.top = (Number(item.y_norm) * 100) + '%';
        if (Number(config.cardWidth)) el.style.setProperty('--card-w', Number(config.cardWidth) + 'px');
        if (Number(config.cardHeight)) el.style.height = Number(config.cardHeight) + 'px';
        const batteryBadge = renderBatteryBadge(device, 'widget-battery');
        el.innerHTML =
          '<div class="widget-head">' +
          '<div class="widget-title">' + esc(title) + '</div>' +
          batteryBadge +
          '</div>' +
          '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
          '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
        stage.appendChild(el);
      });
    }

    function showMapPopup(item, device, title, metrics) {
      const stage = $('stage');
      const existing = stage.querySelector('.map-popup[data-popup-id="' + cssEscape(item.item_id) + '"]');
      if (existing) {
        existing.remove();
        return;
      }
      const popup = document.createElement('div');
      popup.className = 'widget map-popup' + (!isOnline(device) ? ' off' : '');
      popup.setAttribute('data-popup-id', item.item_id || '');
      popup.style.left = (Number(item.x_norm) * 100) + '%';
      popup.style.top = (Number(item.y_norm) * 100) + '%';
      const batteryBadge = renderBatteryBadge(device, 'widget-battery');
      popup.innerHTML =
        '<button class="popup-close" type="button" aria-label="閉じる">×</button>' +
        '<div class="widget-head">' +
        '<div class="widget-title">' + esc(title) + '</div>' +
        batteryBadge +
        '</div>' +
        '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
        '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
      stage.appendChild(popup);
    }

    function closeAllMapPopups() {
      $('stage').querySelectorAll('.map-popup').forEach((n) => n.remove());
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(String(value || ''));
      return String(value || '').replace(/["\\]/g, '\\$&');
    }

    function renderWidgetMetrics(device, metrics) {
      const configured = metrics || [];
      metrics = configured.filter((metric) => isDisplayMetric(metric) && !isBatteryMetric(metric));
      if (!metrics.length) {
        if (configured.length && batteryMetricKey(device)) return '';
        return '<div class="metric-line"><span class="metric-name">' + esc(t('dashboard.status.noMetric')) + '</span><span class="metric-value">--</span></div>';
      }
      return metrics.map((metric) => {
        const meta = metricMeta(metric);
        const hit = device.metrics && device.metrics[metric];
        return '<div class="metric-line">' +
          '<span class="metric-name">' + esc(meta.label || metric) + '</span>' +
          '<span class="metric-value">' + esc(hit ? formatValue(hit.value, meta.unit) : t('dashboard.status.noValue')) + '</span>' +
          '</div>';
      }).join('');
    }

    function renderDeviceList() {
      const q = state.query.toLowerCase();
      const rows = (state.data.devices || []).filter((d) => {
        const hay = [d.device_id, d.name, d.area_id, d.location, d.type, d.sensor_type].join(' ').toLowerCase();
        const queryOk = !q || hay.indexOf(q) > -1;
        const filterOk = state.filter === 'all' || (state.filter === 'on' ? isOnline(d) : !isOnline(d));
        return queryOk && filterOk;
      }).sort((a, b) => String(a.area_id || a.device_id).localeCompare(String(b.area_id || b.device_id)));

      $('deviceList').innerHTML = rows.map((d) => {
        const selectedKeys = deviceDisplayMetrics(d).slice(0, 12);
        return '<div class="dev ' + (!isOnline(d) ? 'off' : '') + '">' +
          '<div class="dev-head">' +
          '<div><div class="dev-name">' + esc(deviceDisplayTitle(d) || d.device_id) + '</div><div class="dev-id">' + esc(d.device_id) + '</div></div>' +
          '<div class="dev-actions">' +
          renderBatteryBadge(d, 'device-battery') +
          '<button class="icon-btn metric-edit-toggle" type="button" title="表示項目" onclick="toggleDeviceMetricEditor(\'' + esc(attrEscape(d.device_id)) + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>' +
          '<span class="pill ' + (!isOnline(d) ? 'off' : '') + '">' + esc(isOnline(d) ? t('dashboard.label.on') : t('dashboard.label.off')) + '</span>' +
          '</div>' +
          '</div>' +
          '<div class="dev-meta">' + esc([d.name, d.type, d.sensor_type].filter(Boolean).join(' / ') || t('dashboard.label.unknown')) + '<span class="dot"></span>' + esc(t('dashboard.label.lastSeen') + ': ' + (shortDate(d.last_seen) || t('dashboard.label.unknown'))) + '</div>' +
          renderDeviceMetricPage(d, selectedKeys) +
          renderDeviceMetricEditor(d, selectedKeys) +
          '</div>';
      }).join('') || '<div class="muted">' + esc(t('dashboard.status.noDevices')) + '</div>';
    }

    function renderDeviceMetricPage(device, selectedKeys) {
      const pageSize = 6;
      const total = selectedKeys.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      const deviceId = device.device_id;
      let page = Math.max(0, Math.min(totalPages - 1, Number(state.metricPages[deviceId] || 0)));
      state.metricPages[deviceId] = page;
      const start = page * pageSize;
      const visibleKeys = selectedKeys.slice(start, start + pageSize);
      const metrics = visibleKeys.map((m) => {
        const hit = device.metrics && device.metrics[m];
        const meta = metricMeta(m);
        const raw = hit ? Number(hit.value) : NaN;
        const pct = isFinite(raw) ? Math.max(4, Math.min(100, Math.round(raw / metricMax(m) * 100))) : 0;
        return '<div class="metric">' +
          '<div class="metric-k">' + metricIcon(m) + '<span>' + esc(meta.label || m) + '</span></div>' +
          '<div class="metric-v">' + esc(hit ? formatValue(hit.value, meta.unit) : '--') + '</div>' +
          '<div class="mbar"><i style="width:' + pct + '%"></i></div>' +
          '</div>';
      }).join('');
      const nav = total > pageSize
        ? '<div class="metric-page-nav">' +
          '<span class="metric-page-count">' + esc((start + 1) + '-' + Math.min(start + pageSize, total) + ' / ' + total) + '</span>' +
          '<button class="metric-page-btn" type="button" title="前へ" onclick="shiftDeviceMetricPage(\'' + esc(attrEscape(deviceId)) + '\', -1, ' + total + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>' +
          '<button class="metric-page-btn" type="button" title="次へ" onclick="shiftDeviceMetricPage(\'' + esc(attrEscape(deviceId)) + '\', 1, ' + total + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>' +
          '</div>'
        : '';
      return '<div class="metrics-shell">' + nav + '<div class="metrics">' + metrics + '</div></div>';
    }

    function shiftDeviceMetricPage(deviceId, delta, total) {
      const pageSize = 6;
      const totalPages = Math.max(1, Math.ceil(Number(total || 0) / pageSize));
      const current = Math.max(0, Math.min(totalPages - 1, Number(state.metricPages[deviceId] || 0)));
      state.metricPages[deviceId] = (current + delta + totalPages) % totalPages;
      renderDeviceList();
    }

    function applyBackground(config) {
      const w = Number(config.map_width || 1200);
      const h = Number(config.map_height || 800);
      const url = config.background_url || '';
      $('stage').style.setProperty('--aspect', String(w && h ? w / h : 1.5));
      $('stage').style.backgroundImage = url ? 'url("' + url + '")' : '';
      fitStageToWrap();
    }

    function applyLogoConfig(config) {
      config = config || {};
      const hasLogo = Object.prototype.hasOwnProperty.call(config, 'logo_url');
      const url = hasLogo ? (config.logo_url || DEFAULT_LOGO_URL) : getStored(DASHBOARD_LOGO_KEY, DEFAULT_LOGO_URL);
      document.querySelectorAll('.logo-img').forEach((img) => img.src = url);
      setStored(DASHBOARD_LOGO_KEY, url);
    }

    function fitStageToWrap() {
      const wrap = $('stageWrap');
      const stage = $('stage');
      if (!wrap || !stage) return;
      const aspect = Number(getComputedStyle(stage).getPropertyValue('--aspect')) || 1.5;
      const box = wrap.getBoundingClientRect();
      const padX = 20;
      const padY = 20;
      const maxW = Math.max(240, box.width - padX);
      const maxH = Math.max(180, box.height - padY);
      let width = maxW;
      let height = width / aspect;
      if (height > maxH) {
        height = maxH;
        width = height * aspect;
      }
      stage.style.width = Math.floor(width) + 'px';
      stage.style.height = Math.floor(height) + 'px';
    }

    function toggleMapFullscreen() {
      document.body.classList.toggle('map-fullscreen');
      setTimeout(fitStageToWrap, 40);
    }

    function toggleBrowserFullscreen() {
      const root = document.documentElement;
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
        return;
      }
      if (root.requestFullscreen) root.requestFullscreen().catch(() => {});
    }

    function deviceMap() {
      return state.deviceMap || {};
    }

    function buildDeviceMap(devices) {
      const out = {};
      (devices || []).forEach((d) => out[d.device_id] = d);
      return out;
    }

    function displayLocation(device) {
      if (!device) return '';
      return [device.area_id, device.location].filter(Boolean).join(' / ');
    }

    function deviceDisplayTitle(device) {
      if (!device) return '';
      const model = device.sensor_type || device.type || device.name || '';
      const place = displayLocation(device);
      return [model, place].filter(Boolean).join(' / ');
    }

    function deviceDisplayMetrics(device) {
      const keys = ((device && device.metricKeys) || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const prefs = getMetricPrefs();
      if (Object.prototype.hasOwnProperty.call(prefs, device.device_id)) {
        return Array.isArray(prefs[device.device_id]) ? prefs[device.device_id].filter((key) => keys.indexOf(key) > -1) : [];
      }
      return keys;
    }

    function renderDeviceMetricEditor(device, selectedKeys) {
      if (!device || state.metricEditorDeviceId !== device.device_id) return '';
      const keys = (device.metricKeys || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const selected = selectedKeys || deviceDisplayMetrics(device);
      const ordered = selected.concat(keys.filter((key) => selected.indexOf(key) < 0));
      return '<div class="metric-editor" data-device-id="' + esc(attrEscape(device.device_id)) + '">' +
        '<div class="metric-editor-head"><span>表示項目 / 順序</span><span class="metric-editor-actions"><button class="secondary" type="button" onclick="resetDeviceMetricPrefs(\'' + esc(attrEscape(device.device_id)) + '\')">Reset</button><button class="secondary" type="button" onclick="toggleDeviceMetricEditor(\'\')">閉じる</button></span></div>' +
        '<div class="metric-chip-list">' + ordered.map((key) => {
          const active = selected.indexOf(key) > -1;
          return '<button type="button" class="metric-chip ' + (active ? 'active' : '') + '" draggable="' + (active ? 'true' : 'false') + '" data-key="' + esc(attrEscape(key)) + '">' + esc(metricMeta(key).label || key) + '</button>';
        }).join('') + '</div>' +
        '</div>';
    }

    function getMetricPrefs() {
      try {
        return JSON.parse(localStorage.getItem(DASHBOARD_METRIC_PREFS_KEY) || '{}') || {};
      } catch (err) {
        localStorage.removeItem(DASHBOARD_METRIC_PREFS_KEY);
        return {};
      }
    }

    function setMetricPrefs(prefs) {
      try { localStorage.setItem(DASHBOARD_METRIC_PREFS_KEY, JSON.stringify(prefs || {})); } catch (err) {}
    }

    function saveDeviceMetricPrefs(deviceId, keys) {
      const prefs = getMetricPrefs();
      prefs[deviceId] = (keys || []).filter(Boolean).slice(0, 12);
      setMetricPrefs(prefs);
    }

    window.toggleDeviceMetricEditor = function (deviceId) {
      state.metricEditorDeviceId = state.metricEditorDeviceId === deviceId ? '' : (deviceId || '');
      renderDeviceList();
    };

    window.resetDeviceMetricPrefs = function (deviceId) {
      const prefs = getMetricPrefs();
      delete prefs[deviceId];
      setMetricPrefs(prefs);
      renderDeviceList();
    };

    function metricMeta(metric) {
      return (state.data.metricMeta && state.data.metricMeta[metric]) || inferMetricMeta(metric);
    }

    function inferMetricMeta(metric) {
      const raw = String(metric || '');
      const direct = {
        current_total: { label: '現在人数', unit: '人' },
        max_counted: { label: '最大人数', unit: '人' },
        Max_counted: { label: '最大人数', unit: '人' },
        total_mapped_regions: { label: 'マップ済みリージョン数', unit: '' },
        in_counted: { label: '入場人数', unit: '人' },
        out_counted: { label: '退場人数', unit: '人' },
        capacity_counted: { label: '在室増減', unit: '人' },
        total_data_in_cumulative_counted: { label: '累計入場人数', unit: '人' },
        total_data_out_cumulative_counted: { label: '累計退場人数', unit: '人' },
        total_data_capacity_cumulative_counted: { label: '累計在室増減', unit: '人' },
        line_trigger_data_in: { label: '入場トリガー', unit: '人' },
        line_trigger_data_out: { label: '退場トリガー', unit: '人' }
      };
      if (direct[raw]) return direct[raw];

      let m = raw.match(/^flow_data_([A-D])_([A-D])$/);
      if (m) return { label: m[1] + '-' + m[2] + ' 人流', unit: '人' };

      m = raw.match(/^current_counted_(\d+)$/);
      if (m) return { label: 'リージョン' + (Number(m[1]) + 1) + ' 現在人数', unit: '人' };

      m = raw.match(/^occupancy_(\d+)$/);
      if (m) return { label: 'リージョン' + (Number(m[1]) + 1) + ' 占有状態', unit: '' };

      m = raw.match(/^numbering_regions_(\d+)$/);
      if (m) return { label: 'リージョン番号 ' + (Number(m[1]) + 1), unit: '' };

      m = raw.match(/^dwell_time_data_(\d+)_(region|max_dwell_time|avg_dwell_time|people_id|duration)$/);
      if (m) {
        const n = Number(m[1]) + 1;
        const map = {
          region: { label: '滞在リージョン', unit: '' },
          max_dwell_time: { label: '最大滞在時間', unit: 's' },
          avg_dwell_time: { label: '平均滞在時間', unit: 's' },
          people_id: { label: '人物ID', unit: '' },
          duration: { label: '滞在時間', unit: 'ms' }
        };
        const hit = map[m[2]] || { label: raw, unit: '' };
        return { label: hit.label + ' ' + n, unit: hit.unit };
      }

      return { label: raw, unit: '' };
    }

    function renderBatteryBadge(device, extraClass) {
      const key = batteryMetricKey(device);
      if (!key) return '';
      const hit = device.metrics && device.metrics[key];
      const value = hit ? Number(hit.value) : NaN;
      const pct = isFinite(value) ? Math.max(0, Math.min(100, Math.round(value))) : 0;
      const label = isFinite(value) ? pct + '%' : '--';
      const small = extraClass === 'widget-battery' ? ' sm' : '';
      return '<span class="batt ' + batteryClass(pct, isFinite(value)) + small + '" style="--bp:' + pct + '%">' +
        '<i></i><span>' + esc(label) + '</span></span>';
    }

    function isOnline(device) {
      if (!device) return false;
      if (typeof device.online === 'boolean') return device.online;
      return device.enabled !== false;
    }

    function batteryMetricKey(device) {
      const metrics = (device && device.metrics) || {};
      const keys = Object.keys(metrics);
      const preferred = ['battery', 'battery_level', 'battery_percent', 'battery_percentage'];
      for (let i = 0; i < preferred.length; i++) {
        if (Object.prototype.hasOwnProperty.call(metrics, preferred[i])) return preferred[i];
      }
      for (let j = 0; j < keys.length; j++) {
        if (isBatteryMetric(keys[j])) return keys[j];
      }
      return '';
    }

    function isBatteryMetric(metric) {
      const key = String(metric || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
      return key === 'battery' || key === 'battery_level' || key === 'battery_percent' || key === 'battery_percentage' || /(^|_)battery($|_)/.test(key);
    }

    function isDisplayMetric(metric) {
      const key = String(metric || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) return false;
      if (/^(application|applicationid|gateway|gatewayid|deviceaddress|devaddr|fcnt|fport|datarate|frequency|rssi|snr|adr|confirmed|token)$/.test(key)) return false;
      if (/^(name|model|devicename|devname|devicemodel)$/.test(key)) return false;
      if (/^(ts|timestamp|time|datetime|date)$/.test(key)) return false;
      if (/^(event|reporttype|snapshot)$/.test(key)) return false;
      if (/^(devicestatus|lorawanclass|firmwareversion|hardwareversion|ipsoversion|tslversion|sn|devicesn|devicedeveui|deveui|deviceeui)$/.test(key)) return false;
      if (/sensorstatus$/.test(key)) return false;
      if (/^deviceinfo(device|devicesn|devicemac|ipaddress)$/.test(key)) return false;
      if (/^timeinfo(time|timezone|dststatus|starttime|endtime)$/.test(key)) return false;
      if (/^regionsname\d*$/.test(key)) return false;
      if (/^dwelltimedata\d*(dwellstarttime|dwellendtime)$/.test(key)) return false;
      return true;
    }

    function batteryClass(pct, hasValue) {
      if (!hasValue) return 'b-un';
      if (pct >= 50) return 'b-hi';
      if (pct >= 20) return 'b-mid';
      return 'b-lo';
    }

    function metricIcon(metric) {
      const key = String(metric || '').toLowerCase();
      const paths = {
        temperature: '<path d="M14 14.76V5a2 2 0 0 0-4 0v9.76a4 4 0 1 0 4 0z"/>',
        humidity: '<path d="M12 3c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11z"/>',
        co2: '<circle cx="12" cy="12" r="9"/><path d="M8 12h8"/>',
        occupancy: '<circle cx="12" cy="8" r="3"/><path d="M6 20a6 6 0 0 1 12 0"/>',
        people_count_all: '<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/>',
        current_total: '<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><circle cx="17" cy="10" r="2"/><path d="M15 20a4 4 0 0 1 6 0"/>',
        in_counted: '<path d="M4 12h14"/><path d="m12 6 6 6-6 6"/><circle cx="6" cy="6" r="2"/>',
        out_counted: '<path d="M20 12H6"/><path d="m12 6-6 6 6 6"/><circle cx="18" cy="6" r="2"/>',
        voltage: '<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>',
        power_consumption: '<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>'
      };
      const p = paths[key] || (key.indexOf('flow_data_') === 0 ? '<path d="M4 7h11"/><path d="m11 3 4 4-4 4"/><path d="M20 17H9"/><path d="m13 13-4 4 4 4"/>' : '<circle cx="12" cy="12" r="3"/>');
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>';
    }

    function metricMax(metric) {
      const key = String(metric || '').toLowerCase();
      const max = { temperature: 40, humidity: 100, co2: 2000, tvoc: 1000, pm2_5: 100, pressure: 1100, occupancy: 1, people_count_all: 20, current_total: 20, max_counted: 20, in_counted: 20, out_counted: 20, capacity_counted: 20, voltage: 240, power_consumption: 100 };
      if (/^(flow_data|current_counted|dwell_time_data)_/.test(key)) return 20;
      return max[key] || 100;
    }

    function parseStyle(style) {
      try {
        const obj = JSON.parse(style || '{}');
        return { metrics: Array.isArray(obj.metrics) ? obj.metrics : [], displayMode: obj.displayMode === 'popup' ? 'popup' : 'card', cardWidth: Number(obj.cardWidth || obj.card_width) || 0, cardHeight: Number(obj.cardHeight || obj.card_height) || 0 };
      } catch (err) {
        return { metrics: [], displayMode: 'card', cardWidth: 0, cardHeight: 0 };
      }
    }

    function getCachedDashboard() {
      try {
        const raw = localStorage.getItem(DASHBOARD_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (isExpiredCache(cached, DASHBOARD_CACHE_MAX_AGE_MS)) {
          localStorage.removeItem(DASHBOARD_CACHE_KEY);
          return null;
        }
        return cached;
      } catch (err) {
        try { localStorage.removeItem(DASHBOARD_CACHE_KEY); } catch (e) {}
        return null;
      }
    }

    function saveCachedDashboard(data) {
      try {
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({
          data: data,
          cached_at: new Date().toISOString()
        }));
      } catch (err) {}
    }

    function applyCachedDashboard() {
      const cached = getCachedDashboard();
      if (!cached) return;
      const data = cached.data || cached;
      state.data = data;
      render(data);
      setStatus(t('common.status.cached'));
    }

    function getStored(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v == null ? fallback : v;
      } catch (err) {
        return fallback;
      }
    }

    function setStored(key, value) {
      try { localStorage.setItem(key, value); } catch (err) {}
    }

    function cleanupLocalStorage(namespace, allowedKeys, maxAgeMs) {
      try {
        const allowed = {};
        allowedKeys.forEach((key) => allowed[key] = true);
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (!key || key.indexOf(namespace) !== 0) continue;
          if (!allowed[key]) {
            localStorage.removeItem(key);
            continue;
          }
          if (key === DASHBOARD_CACHE_KEY) {
            const cached = JSON.parse(localStorage.getItem(key) || 'null');
            if (isExpiredCache(cached, maxAgeMs)) localStorage.removeItem(key);
          }
        }
      } catch (err) {}
    }

    function isExpiredCache(cached, maxAgeMs) {
      if (!cached || !cached.cached_at) return false;
      const t = new Date(cached.cached_at).getTime();
      return isFinite(t) && Date.now() - t > maxAgeMs;
    }

    function activatePage(page, persist) {
      const target = normalizePage(page || 'dashboard');
      document.querySelectorAll('[data-page-target]').forEach((n) => {
        n.classList.toggle('active', n.getAttribute('data-page-target') === target);
      });
      document.querySelectorAll('[data-page]').forEach((section) => {
        section.classList.toggle('hidden', section.getAttribute('data-page') !== target);
      });
      if (persist !== false) setStored(DASHBOARD_PAGE_KEY, target);
      if (target === 'map') setTimeout(fitStageToWrap, 0);
    }

    function normalizePage(page) {
      if (page === 'iot') return 'map';
      if (page === 'devices') return 'dashboard';
      if (page === 'parking') return 'pmc';
      return page || 'dashboard';
    }

    function scheduleRefresh() {
      clearTimeout(state.timer);
      const seconds = selectedRefreshIntervalSec();
      state.timer = setTimeout(() => load(true), Math.max(60, seconds) * 1000);
    }

    function selectedRefreshIntervalSec() {
      const n = Number($('refreshInterval').value || getStored(DASHBOARD_REFRESH_KEY, ''));
      return n === 300 || n === 600 ? n : 60;
    }

    function applyRefreshIntervalControl(config) {
      const stored = getStored(DASHBOARD_REFRESH_KEY, '');
      const fromConfig = Number(config.refresh_interval_sec || 60);
      const value = stored || String(fromConfig === 300 || fromConfig === 600 ? fromConfig : 60);
      $('refreshInterval').value = value;
    }

    function setIotGroupCollapsed(collapsed) {
      $('iotMenuParent').setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      $('iotMenuGroup').classList.toggle('collapsed', !!collapsed);
      setStored(DASHBOARD_IOT_GROUP_KEY, collapsed ? '1' : '0');
    }

    function setStatus(text, isError) {
      $('status').textContent = text || '';
      $('status').className = 'status' + (isError ? ' error' : '');
    }

    function tickClock() {
      const d = new Date();
      $('clkTime').textContent = d.toLocaleTimeString('ja-JP');
      $('clkDate').textContent = d.toLocaleDateString('ja-JP', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    const THEME_ICONS = {
      light: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>',
      dark: '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
      system: '<rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/>'
    };
    const THEME_LABELS = { light: 'Light', dark: 'Dark', system: 'System (OS追従)' };
    function systemPrefersDark() {
      return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    function applyTheme(mode) {
      const m = (mode === 'light' || mode === 'system') ? mode : 'dark';
      const dark = m === 'system' ? systemPrefersDark() : (m === 'dark');
      document.body.classList.toggle('theme-light', !dark);
      if ($('themeIco')) $('themeIco').innerHTML = THEME_ICONS[m];
      if ($('themeToggle')) $('themeToggle').setAttribute('title', 'テーマ: ' + THEME_LABELS[m]);
    }

    function formatValue(v, unit) {
      const n = Number(v);
      const body = isFinite(n) ? String(Math.round(n * 100) / 100) : String(v == null ? '' : v);
      return unit ? body + unit : body;
    }

    function shortDate(v) {
      if (!v) return '';
      const d = new Date(v);
      return isNaN(d.getTime()) ? v : d.toLocaleString('ja-JP');
    }

    function esc(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function attrEscape(v) {
      return String(v == null ? '' : v).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    $('refreshInterval').addEventListener('change', () => {
      setStored(DASHBOARD_REFRESH_KEY, String(selectedRefreshIntervalSec()));
      scheduleRefresh();
    });
    function setActiveThemeSeg(mode) {
      document.querySelectorAll('#themeSeg button').forEach((b) => b.classList.toggle('on', b.getAttribute('data-theme') === mode));
    }
    function setTheme(mode) {
      setStored(DASHBOARD_THEME_KEY, mode);
      applyTheme(mode);
      setActiveThemeSeg(mode);
    }
    $('themeSeg').addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (b) setTheme(b.getAttribute('data-theme'));
    });
    $('settingsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      $('settingsPanel').classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#settingsPanel') && !e.target.closest('#settingsBtn')) $('settingsPanel').classList.remove('open');
    });
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (getStored(DASHBOARD_THEME_KEY, 'dark') === 'system') applyTheme('system');
      });
    }
    $('iotMenuParent').addEventListener('click', () => {
      setIotGroupCollapsed($('iotMenuParent').getAttribute('aria-expanded') !== 'false');
    });
    if ($('collapsePopupsBtn')) $('collapsePopupsBtn').addEventListener('click', closeAllMapPopups);
    $('fullscreenBtn').addEventListener('click', toggleBrowserFullscreen);
    $('stageFullscreenBtn').addEventListener('click', toggleMapFullscreen);
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && document.body.classList.contains('map-fullscreen')) toggleMapFullscreen();
    });
    $('deviceList').addEventListener('click', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (!chip) return;
      const editor = chip.closest('.metric-editor');
      if (!editor) return;
      chip.classList.toggle('active');
      chip.setAttribute('draggable', chip.classList.contains('active') ? 'true' : 'false');
      saveDeviceMetricPrefs(editor.getAttribute('data-device-id'), Array.from(editor.querySelectorAll('.metric-chip.active')).map((n) => n.getAttribute('data-key')));
      renderDeviceList();
    });
    $('deviceList').addEventListener('dragstart', (ev) => {
      const chip = ev.target.closest('.metric-chip.active');
      if (!chip) return;
      chip.classList.add('dragging');
    });
    $('deviceList').addEventListener('dragend', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (chip) chip.classList.remove('dragging');
      const editor = ev.target.closest('.metric-editor');
      if (!editor) return;
      saveDeviceMetricPrefs(editor.getAttribute('data-device-id'), Array.from(editor.querySelectorAll('.metric-chip.active')).map((n) => n.getAttribute('data-key')));
      renderDeviceList();
    });
    $('deviceList').addEventListener('dragover', (ev) => {
      const editor = ev.target.closest('.metric-editor');
      if (!editor) return;
      const dragging = editor.querySelector('.metric-chip.dragging');
      const over = ev.target.closest('.metric-chip.active');
      if (!dragging || !over || dragging === over) return;
      ev.preventDefault();
      const box = over.getBoundingClientRect();
      const before = ev.clientX < box.left + box.width / 2;
      over.parentNode.insertBefore(dragging, before ? over : over.nextSibling);
    });
    window.addEventListener('resize', fitStageToWrap);
    $('stage').addEventListener('click', (ev) => {
      if (ev.target.closest('.popup-close')) {
        ev.stopPropagation();
        ev.target.closest('.map-popup').remove();
        return;
      }
      if (ev.target.closest('.map-popup')) ev.stopPropagation();
    });
    $('menuToggle').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 920px)').matches) {
        document.body.classList.toggle('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DASHBOARD_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarCollapse').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 920px)').matches) {
        document.body.classList.remove('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DASHBOARD_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarBackdrop').addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
    document.querySelectorAll('[data-page-target]').forEach((btn) => {
      btn.addEventListener('click', () => {
        activatePage(btn.getAttribute('data-page-target'), true);
        document.body.classList.remove('menu-open');
      });
    });
    $('search').addEventListener('input', (ev) => {
      state.query = ev.target.value || '';
      setStored(DASHBOARD_QUERY_KEY, state.query);
      renderDeviceList();
    });
    document.querySelectorAll('#filterSeg [data-filter]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.filter = btn.getAttribute('data-filter') || 'all';
        document.querySelectorAll('#filterSeg [data-filter]').forEach((b) => b.classList.toggle('on', b === btn));
        renderDeviceList();
      });
    });
    cleanupLocalStorage('iotDashboard.', DASHBOARD_ALLOWED_STORAGE_KEYS, DASHBOARD_CACHE_MAX_AGE_MS);
    initText();
    if (getStored(DASHBOARD_MENU_KEY, '0') === '1') document.body.classList.add('menu-collapsed');
    setIotGroupCollapsed(getStored(DASHBOARD_IOT_GROUP_KEY, '0') === '1');
    (function () { const tm = getStored(DASHBOARD_THEME_KEY, 'dark'); applyTheme(tm); setActiveThemeSeg(tm); })();
    applyLogoConfig({});
    tickClock();
    setInterval(tickClock, 1000);
    applyCachedDashboard();
    load();
  </script>
</body>
</html>

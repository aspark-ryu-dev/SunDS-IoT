<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://dl.dropboxusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070910;
      --bg-1: #0b0e17;
      --panel: rgba(255,255,255,0.038);
      --panel-2: rgba(255,255,255,0.055);
      --panel-hi: rgba(255,255,255,0.085);
      --glass: rgba(13,17,27,0.72);
      --card-border: rgba(255,255,255,0.07);
      --card-border-2: rgba(255,255,255,0.11);
      --ink: #eef1f8;
      --ink-dim: #c7cdda;
      --muted: #8b93a7;
      --muted-2: #5c6478;
      --line: rgba(255,255,255,0.07);
      --accent: #2dd4bf;
      --accent-2: #5b9df6;
      --accent-3: #818cf8;
      --grad: linear-gradient(115deg, #2dd4bf 0%, #5b9df6 55%, #818cf8 100%);
      --grad-soft: linear-gradient(115deg, rgba(45,212,191,.18), rgba(129,140,248,.18));
      --ok: #34d399;
      --ok-soft: rgba(52,211,153,.13);
      --warn: #fbbf24;
      --warn-soft: rgba(251,191,36,.13);
      --bad: #fb7185;
      --bad-soft: rgba(251,113,133,.13);
      --field: rgba(255,255,255,0.055);
      --map-card-bg: rgba(13,17,27,0.78);
      --map-card-bg-strong: rgba(13,17,27,0.88);
      --map-card-border: rgba(255,255,255,0.14);
      --map-card-ink: #eef1f8;
      --map-card-muted: #9aa4b8;
      --map-card-shadow: 0 18px 38px -18px rgba(0,0,0,.82), 0 2px 8px rgba(0,0,0,.26);
      --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -16px rgba(0,0,0,.7);
      --shadow-2: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 56px -28px rgba(0,0,0,.78);
      --glow: 0 8px 24px -8px rgba(45,212,191,.5);
      --r-sm: 9px;
      --r-md: 12px;
      --r-lg: 16px;
      --header-h: 64px;
      --side-w: 248px;
      --side-w-collapsed: 76px;
      font-family: "Zen Kaku Gothic New", "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-display: "Outfit", "Zen Kaku Gothic New", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    body.theme-light {
      color-scheme: light;
      --bg: #eef1f7;
      --bg-1: #f6f8fc;
      --panel: rgba(15,23,42,0.028);
      --panel-2: rgba(15,23,42,0.045);
      --panel-hi: rgba(15,23,42,0.07);
      --glass: rgba(255,255,255,0.78);
      --card-border: rgba(15,23,42,0.09);
      --card-border-2: rgba(15,23,42,0.14);
      --ink: #0f1626;
      --ink-dim: #36405a;
      --muted: #687288;
      --muted-2: #97a0b4;
      --line: rgba(15,23,42,0.09);
      --field: rgba(15,23,42,0.045);
      --map-card-bg: rgba(255,255,255,0.78);
      --map-card-bg-strong: rgba(255,255,255,0.9);
      --map-card-border: rgba(15,23,42,0.14);
      --map-card-ink: #0f1626;
      --map-card-muted: #687288;
      --map-card-shadow: 0 18px 36px -22px rgba(15,23,42,.44), 0 2px 8px rgba(15,23,42,.12);
      --shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 8px 22px -16px rgba(15,23,42,.4);
      --shadow-2: 0 1px 0 rgba(255,255,255,.7) inset, 0 24px 50px -28px rgba(15,23,42,.35);
      --accent: #0d9488;
      --accent-2: #2563eb;
      --accent-3: #7c3aed;
      --grad: linear-gradient(115deg, #0ea5a4 0%, #3b82f6 55%, #8b5cf6 100%);
      --grad-soft: linear-gradient(115deg, rgba(13,148,136,.14), rgba(124,58,237,.14));
      --glow: 0 8px 24px -8px rgba(13,148,136,.38);
    }
    body.theme-light {
      background:
        radial-gradient(900px 520px at 4% -10%, rgba(13,148,136,.18), transparent 58%),
        radial-gradient(1000px 620px at 106% -8%, rgba(124,58,237,.15), transparent 56%),
        radial-gradient(700px 500px at 80% 120%, rgba(37,99,235,.12), transparent 60%),
        var(--bg);
      background-attachment: fixed;
    }
    body.theme-light .page-ico { color: #fff; }
    body.theme-light header {
      background: linear-gradient(115deg, #0d9488 0%, #2563eb 55%, #7c3aed 100%);
      border-bottom: 1px solid rgba(255,255,255,.22);
    }
    body.theme-light header h1 {
      background: linear-gradient(100deg, #ffffff 0%, #d6fff8 30%, #ffffff 55%, #e4dcff 78%, #ffffff 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 1px 4px rgba(15,23,42,.3));
    }
    body.theme-light header .brand-sub { color: rgba(255,255,255,.82); }
    body.theme-light header .brand-copy::after {
      background: linear-gradient(90deg, rgba(255,255,255,.9), rgba(255,255,255,.35), transparent);
      box-shadow: 0 0 14px rgba(255,255,255,.35);
    }
    body.theme-light header .logo {
      background: transparent;
      box-shadow: none;
    }
    body.theme-light header .logo::before {
      inset: -8px;
      background: radial-gradient(circle at 38% 30%,
        rgba(8,47,46,.95) 0%,
        rgba(16,38,95,.9) 46%,
        rgba(46,16,101,.65) 70%,
        rgba(46,16,101,0) 96%);
      filter: blur(4px);
    }
    body.theme-light header .logo-img { width: 44px; height: 44px; filter: drop-shadow(0 2px 8px rgba(45,212,191,.45)); }
    body.theme-light header .menu-toggle,
    body.theme-light header .icon-btn {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.36);
      color: #fff;
    }
    body.theme-light header .menu-toggle:hover,
    body.theme-light header .icon-btn:hover { background: rgba(255,255,255,.28); color: #fff; }
    body.theme-light header .clock-time { color: #fff; }
    body.theme-light header .clock-date { color: rgba(255,255,255,.78); }
    body.theme-light header .live-dot {
      border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.16);
      color: #d9fff3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 4% -10%, rgba(45,212,191,.14), transparent 58%),
        radial-gradient(1000px 620px at 106% -8%, rgba(129,140,248,.16), transparent 56%),
        radial-gradient(700px 500px at 80% 120%, rgba(91,157,246,.10), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(140%);
      border-bottom: 1px solid var(--line);
    }
    .menu-toggle {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      transition: .16s;
    }
    .menu-toggle:hover { background: var(--panel-hi); color: var(--ink); }
    .menu-toggle svg { width: 20px; height: 20px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
      position: relative;
    }
    .brand-copy::after {
      content: "";
      width: 100%;
      max-width: 260px;
      height: 1px;
      background: linear-gradient(90deg, rgba(45,212,191,.85), rgba(129,140,248,.42), transparent);
      box-shadow: 0 0 14px rgba(45,212,191,.35);
    }
    .logo {
      position: relative;
      width: 50px; height: 50px; flex: none;
      border-radius: 12px;
      background: transparent;
      display: grid; place-items: center;
      box-shadow: none;
      overflow: visible;
    }
    .logo::before {
      content: ""; position: absolute; inset: -7px; z-index: -1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,157,246,.42), rgba(45,212,191,.18) 45%, transparent 72%);
      filter: blur(7px);
    }
    .logo-img { width: 50px; height: 50px; object-fit: contain; display: block; filter: drop-shadow(0 3px 9px rgba(45,212,191,.45)); }
    h1 {
      margin: 0;
      font: 900 22px/1.05 var(--font-display);
      letter-spacing: .01em;
      background: linear-gradient(100deg, #e8c887 0%, #2dd4bf 26%, #5b9df6 50%, #9aa6ff 72%, #e8c887 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 1px 6px rgba(91,157,246,.24));
      animation: titleSheen 9s ease-in-out infinite;
    }
    @keyframes titleSheen {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) { h1 { animation: none; } }
    .sub { color: var(--muted); font-size: 11.5px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .header-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    button {
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 8px 13px;
      font: inherit;
      font-weight: 700;
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
    }
    button:hover { background: var(--panel-hi); color: var(--ink); }
    button:disabled { opacity: .55; cursor: wait; }
    .icon-btn {
      width: 40px;
      height: 40px;
      flex: none;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
      transition: .16s;
      box-shadow: none;
    }
    .icon-btn:hover { background: var(--panel-hi); color: var(--ink); }
    .icon-btn svg { width: 19px; height: 19px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    .header-control select {
      width: auto;
      min-width: 66px;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      padding: 6px 7px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    select option {
      background: var(--bg-1);
      color: var(--ink);
    }
    input:focus {
      outline: none;
      border-color: rgba(45,212,191,0.55);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.14);
    }
    .app {
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr);
      min-height: 100vh;
      padding-top: var(--header-h);
      transition: grid-template-columns .2s ease;
    }
    body.menu-collapsed .app {
      grid-template-columns: var(--side-w-collapsed) minmax(0, 1fr);
    }
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--side-w);
      height: calc(100vh - var(--header-h));
      overflow: auto;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(18px);
      padding: 16px 12px;
      transition: width .2s ease;
    }
    body.menu-collapsed .sidebar { width: var(--side-w-collapsed); }
    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .sidebar-footer .footer-refresh { width: 100%; justify-content: space-between; }
    .sidebar-footer .footer-refresh select { width: auto; min-width: 76px; }
    .sidebar-footer .footer-row { display: flex; align-items: center; gap: 8px; }
    .sidebar-footer .footer-spacer { flex: 1; }
    #sidebarCollapse svg { transition: transform .2s ease; }
    body.menu-collapsed #sidebarCollapse svg { transform: rotate(180deg); }
    body.menu-collapsed .sidebar-footer .footer-refresh { display: none; }
    body.menu-collapsed .sidebar-footer .footer-row { flex-direction: column; gap: 8px; }
    body.menu-collapsed .sidebar-footer .footer-spacer { display: none; }
    /* settings popover (gear) */
    .settings-panel {
      position: fixed; left: 16px; bottom: 74px; z-index: 50;
      width: 244px; max-width: calc(100vw - 32px);
      display: none; padding: 14px; border-radius: var(--r-md);
      background: var(--glass); backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--card-border-2); box-shadow: var(--shadow-2);
    }
    .settings-panel.open { display: grid; gap: 14px; animation: fade .2s ease; }
    .settings-title { font: 800 13px var(--font-display); display: flex; align-items: center; gap: 8px; }
    .settings-title::before { content: ""; width: 4px; height: 14px; border-radius: 2px; background: var(--grad); }
    .settings-section { display: grid; gap: 7px; }
    .settings-label { font-size: 10.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .theme-seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 3px; border: 1px solid var(--card-border-2); border-radius: var(--r-sm); background: var(--panel-2); }
    .theme-seg button { border: 0; border-radius: 6px; padding: 8px 4px; font: 700 11px var(--font-display); background: transparent; color: var(--muted); cursor: pointer; transition: .14s; }
    .theme-seg button:hover { color: var(--ink); }
    .theme-seg button.on { background: var(--grad); color: #052420; box-shadow: 0 6px 14px -8px rgba(45,212,191,.6); }
    .settings-panel select { width: 100%; }
    .settings-panel button.secondary { width: 100%; }
    /* hero icon on empty map */
    .empty-hero { display: inline-grid; place-items: center; margin-bottom: 16px; }
    .empty-hero .logo-img { width: 112px; height: 112px; object-fit: contain; filter: drop-shadow(0 8px 22px rgba(45,212,191,.4)); animation: heroFloat 4s ease-in-out infinite; }
    @keyframes heroFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .brand-sub {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .header-right .header-control { border-left: 1px solid var(--line); padding-left: 14px; }
    .clock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .clock-time { font: 700 15px var(--font-mono); color: var(--ink); }
    .clock-date { font-size: 10.5px; color: var(--muted); font-weight: 700; }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(52,211,153,.3);
      background: var(--ok-soft);
      color: var(--ok);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .03em;
    }
    .live-dot i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(52,211,153,.55);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
      70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }
    .nav-group { display: grid; gap: 4px; }
    .nav-label {
      padding: 8px 10px 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .nav-item {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink-dim);
      box-shadow: none;
      text-align: left;
      transition: .14s;
      font-weight: 700;
    }
    .nav-item:hover { background: var(--panel-2); color: var(--ink); }
    .nav-item.active {
      background: var(--grad-soft);
      border-color: rgba(45,212,191,0.32);
      color: var(--ink);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 50%;
      width: 3px;
      height: 22px;
      border-radius: 0 3px 3px 0;
      background: var(--grad);
      transform: translateY(-50%);
    }
    .nav-parent {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      text-align: left;
      font-weight: 800;
      transition: .14s;
    }
    .nav-parent:hover {
      background: var(--panel-2);
    }
    .nav-caret {
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1;
      transition: transform .18s ease;
    }
    .nav-parent[aria-expanded="false"] .nav-caret {
      transform: rotate(-90deg);
    }
    .nav-subgroup {
      display: grid;
      gap: 4px;
      margin: 2px 0 8px 12px;
      padding-left: 13px;
      border-left: 1px solid var(--card-border-2);
    }
    .nav-subgroup.collapsed { display: none; }
    .nav-item.sub {
      padding: 8px 11px;
      grid-template-columns: 20px minmax(0, 1fr) auto;
      gap: 10px;
      font-size: 13px;
    }
    .nav-badge { justify-self: end; }
    .nav-item.sub .nav-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      font-size: 10px;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--ink-dim);
      font-size: 12px;
      font-weight: 800;
      font-family: var(--font-display);
    }
    .nav-icon svg { width: 15px; height: 15px; }
    .nav-item.sub .nav-icon svg { width: 13px; height: 13px; }
    .nav-item.active .nav-icon {
      background: rgba(45,212,191,.18);
      color: var(--accent);
    }
    .nav-badge {
      font: 700 10px var(--font-mono);
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.menu-collapsed .nav-item {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-parent {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-caret { display: none; }
    body.menu-collapsed .nav-subgroup {
      margin-left: 0;
      padding-left: 0;
      border-left: 0;
    }
    body.menu-collapsed .nav-text,
    body.menu-collapsed .nav-label {
      display: none;
    }
    .content { min-width: 0; grid-column: 2; }
    .page { animation: fade .26s ease; }
    .page.hidden { display: none; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .page-wrap { padding: 20px; max-width: 1320px; margin: 0 auto; }
    .map-page .page-wrap {
      max-width: none;
      min-height: calc(100vh - var(--header-h));
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    .page-title { margin: 0; font: 800 25px/1.1 var(--font-display); letter-spacing: -.015em; display: flex; align-items: center; gap: 14px; }
    .page-title::before { display: none; }
    .page-ico {
      width: 48px; height: 48px; flex: none; display: grid; place-items: center;
      border-radius: 14px; background: var(--grad); color: #052420;
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .page-ico svg { width: 26px; height: 26px; }
    .page-title .page-txt {
      background: linear-gradient(90deg, var(--ink), var(--ink-dim));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

  <script>
    const I18N = {
      ja: {
        common: {
          actions: { refresh: '更新' },
          status: { loading: '読み込み中...', ready: '表示中', cached: 'キャッシュを表示中、同期しています...' }

          summary: { title: 'サマリー', devices: 'デバイス', active: '有効', placed: '配置' },
          devices: { title: 'エリア別デバイス', searchPlaceholder: 'デバイス ID、エリア、場所、種別で検索', description: 'デバイスの稼働状態とセンサー指標をリアルタイムに俯瞰します。' },

          status: { noMetric: '表示指標未設定', noValue: '--', noDevices: 'デバイスがありません', noPlaced: '配置済みデバイスがありません', noBackground: '背景画像が未設定です' },
          label: { on: 'Online', off: 'Offline', lastSeen: '最終更新', unknown: '未設定' },
          camera: {
            lprTitle: 'LPR カメラ',
            lprText: 'ナンバープレート認識カメラの一覧、状態、検知ログをここに表示します。',
            parkingTitle: '車位管理カメラ',
            parkingText: '車位管理カメラの稼働状況、占有状態、イベント情報をここに表示します。'

          meeting: {
            title: '会議室Now',
            text: '人数センサーと環境センサーから、現在の利用状況を表示します。',
            total: '会議室',
            occupied: '使用中',
            pending: '確認中',
            available: '空室',
            offline: 'Offline',
            people: '現在人数',
            light: '照明',
            lightOn: '点灯',
            lightOff: '消灯',
            temperature: '温度',
            humidity: '湿度',
            co2: 'CO2',
            tempHumidity: '温度 / 湿度',
            peak: '最大',
            timeline: '本日の利用状況',
            usageNone: '利用なし',
            usageRate: '全体使用率',
            todaySummary: '本日サマリー',
            totalUsage: '合計利用',
            peakPeople: 'ピーク人数',
            occupiedRooms: '使用中の部屋',
            rankTitle: '本日の使用率',
            trendTitle: '本日の人数推移',
            heatmapButton: 'ヒートマップ',
            heatmapTitle: '時間帯ヒートマップ（過去7日）',
            heatLow: '低',
            heatHigh: '高',
            noRooms: 'area_id が「会議室」で、人数センサーと場所が設定されたデバイスがありません。',
            noFilteredRooms: '条件に一致する会議室がありません。'
          }
        }
      }
    };
    const LANG = 'ja';
    const DASHBOARD_CACHE_KEY = 'iotDashboard.dashboardState';
    const DASHBOARD_PAGE_KEY = 'iotDashboard.activePage';
    const DASHBOARD_QUERY_KEY = 'iotDashboard.deviceQuery';
    const DASHBOARD_MENU_KEY = 'iotDashboard.menuCollapsed';
    const DASHBOARD_REFRESH_KEY = 'iotDashboard.refreshIntervalSec';
    const DASHBOARD_IOT_GROUP_KEY = 'iotDashboard.iotGroupCollapsed';
    const DASHBOARD_THEME_KEY = 'iotDashboard.theme';
    const DASHBOARD_METRIC_PREFS_KEY = 'iotDashboard.deviceMetricPrefs';
    const DASHBOARD_LOGO_KEY = 'iotDashboard.logoUrl';
    const DASHBOARD_MEETING_CACHE_KEY = 'iotDashboard.meetingState';
    const DASHBOARD_MEETING_ORDER_KEY = 'iotDashboard.meetingRoomOrder';
    const DASHBOARD_MEETING_FILTER_KEY = 'iotDashboard.meetingFilter';
    const DASHBOARD_ALLOWED_STORAGE_KEYS = [DASHBOARD_CACHE_KEY, DASHBOARD_PAGE_KEY, DASHBOARD_QUERY_KEY, DASHBOARD_MENU_KEY, DASHBOARD_REFRESH_KEY, DASHBOARD_IOT_GROUP_KEY, DASHBOARD_THEME_KEY, DASHBOARD_METRIC_PREFS_KEY, DASHBOARD_LOGO_KEY, DASHBOARD_MEETING_CACHE_KEY, DASHBOARD_MEETING_ORDER_KEY, DASHBOARD_MEETING_FILTER_KEY];
    const DASHBOARD_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const DEFAULT_LOGO_URL = 'https://dl.dropboxusercontent.com/scl/fi/bwxb55mrt1qg4aqih5bxt/icon_dark.png?rlkey=g2mb3yooo636lr4qfa8zg8dlb&st=icn9wq0m&dl=1';
    const DASHBOARD_REQUEST_TIMEOUT_MS = 45000;
    const DASHBOARD_STALE_CHECK_MS = 30000;
    const state = { data: null, deviceMap: {}, query: '', filter: 'all', timer: 0, metricEditorDeviceId: '', metricPages: {}, version: '', lastVersionAt: 0, lastSuccessfulAt: 0, requests: {}, meeting: null, meetingVersion: '', meetingLoaded: false, meetingFilter: 'all' };
    const $ = (id) => document.getElementById(id);

    function t(path) {
      return path.split('.').reduce((cur, key) => cur && cur[key], I18N[LANG]) || path;
    }

    function initText() {
      $('title').textContent = t('dashboard.header.title');
      $('search').placeholder = t('dashboard.devices.searchPlaceholder');
      state.query = getStored(DASHBOARD_QUERY_KEY, '');
      $('search').value = state.query;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      $('emptyText').textContent = t('common.status.loading');
      state.meetingFilter = getStored(DASHBOARD_MEETING_FILTER_KEY, 'all');
      activatePage(getStored(DASHBOARD_PAGE_KEY, 'dashboard'), false);
    }

    function callServer(name, args, ok, options) {
      const silent = options && options.silent;
      const requestId = Date.now() + ':' + Math.random();
      const previous = state.requests[name];
      if (previous && previous.timer) clearTimeout(previous.timer);
      const timeoutTimer = setTimeout(() => {
        const active = state.requests[name];
        if (!active || active.id !== requestId) return;
        delete state.requests[name];
        setStatus('通信がタイムアウトしました。再試行します。', true);
        scheduleRefresh(60);
      }, DASHBOARD_REQUEST_TIMEOUT_MS);
      state.requests[name] = { id: requestId, timer: timeoutTimer };
      if (!silent) {
        setStatus(t('common.status.loading'));
      }
      google.script.run
        .withSuccessHandler((res) => {
          const active = state.requests[name];
          if (!active || active.id !== requestId) return;
          clearTimeout(active.timer);
          delete state.requests[name];
          if (!silent) {
            setStatus(t('common.status.ready'));
          }
          ok(res);
        })
        .withFailureHandler((err) => {
          const active = state.requests[name];
          if (!active || active.id !== requestId) return;
          clearTimeout(active.timer);
          delete state.requests[name];
          setStatus(err && err.message ? err.message : String(err), true);
          scheduleRefresh(60);
        })[name](...args);
    }

    function load(silent, force) {
      if (state.requests.apiGetDashboardState && !force) return;
      callServer('apiGetDashboardState', [state.version || ''], render, { silent: !!silent });
    }

    function loadMeeting(silent, force) {
      if (state.requests.apiGetMeetingRoomState && !force) return;
      if (!silent && $('meetingStatus')) $('meetingStatus').textContent = '会議室データを取得しています...';
      callServer('apiGetMeetingRoomState', [state.meetingVersion || ''], renderMeeting, { silent: !!silent });
    }

    function renderMeeting(data) {
      if (data && data.unchanged) {
        state.meetingLoaded = true;
        if ($('meetingStatus')) $('meetingStatus').textContent = '表示中';
        return;
      }
      state.meeting = data || {};
      state.meetingVersion = state.meeting.version || '';
      state.meetingLoaded = true;
      saveCachedMeeting(state.meeting);
      renderMeetingSummary();
      renderMeetingRooms();
      renderMeetingAnalytics();
      if ($('meetingStatus')) $('meetingStatus').textContent = shortDate(state.meeting.generated_at);
    }

    const MEETING_SUMMARY_ICONS = {
      total: '<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
      occupied: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/>',
      pending: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
      available: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/>',
      offline: '<path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/>',
      usage: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'
    };

    function renderMeetingSummary() {
      if (['all', 'AVAILABLE', 'PENDING_EMPTY', 'OCCUPIED'].indexOf(state.meetingFilter) < 0) state.meetingFilter = 'all';
      const summary = (state.meeting && state.meeting.summary) || {};
      const items = [
        ['total', 'all', 'ALL'],
        ['available', 'AVAILABLE', t('dashboard.meeting.available')],
        ['pending', 'PENDING_EMPTY', t('dashboard.meeting.pending')],
        ['occupied', 'OCCUPIED', t('dashboard.meeting.occupied')]
      ];
      $('meetingSummary').innerHTML = items.map((item) =>
        '<div class="meeting-summary-item ' + item[0] + (state.meetingFilter === item[1] ? ' on' : '') + '" data-meeting-filter="' + item[1] + '" role="button" tabindex="0">' +
        '<span class="meeting-summary-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + MEETING_SUMMARY_ICONS[item[0]] + '</svg></span>' +
        '<div><div class="meeting-summary-label">' + esc(item[2]) + '</div><div class="meeting-summary-value">' + esc(Number(summary[item[0]] || 0)) + '</div></div></div>'
      ).join('');
    }

    function meetingElapsedBusinessMin() {
      const now = new Date();
      const cur = now.getHours() * 60 + now.getMinutes();
      return Math.max(0, Math.min(cur, 22 * 60) - 8 * 60);
    }

    function meetingUsageMinutes(records) {
      let totalMin = 0;
      (records || []).forEach((record) => {
        const start = new Date(record.start);
        const end = new Date(record.end);
        if (isNaN(start.getTime()) || isNaN(end.getTime())) return;
        totalMin += Math.max(0, (end.getTime() - start.getTime()) / 60000);
      });
      return totalMin;
    }

    function meetingOverallUsagePct() {
      const rooms = (state.meeting && state.meeting.rooms) || [];
      const elapsed = meetingElapsedBusinessMin();
      if (!rooms.length || elapsed <= 0) return null;
      const used = rooms.reduce((sum, room) => sum + meetingUsageMinutes(room.timeline || []), 0);
      return Math.round(used / (elapsed * rooms.length) * 100);
    }

    function renderMeetingAnalytics() {
      const el = $('meetingAnalytics');
      if (!el) return;
      const rooms = (state.meeting && state.meeting.rooms) || [];
      if (!rooms.length) { el.innerHTML = ''; return; }
      const elapsed = meetingElapsedBusinessMin();
      const ranked = rooms.map((room) => {
        const min = meetingUsageMinutes(room.timeline || []);
        return { location: room.location, min: min, pct: elapsed > 0 ? Math.min(100, Math.round(min / elapsed * 100)) : 0 };
      }).sort((a, b) => b.min - a.min);
      const rankHtml = ranked.map((item) =>
        '<div class="bar-item"><div class="bar-top"><b>' + esc(item.location) + '</b><span>' + esc(item.pct + '% / ' + meetingDurationLabel(item.min)) + '</span></div>' +
        '<div class="bar-track"><i style="width:' + item.pct + '%"></i></div></div>'
      ).join('');
      const rankCard = '<div class="card"><div class="card-head"><div class="card-title"><span class="bar"></span><span>' + esc(t('dashboard.meeting.rankTitle')) + '</span></div></div>' +
        '<div class="card-body"><div class="bar-list">' + rankHtml + '</div></div></div>';
      const usagePct = meetingOverallUsagePct();
      const summary = (state.meeting && state.meeting.summary) || {};
      const totalUsageMin = rooms.reduce((sum, room) => sum + meetingUsageMinutes(room.timeline || []), 0);
      const peak = meetingTodayTrendPoints(rooms).reduce((max, p) => Math.max(max, p.v), 0);
      const summaryCard = '<div class="card meeting-usage-card"><div class="card-head"><div class="card-title"><span class="bar"></span><span>' + esc(t('dashboard.meeting.todaySummary')) + '</span></div></div>' +
        '<div class="card-body">' +
        '<div class="meeting-usage-value">' + esc(usagePct === null ? '--' : usagePct + '%') + '</div>' +
        '<div class="meeting-usage-label">' + esc(t('dashboard.meeting.usageRate')) + '</div>' +
        '<div class="meeting-usage-sub">8:00 - 22:00</div>' +
        '<div class="meeting-side-stats">' +
        '<div><span>' + esc(t('dashboard.meeting.totalUsage')) + '</span><b>' + esc(meetingDurationLabel(totalUsageMin)) + '</b></div>' +
        '<div><span>' + esc(t('dashboard.meeting.peakPeople')) + '</span><b>' + esc(peak > 0 ? peak + '人' : '--') + '</b></div>' +
        '<div><span>' + esc(t('dashboard.meeting.occupiedRooms')) + '</span><b>' + esc(Number(summary.occupied || 0) + '/' + Number(summary.total || rooms.length)) + '</b></div>' +
        '</div></div></div>';
      const heatBtn = state.meeting && state.meeting.heatmap
        ? '<button type="button" class="meeting-heatmap-open" onclick="openMeetingHeatmap()">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>' +
          esc(t('dashboard.meeting.heatmapTitle')) +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>' +
          '</button>'
        : '';
      el.innerHTML = summaryCard + rankCard + renderMeetingTrendCard(rooms) + heatBtn;
    }

    function openMeetingHeatmap() {
      const rooms = applyMeetingRoomOrder((state.meeting && state.meeting.rooms) || []);
      const html = renderMeetingHeatmapCard(rooms);
      $('meetingHeatmapModalBody').innerHTML = html || '<div class="meeting-empty">--</div>';
      $('meetingHeatmapModal').classList.remove('hidden');
    }

    function closeMeetingHeatmap() {
      $('meetingHeatmapModal').classList.add('hidden');
    }

    function meetingTodayTrendPoints(rooms) {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0, 0).getTime();
      const end = Math.min(now.getTime(), start + 14 * 3600000);
      if (end <= start) return [];
      const series = rooms.map((room) => meetingSeriesPoints(room.series || []));
      if (!series.some((pts) => pts.length)) return [];
      const cursors = series.map(() => -1);
      const stepMs = 5 * 60000;
      const out = [];
      const sampleAt = (tms) => {
        let total = 0;
        const byRoom = {};
        series.forEach((pts, i) => {
          while (cursors[i] + 1 < pts.length && pts[cursors[i] + 1].t <= tms) cursors[i]++;
          if (cursors[i] >= 0) {
            const v = pts[cursors[i]].v;
            total += v;
            if (v > 0) byRoom[rooms[i].location] = v;
          }
        });
        return { t: tms, v: total, rooms: byRoom };
      };
      for (let tms = start; tms <= end; tms += stepMs) out.push(sampleAt(tms));
      if (out.length && out[out.length - 1].t < end) out.push(sampleAt(end));
      return out;
    }

    function renderMeetingTrendCard(rooms) {
      const pts = meetingTodayTrendPoints(rooms);
      state.meetingTrend = pts;
      const peak = pts.reduce((max, p) => Math.max(max, p.v), 0);
      const head = '<div class="card-head"><div class="card-title"><span class="bar"></span><span>' + esc(t('dashboard.meeting.trendTitle')) + '</span></div>' +
        (peak > 0 ? '<span class="metric-page-count">' + esc(t('dashboard.meeting.peak') + peak + '人') + '</span>' : '') + '</div>';
      let body;
      if (!pts.length) {
        body = '<div class="meeting-empty">' + esc(t('dashboard.meeting.usageNone')) + '</div>';
      } else {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0, 0).getTime();
        const rangeMs = 14 * 3600000;
        const W = 100;
        const H = 40;
        const max = Math.max(1, peak);
        const x = (tms) => Math.max(0, Math.min(W, (tms - start) / rangeMs * W));
        const y = (v) => H - 3 - (v / max) * (H - 8);
        let d = '';
        pts.forEach((p, i) => {
          d += (i === 0 ? 'M' : 'L') + x(p.t).toFixed(2) + ' ' + y(p.v).toFixed(2);
        });
        const area = d + ' L' + x(pts[pts.length - 1].t).toFixed(2) + ' ' + (H - 1) + ' L' + x(pts[0].t).toFixed(2) + ' ' + (H - 1) + ' Z';
        body = '<div class="meeting-trend-wrap">' +
          '<svg class="meeting-trend-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
          '<path d="' + area + '" fill="rgba(45,212,191,.14)" stroke="none"/>' +
          '<path d="' + d + '" fill="none" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>' +
          '</svg>' +
          '<i class="meeting-trend-cursor"></i><div class="meeting-trend-tip"></div>' +
          '</div>' +
          '<div class="meeting-axis"><span>08:00</span><span>11:30</span><span>15:00</span><span>18:30</span><span>22:00</span></div>';
      }
      return '<div class="card meeting-trend-card">' + head + '<div class="card-body">' + body + '</div></div>';
    }

    function meetingDurationLabel(minutes) {
      const m = Math.round(minutes);
      if (m <= 0) return t('dashboard.meeting.usageNone');
      const h = Math.floor(m / 60);
      const r = m % 60;
      if (h && r) return h + '時間' + r + '分';
      if (h) return h + '時間';
      return r + '分';
    }

    function renderMeetingHeatmapCard(rooms) {
      const heat = state.meeting && state.meeting.heatmap;
      if (!heat || !heat.rooms) return '';
      const startHour = Number(heat.start_hour) || 8;
      const endHour = Number(heat.end_hour) || 22;
      const slots = endHour - startHour;
      let cells = '<div></div>';
      for (let h = startHour; h < endHour; h++) {
        cells += '<div class="meeting-heat-hour">' + (h % 2 === 0 ? h : '') + '</div>';
      }
      rooms.forEach((room) => {
        const ratios = heat.rooms[room.location] || [];
        cells += '<div class="meeting-heat-label" title="' + esc(attrEscape(room.location)) + '">' + esc(room.location) + '</div>';
        for (let i = 0; i < slots; i++) {
          const ratio = Math.max(0, Math.min(1, Number(ratios[i]) || 0));
          const alpha = ratio <= 0 ? 0 : (0.12 + ratio * 0.78);
          const style = alpha > 0 ? ' style="background:rgba(45,212,191,' + alpha.toFixed(3) + ')"' : '';
          cells += '<div class="meeting-heat-cell"' + style + ' title="' + esc(attrEscape(room.location + ' ' + (startHour + i) + ':00 — ' + Math.round(ratio * 100) + '%')) + '"></div>';
        }
      });
      const legend = '<div class="meeting-heat-legend"><span>' + esc(t('dashboard.meeting.heatLow')) + '</span>' +
        [0.12, 0.3, 0.5, 0.7, 0.9].map((a) => '<span class="meeting-heat-swatch" style="background:rgba(45,212,191,' + a + ')"></span>').join('') +
        '<span>' + esc(t('dashboard.meeting.heatHigh')) + '</span></div>';
      return '<div class="card meeting-heat-card"><div class="card-head"><div class="card-title"><span class="bar"></span><span>' + esc(t('dashboard.meeting.heatmapTitle')) + '</span></div></div>' +
        '<div class="card-body"><div class="meeting-heatmap" style="grid-template-columns:minmax(90px,140px) repeat(' + slots + ',minmax(16px,1fr))">' + cells + '</div>' + legend + '</div></div>';
    }

    function renderMeetingRooms() {
      const rooms = applyMeetingRoomOrder((state.meeting && state.meeting.rooms) || []);
      const filtered = state.meetingFilter === 'all' ? rooms : rooms.filter((room) => room.status === state.meetingFilter);
      $('meetingRooms').innerHTML = filtered.map(renderMeetingRoom).join('') ||
        '<div class="meeting-empty">' + esc(t(rooms.length ? 'dashboard.meeting.noFilteredRooms' : 'dashboard.meeting.noRooms')) + '</div>';
    }

    function getMeetingRoomOrder() {
      try {
        const arr = JSON.parse(getStored(DASHBOARD_MEETING_ORDER_KEY, '[]'));
        return Array.isArray(arr) ? arr : [];
      } catch (err) {
        return [];
      }
    }

    function applyMeetingRoomOrder(rooms) {
      const order = getMeetingRoomOrder();
      if (!order.length) return rooms;
      const pos = {};
      order.forEach((location, i) => { pos[location] = i; });
      // Stable sort: unknown rooms keep server order after the stored ones.
      return rooms.slice().sort((a, b) => {
        const ai = pos[a.location] !== undefined ? pos[a.location] : order.length;
        const bi = pos[b.location] !== undefined ? pos[b.location] : order.length;
        return ai - bi;
      });
    }

    function saveMeetingRoomOrderFromDom() {
      const locations = Array.from($('meetingRooms').querySelectorAll('.meeting-room[data-room-location]'))
        .map((n) => n.getAttribute('data-room-location'));
      if (locations.length) setStored(DASHBOARD_MEETING_ORDER_KEY, JSON.stringify(locations));
    }

    function renderMeetingRoom(room) {
      const statusMap = {
        OCCUPIED: ['occupied', t('dashboard.meeting.occupied')],
        PENDING_EMPTY: ['pending', t('dashboard.meeting.pending')],
        AVAILABLE: ['available', t('dashboard.meeting.available')],
        OFFLINE: ['offline', t('dashboard.meeting.offline')]
      };
      const status = statusMap[room.status] || statusMap.OFFLINE;
      const count = room.count === null || room.count === undefined ? '--' : room.count;
      const lightValue = room.light && hasMetricValue(room.light) ? Number(room.light.value) : NaN;
      const light = isFinite(lightValue) ? (lightValue >= 2 ? t('dashboard.meeting.lightOn') : t('dashboard.meeting.lightOff')) : '--';
      const co2Value = room.co2 && hasMetricValue(room.co2) ? Number(room.co2.value) : NaN;
      const co2Level = isFinite(co2Value) ? (co2Value >= 1500 ? 'bad' : co2Value >= 1000 ? 'warn' : 'ok') : '';
      const lightLevel = isFinite(lightValue) ? (lightValue >= 2 ? 'lit' : 'dim') : '';
      const lightHtml = isFinite(lightValue)
        ? '<span class="meeting-light-state">' + esc(light) + '</span>' +
          '<span class="meeting-light-lv">Lv.' + esc(lightValue) + '</span>' +
          '<span class="meeting-light-meter">' + [0, 1, 2, 3, 4].map((i) => '<i class="' + (lightValue > i ? 'on' : '') + '"></i>').join('') + '</span>'
        : '';
      const envIcons = {
        light: '<path d="M9 18h6M10 21h4"/><path d="M12 3a6 6 0 0 1 3.6 10.8c-.5.4-.6 1-.6 1.7v.5H9v-.5c0-.7-.1-1.3-.6-1.7A6 6 0 0 1 12 3z"/>',
        temperature: '<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>',
        co2: '<path d="M9.59 4.59A2 2 0 1 1 11 8H2"/><path d="M12.59 19.41A2 2 0 1 0 14 16H2"/><path d="M17.73 7.73A2.5 2.5 0 1 1 19.5 12H2"/>'
      };
      const hasTemp = !!(room.temperature && hasMetricValue(room.temperature));
      const hasHumidity = !!(room.humidity && hasMetricValue(room.humidity));
      const env = [];
      if (isFinite(lightValue)) {
        env.push([t('dashboard.meeting.light'), light, envIcons.light, lightLevel + ' light', lightHtml]);
      }
      if (isFinite(co2Value)) {
        env.push([t('dashboard.meeting.co2'), meetingMetricText(room.co2, 'ppm'), envIcons.co2, co2Level]);
      }
      if (hasTemp && hasHumidity) {
        env.push([t('dashboard.meeting.tempHumidity'), meetingMetricText(room.temperature, '°C') + ' / ' + meetingMetricText(room.humidity, '%'), envIcons.temperature, 'wide']);
      } else if (hasTemp) {
        env.push([t('dashboard.meeting.temperature'), meetingMetricText(room.temperature, '°C'), envIcons.temperature, '']);
      } else if (hasHumidity) {
        env.push([t('dashboard.meeting.humidity'), meetingMetricText(room.humidity, '%'), envIcons.temperature, '']);
      }
      if (env.length === 1) env[0][3] += ' wide';
      return '<article class="meeting-room ' + status[0] + '" data-room-location="' + esc(attrEscape(room.location)) + '"' + (state.meetingFilter === 'all' ? ' draggable="true"' : '') + '>' +
        '<div class="meeting-room-head"><div><div class="meeting-room-name">' + esc(room.location) + '</div><div class="meeting-room-time">' + esc(shortDate(room.people_updated_at) || '--') + '</div></div>' +
        '<span class="meeting-room-status ' + status[0] + '">' + esc(status[1]) + '</span></div>' +
        '<div class="meeting-main"><div class="meeting-count"><strong>' + esc(count) + '</strong><span>' + esc(t('dashboard.meeting.people')) + '</span></div>' +
        '<div class="meeting-env">' + env.map((item) =>
          '<div class="meeting-env-item' + (item[3] ? ' ' + item[3] : '') + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + item[2] + '</svg>' +
          '<div><span>' + esc(item[0]) + '</span><strong>' + (item[4] || esc(item[1])) + '</strong></div></div>'
        ).join('') + '</div></div>' +
        '<div class="meeting-timeline"><div class="meeting-timeline-head"><span>' + esc(t('dashboard.meeting.timeline')) + '</span><b>' + esc(meetingTimelineSummaryText(room)) + '</b></div>' +
        renderMeetingPeopleChart(room.series || []) +
        '<div class="meeting-track">' + renderMeetingSegments(room.timeline || []) + renderMeetingNowMarker() + '</div>' +
        '<div class="meeting-axis"><span>08:00</span><span>11:30</span><span>15:00</span><span>18:30</span><span>22:00</span></div></div>' +
        '</article>';

    function meetingUsageText(records) {
      return meetingDurationLabel(meetingUsageMinutes(records));
    }

    function meetingTimelineSummaryText(room) {
      const usage = meetingUsageText(room.timeline || []);
      const peak = meetingSeriesPoints(room.series || []).reduce((max, p) => Math.max(max, p.v), 0);
      return peak > 0 ? usage + ' ・ ' + t('dashboard.meeting.peak') + peak + '人' : usage;
    }

    function meetingSeriesPoints(series) {
      return (series || [])
        .map((p) => ({ t: Number(p && p[0]), v: Number(p && p[1]) }))
        .filter((p) => isFinite(p.t) && isFinite(p.v));
    }

    function renderMeetingPeopleChart(series) {
      const pts = meetingSeriesPoints(series);
      if (!pts.length) return '';
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0, 0).getTime();
      const rangeMs = 14 * 60 * 60 * 1000;
      const limit = Math.min(now.getTime(), start + rangeMs);
      if (limit <= start) return '';
      const W = 100;
      const H = 38;
      const max = Math.max(1, pts.reduce((m, p) => Math.max(m, p.v), 0));
      const x = (tms) => Math.max(0, Math.min(W, (tms - start) / rangeMs * W));
      const y = (v) => H - 3 - (v / max) * (H - 8);
      // step-after line: carry the last value seen before 08:00 as the baseline
      let baseline = null;
      const visible = [];
      pts.forEach((p) => {
        if (p.t > limit) return;
        if (p.t <= start) baseline = p.v;
        else visible.push(p);
      });
      if (baseline === null && !visible.length) return '';
      const startVal = baseline !== null ? baseline : null;
      let d = '';
      let curY = null;
      if (startVal !== null) {
        curY = y(startVal);
        d = 'M0 ' + curY.toFixed(2);
      }
      visible.forEach((p) => {
        const px = x(p.t).toFixed(2);
        const py = y(p.v);
        if (curY === null) {
          d = 'M' + px + ' ' + py.toFixed(2);
        } else {
          d += ' H' + px + ' V' + py.toFixed(2);
        }
        curY = py;
      });
      d += ' H' + x(limit).toFixed(2);
      const firstX = startVal !== null ? 0 : x(visible[0].t);
      const area = d + ' V' + (H - 1) + ' H' + firstX.toFixed(2) + ' Z';
      return '<svg class="meeting-people-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        '<path d="' + area + '" fill="rgba(91,157,246,.16)" stroke="none"/>' +
        '<path d="' + d + '" fill="none" stroke="#5b9df6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>' +
        '</svg>';
    }

    function renderMeetingNowMarker() {
      const now = new Date();
      const pct = (now.getHours() * 60 + now.getMinutes() - 8 * 60) / (14 * 60) * 100;
      if (pct < 0 || pct > 100) return '';
      return '<i class="meeting-track-now" style="left:' + pct.toFixed(2) + '%"></i>';
    }

    function renderMeetingSegments(records) {
      const startHour = 8;
      const durationMin = 14 * 60;
      return (records || []).map((record) => {
        const start = new Date(record.start);
        const end = new Date(record.end);
        if (isNaN(start.getTime()) || isNaN(end.getTime())) return '';
        const startMin = start.getHours() * 60 + start.getMinutes() - startHour * 60;
        const endMin = end.getHours() * 60 + end.getMinutes() - startHour * 60;
        const left = Math.max(0, Math.min(100, startMin / durationMin * 100));
        const right = Math.max(left, Math.min(100, endMin / durationMin * 100));
        return '<i class="meeting-track-segment" style="left:' + left + '%;width:' + (right - left) + '%"></i>';
      }).join('');
    }

    function meetingMetricText(metric, unit) {
      if (!metric || !hasMetricValue(metric)) return '--';
      return formatValue(metric.value, unit);
    }

    function saveCachedMeeting(data) {
      try {
        localStorage.setItem(DASHBOARD_MEETING_CACHE_KEY, JSON.stringify({
          data: data,
          cached_at: new Date().toISOString()
        }));
      } catch (err) {}
    }

    function applyCachedMeeting() {
      try {
        const cached = JSON.parse(localStorage.getItem(DASHBOARD_MEETING_CACHE_KEY) || 'null');
        if (!cached || isExpiredCache(cached, DASHBOARD_CACHE_MAX_AGE_MS)) return;
        renderMeeting(cached.data || cached);
      } catch (err) {
        try { localStorage.removeItem(DASHBOARD_MEETING_CACHE_KEY); } catch (_) {}
      }
    }

    function render(data) {
      // Server returned "no change since last fetch" — skip rerender entirely.
      if (data && data.unchanged) {
        state.lastVersionAt = Date.now();
        state.lastSuccessfulAt = Date.now();
        scheduleRefresh();
        return;
      }
      state.data = data || {};
      state.version = (data && data.version) || '';
      state.lastSuccessfulAt = Date.now();
      state.deviceMap = buildDeviceMap(state.data.devices || []);
      syncMetricPrefsWithServer(state.data.devices || []);
      saveCachedDashboard(state.data);
      applyRefreshIntervalControl(state.data.config || {});
      applyBackground(state.data.config || {});
      applyLogoConfig(state.data.config || {});
      renderStats();
      renderKpis();
      renderInsights();
      renderWidgets();
      renderDeviceList();
      $('navDevCount').textContent = (state.data.devices || []).length;
      scheduleRefresh();
    }

    function renderStats() {
      const devices = state.data.devices || [];
      const activeLayout = (state.data.layout || []).filter((i) => i.enabled !== false);
      const statDevices = $('statDevices');
      const statActive = $('statActive');
      const statPlaced = $('statPlaced');
      if (statDevices) statDevices.textContent = devices.length;
      if (statActive) statActive.textContent = devices.filter((d) => isOnline(d)).length;
      if (statPlaced) statPlaced.textContent = activeLayout.length;
    }

    function renderKpis() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const lowBatt = devices.filter((d) => {
        if (!isOnline(d)) return false;
        const key = batteryMetricKey(d);
        const hit = key && d.metrics && d.metrics[key];
        const n = hasMetricValue(hit) ? Number(hit.value) : NaN;
        return isFinite(n) && n < 20;
      }).length;
      const offline = devices.length - online;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      const cards = [
        { label: 'デバイス', val: devices.length, unit: '', foot: '登録総数', tone: 'flat', icon: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>' },
        { label: 'Online', val: online, unit: '', foot: ratio + '% 稼働', tone: ratio >= 70 ? 'up' : 'down', icon: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>' },
        { label: 'Offline', val: offline, unit: '', foot: offline ? '要確認' : '正常', tone: offline ? 'down' : 'up', icon: '<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>' },
        { label: '低バッテリー', val: lowBatt, unit: '', foot: 'Online / < 20%', tone: lowBatt ? 'down' : 'up', icon: '<path d="M2 8h16v8H2zM20 11v2"/>' }
      ];
      $('kpiGrid').innerHTML = cards.map((c) => {
        return '<div class="kpi">' +
          '<div class="kpi-top"><span class="kpi-label">' + esc(c.label) + '</span><span class="kpi-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + c.icon + '</svg></span></div>' +
          '<div class="kpi-val">' + esc(c.val) + '<small>' + esc(c.unit) + '</small></div>' +
          '<div class="kpi-foot"><span class="trend ' + c.tone + '">' + esc(c.tone === 'up' ? 'OK' : c.tone === 'down' ? '注意' : 'INFO') + '</span>' + esc(c.foot) + '</div>' +
          sparkline([1, 2, 2, 3, 2, 4, Number(c.val) || 0]) +
          '</div>';
      }).join('');
    }

    function renderInsights() {
      const devices = state.data.devices || [];
      const online = devices.filter((d) => isOnline(d)).length;
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      $('onlineRing').innerHTML = ringSvg(ratio);
      $('ringLegend').innerHTML =
        '<div class="legend-row"><span class="k"><i style="background:var(--ok)"></i>Online</span><span class="v">' + online + '</span></div>' +
        '<div class="legend-row"><span class="k"><i style="background:var(--bad)"></i>Offline</span><span class="v">' + (devices.length - online) + '</span></div>';
      renderBars('areaBars', groupCount(devices, (d) => d.area_id || d.location || t('dashboard.label.unknown')));
      const types = groupCount(devices, (d) => d.sensor_type || d.type || t('dashboard.label.unknown'));
      $('typeLegend').innerHTML = Object.keys(types).sort((a, b) => types[b] - types[a]).slice(0, 8).map((k, i) =>
        '<div class="legend-row"><span class="k"><i style="background:' + ['var(--accent)','var(--accent-2)','var(--accent-3)','var(--warn)'][i % 4] + '"></i>' + esc(k) + '</span><span class="v">' + types[k] + '</span></div>'
      ).join('');
    }

    function groupCount(rows, keyFn) {
      return (rows || []).reduce((acc, row) => {
        const key = keyFn(row);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(id, counts) {
      const keys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 8);
      const max = Math.max(1, ...keys.map((k) => counts[k]));
      $(id).innerHTML = keys.map((k) =>
        '<div class="bar-item"><div class="bar-top"><b>' + esc(k) + '</b><span>' + counts[k] + '</span></div><div class="bar-track"><i style="width:' + Math.round(counts[k] / max * 100) + '%"></i></div></div>'
      ).join('');
    }

    function ringSvg(ratio) {
      const c = 2 * Math.PI * 38;
      const off = c * (1 - ratio / 100);
      return '<circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/>' +
        '<circle cx="50" cy="50" r="38" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 50 50)"/>' +
        '<defs><linearGradient id="ringGrad" x1="0" x2="1"><stop stop-color="#2dd4bf"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs>' +
        '<text x="50" y="48" text-anchor="middle" class="ring-center">' + ratio + '%</text><text x="50" y="63" text-anchor="middle" class="ring-sub">ONLINE</text>';
    }

    function sparkline(vals) {
      const w = 100, h = 30, max = Math.max(1, ...vals), min = Math.min(...vals);
      const span = Math.max(1, max - min);
      const d = vals.map((v, i) => (i ? 'L' : 'M') + (i / (vals.length - 1) * w).toFixed(1) + ' ' + (h - ((v - min) / span) * (h - 4) - 2).toFixed(1)).join(' ');
      return '<svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="' + d + '" fill="none" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function renderWidgets() {
      const stage = $('stage');
      const openPopups = {};
      stage.querySelectorAll('.map-popup').forEach((n) => {
        const id = n.getAttribute('data-popup-id');
        if (id) openPopups[id] = true;
      });
      stage.querySelectorAll('.widget,.map-point,.map-popup').forEach((n) => n.remove());
      const layout = (state.data.layout || []).filter((i) => i.enabled !== false && (i.bind_type || 'device') === 'device');
      const devices = state.deviceMap;
      const bg = (state.data.config && state.data.config.background_url) || '';
      $('empty').classList.toggle('hidden', !!layout.length || !!bg);
      $('emptyText').textContent = bg ? t('dashboard.status.noPlaced') : t('dashboard.status.noBackground');

      layout.forEach((item) => {
        const device = devices[item.bind_ref] || {};
        const title = item.label || deviceDisplayTitle(device) || item.bind_ref;
        const pointTitle = deviceClickTitle(device, item);
        const config = item.style_config || parseStyle(item.style);
        const metrics = (config.metrics || []).slice(0, 12);
        const mode = config.displayMode === 'popup' ? 'popup' : 'card';
        if (mode === 'popup') {
          const point = document.createElement('button');
          point.type = 'button';
          point.className = 'map-point' + (!isOnline(device) ? ' off' : '');
          if (openPopups[item.item_id]) point.className += ' open';
          point.setAttribute('data-point-id', item.item_id || '');
          point.style.left = (Number(item.x_norm) * 100) + '%';
          point.style.top = (Number(item.y_norm) * 100) + '%';
          point.setAttribute('aria-label', pointTitle);
          point.innerHTML = '<span class="map-point-label">' + esc(pointTitle) + '</span>';
          point.addEventListener('click', (ev) => {
            ev.stopPropagation();
            showMapPopup(item, device, pointTitle, metrics);
          });
          stage.appendChild(point);
          if (openPopups[item.item_id]) showMapPopup(item, device, pointTitle, metrics);
          return;
        }
        const el = document.createElement('div');
        el.className = 'widget' + (!isOnline(device) ? ' off' : '');
        el.style.left = (Number(item.x_norm) * 100) + '%';
        el.style.top = (Number(item.y_norm) * 100) + '%';
        if (Number(config.cardWidth)) el.style.setProperty('--card-w', Number(config.cardWidth) + 'px');
        if (Number(config.cardHeight)) el.style.height = Number(config.cardHeight) + 'px';
        const batteryBadge = renderBatteryBadge(device, 'widget-battery');
        el.innerHTML =
          '<div class="widget-head">' +
          '<div class="widget-title">' + esc(title) + '</div>' +
          batteryBadge +
          '</div>' +
          '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
          '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
        stage.appendChild(el);
      });
    }

    function showMapPopup(item, device, title, metrics) {
      const stage = $('stage');
      const existing = stage.querySelector('.map-popup[data-popup-id="' + cssEscape(item.item_id) + '"]');
      const point = stage.querySelector('.map-point[data-point-id="' + cssEscape(item.item_id) + '"]');
      if (existing) {
        existing.remove();
        if (point) point.classList.remove('open');
        return;
      }
      const popup = document.createElement('div');
      popup.className = 'widget map-popup' + (!isOnline(device) ? ' off' : '');
      popup.setAttribute('data-popup-id', item.item_id || '');
      popup.style.left = (Number(item.x_norm) * 100) + '%';
      popup.style.top = (Number(item.y_norm) * 100) + '%';
      const batteryBadge = renderBatteryBadge(device, 'widget-battery');
      popup.innerHTML =
        '<button class="popup-close" type="button" aria-label="閉じる"></button>' +
        '<div class="widget-head">' +
        '<div class="widget-title">' + esc(title) + '</div>' +
        batteryBadge +
        '</div>' +
        '<div class="metric-lines">' + renderWidgetMetrics(device, metrics) + '</div>' +
        '<div class="widget-time">' + esc(shortDate(device.last_seen) || item.bind_ref) + '</div>';
      stage.appendChild(popup);
      if (point) point.classList.add('open');
    }

    function closeAllMapPopups() {
      $('stage').querySelectorAll('.map-popup').forEach((n) => n.remove());
      $('stage').querySelectorAll('.map-point.open').forEach((n) => n.classList.remove('open'));
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(String(value || ''));
      return String(value || '').replace(/["\\]/g, '\\$&');
    }

    function renderWidgetMetrics(device, metrics) {
      const configured = metrics || [];
      metrics = configured.filter((metric) => isDisplayMetric(metric) && !isBatteryMetric(metric));
      if (!metrics.length) {
        if (configured.length && batteryMetricKey(device)) return '';
        return '<div class="metric-line"><span class="metric-name">' + esc(t('dashboard.status.noMetric')) + '</span><span class="metric-value">--</span></div>';
      }
      return metrics.map((metric) => {
        const meta = metricMeta(metric);
        const hit = device.metrics && device.metrics[metric];
        return '<div class="metric-line">' +
          '<span class="metric-name">' + esc(meta.label || metric) + '</span>' +
          '<span class="metric-value">' + esc(hasMetricValue(hit) ? formatValue(hit.value, meta.unit) : t('dashboard.status.noValue')) + '</span>' +
          '</div>';
      }).join('');
    }

    function renderDeviceList() {
      const q = state.query.toLowerCase();
      const rows = (state.data.devices || []).filter((d) => {
        const hay = [d.device_id, d.name, d.area_id, d.location, d.type, d.sensor_type].join(' ').toLowerCase();
        const queryOk = !q || hay.indexOf(q) > -1;
        const filterOk = state.filter === 'all' || (state.filter === 'on' ? isOnline(d) : !isOnline(d));
        return queryOk && filterOk;
      });

      const grouped = {};
      rows.forEach((d) => {
        const area = displayLocation(d) || t('dashboard.label.unknown');
        if (!grouped[area]) grouped[area] = [];
        grouped[area].push(d);
      });
      const html = Object.keys(grouped).sort().map((area) => {
        const devices = grouped[area].sort((a, b) =>
          dashboardSortOrder(a) - dashboardSortOrder(b) ||
          String(deviceDisplayTitle(a) || a.device_id).localeCompare(String(deviceDisplayTitle(b) || b.device_id))
        );
        return '<div class="dev-area-group">' +
          '<div class="dev-area-title">' + esc(area) + '</div>' +
          devices.map((d) => {
        const selectedKeys = deviceDisplayMetrics(d).slice(0, 12);
        const cardType = dashboardCardType(d);
        return '<div class="dev ' + cardType + ' ' + (!isOnline(d) ? 'off' : '') + '">' +
          '<div class="dev-head">' +
          '<div><div class="dev-name" title="' + esc(attrEscape(deviceDisplayTitle(d) || d.device_id)) + '">' + esc(deviceDisplayTitle(d) || d.device_id) + '</div><div class="dev-id">' + esc(d.device_id) + '</div></div>' +
          '<div class="dev-actions">' +
          renderBatteryBadge(d, 'device-battery') +
          '<span class="pill ' + (!isOnline(d) ? 'off' : '') + '">' + esc(isOnline(d) ? t('dashboard.label.on') : t('dashboard.label.off')) + '</span>' +
          '</div>' +
          '</div>' +
          '<div class="dev-meta">' + esc([d.name, d.type, d.sensor_type].filter(Boolean).join(' / ') || t('dashboard.label.unknown')) + '<span class="dot"></span>' + esc(t('dashboard.label.lastSeen') + ': ' + (shortDate(d.last_seen) || t('dashboard.label.unknown'))) + '</div>' +
          renderDeviceMetricPage(d, selectedKeys) +
          renderDeviceMetricEditor(d, selectedKeys) +
          '</div>';
          }).join('') +
          '</div>';
      }).join('');
      $('deviceList').innerHTML = html || '<div class="muted">' + esc(t('dashboard.status.noDevices')) + '</div>';
    }

    function dashboardMetricCount(device) {
      return deviceDisplayMetrics(device).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m)).length;
    }

    function dashboardSortOrder(device) {
      const n = Number(device && device.dashboard_order);
      return isFinite(n) ? n : 999999;
    }

    function dashboardCardType(device) {
      const type = String((device && device.dashboard_card_type) || 'standard').toLowerCase();
      return type === 'compact' || type === 'wide' ? type : 'standard';
    }

    function renderDeviceMetricPage(device, selectedKeys) {
      const pageSize = dashboardCardType(device) === 'compact' ? 4 : 6;
      const total = selectedKeys.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      const deviceId = device.device_id;
      let page = Math.max(0, Math.min(totalPages - 1, Number(state.metricPages[deviceId] || 0)));
      state.metricPages[deviceId] = page;
      const start = page * pageSize;
      const visibleKeys = selectedKeys.slice(start, start + pageSize);
      const metrics = visibleKeys.map((m) => {
        const hit = device.metrics && device.metrics[m];
        const meta = metricMeta(m);
        const raw = hasMetricValue(hit) ? Number(hit.value) : NaN;
        const pct = isFinite(raw) ? Math.max(4, Math.min(100, Math.round(raw / metricMax(m) * 100))) : 0;
        const valueText = hasMetricValue(hit) ? formatValue(hit.value, meta.unit) : '--';
        return '<div class="metric">' +
          '<div class="metric-k" title="' + esc(attrEscape(meta.label || m)) + '">' + metricIcon(m) + '<span>' + esc(meta.label || m) + '</span></div>' +
          '<div class="metric-v" title="' + esc(attrEscape(valueText)) + '">' + esc(valueText) + '</div>' +
          '<div class="mbar"><i style="width:' + pct + '%"></i></div>' +
          '</div>';
      }).join('');
      const nav = total > pageSize
        ? '<div class="metric-page-nav">' +
          '<span class="metric-page-count">' + esc((start + 1) + '-' + Math.min(start + pageSize, total) + ' / ' + total) + '</span>' +
          '<button class="metric-page-btn" type="button" title="前へ" onclick="shiftDeviceMetricPage(\'' + esc(attrEscape(deviceId)) + '\', -1, ' + total + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>' +
          '<button class="metric-page-btn" type="button" title="次へ" onclick="shiftDeviceMetricPage(\'' + esc(attrEscape(deviceId)) + '\', 1, ' + total + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>' +
          '</div>'
        : '<div class="metric-page-nav"></div>';
      return '<div class="metrics-shell">' + nav + '<div class="metrics' + (total > 3 ? ' rows-2' : '') + '">' + metrics + '</div></div>';
    }

    function shiftDeviceMetricPage(deviceId, delta, total) {
      const device = deviceMap()[deviceId] || {};
      const pageSize = dashboardCardType(device) === 'compact' ? 4 : 6;
      const totalPages = Math.max(1, Math.ceil(Number(total || 0) / pageSize));
      const current = Math.max(0, Math.min(totalPages - 1, Number(state.metricPages[deviceId] || 0)));
      state.metricPages[deviceId] = (current + delta + totalPages) % totalPages;
      renderDeviceList();
    }

    function applyBackground(config) {
      const w = Number(config.map_width || 1200);
      const h = Number(config.map_height || 800);
      const url = config.background_url || '';
      $('stage').style.setProperty('--aspect', String(w && h ? w / h : 1.5));
      $('stage').style.backgroundImage = url ? 'url("' + url + '")' : '';
      fitStageToWrap();
    }

    function applyLogoConfig(config) {
      config = config || {};
      const hasLogo = Object.prototype.hasOwnProperty.call(config, 'logo_url');
      const raw = hasLogo ? (config.logo_url || DEFAULT_LOGO_URL) : getStored(DASHBOARD_LOGO_KEY, DEFAULT_LOGO_URL);
      // www.dropbox.com redirects (requests show as canceled); use the direct-content host.
      const url = String(raw).replace('https://www.dropbox.com/', 'https://dl.dropboxusercontent.com/');
      document.querySelectorAll('.logo-img').forEach((img) => img.src = url);
      setStored(DASHBOARD_LOGO_KEY, url);
    }

    function fitStageToWrap() {
      const wrap = $('stageWrap');
      const stage = $('stage');
      if (!wrap || !stage) return;
      const aspect = Number(getComputedStyle(stage).getPropertyValue('--aspect')) || 1.5;
      const box = wrap.getBoundingClientRect();
      const padX = 20;
      const padY = 20;
      const maxW = Math.max(240, box.width - padX);
      const maxH = Math.max(180, box.height - padY);
      let width = maxW;
      let height = width / aspect;
      if (height > maxH) {
        height = maxH;
        width = height * aspect;
      }
      stage.style.width = Math.floor(width) + 'px';
      stage.style.height = Math.floor(height) + 'px';
    }

    function toggleMapFullscreen() {
      document.body.classList.toggle('map-fullscreen');
      setTimeout(fitStageToWrap, 40);
    }

    function toggleBrowserFullscreen() {
      const root = document.documentElement;
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
        return;
      }
      if (root.requestFullscreen) root.requestFullscreen().catch(() => {});
    }

    function deviceMap() {
      return state.deviceMap || {};
    }

    function buildDeviceMap(devices) {
      const out = {};
      (devices || []).forEach((d) => out[d.device_id] = d);
      return out;
    }

    function displayLocation(device) {
      if (!device) return '';
      return [device.area_id, device.location].filter(Boolean).join(' / ');
    }

    function deviceDisplayTitle(device) {
      if (!device) return '';
      const model = device.sensor_type || device.type || device.name || '';
      const place = displayLocation(device);
      return [model, place].filter(Boolean).join(' / ');
    }

    function deviceClickTitle(device, item) {
      const name = device && String(device.name || '').trim();
      return name || (item && item.bind_ref) || '';
    }

    function deviceDisplayMetrics(device) {
      const keys = ((device && device.metricKeys) || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      if (Array.isArray(device && device.dashboard_metrics) && device.dashboard_metrics.length) {
        return device.dashboard_metrics.filter((key) => keys.indexOf(key) > -1 && isDisplayMetric(key) && !isBatteryMetric(key));
      }
      return keys;
    }

    function renderDeviceMetricEditor(device, selectedKeys) {
      if (!device || state.metricEditorDeviceId !== device.device_id) return '';
      const keys = (device.metricKeys || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const selected = selectedKeys || deviceDisplayMetrics(device);
      const ordered = selected.concat(keys.filter((key) => selected.indexOf(key) < 0));
      return '<div class="metric-editor" data-device-id="' + esc(attrEscape(device.device_id)) + '">' +
        '<div class="metric-editor-head"><span>表示項目 / 順序</span><span class="metric-editor-actions"><button class="secondary" type="button" onclick="resetDeviceMetricPrefs(\'' + esc(attrEscape(device.device_id)) + '\')">Reset</button><button class="secondary" type="button" onclick="toggleDeviceMetricEditor(\'\')">閉じる</button></span></div>' +
        '<div class="metric-chip-list">' + ordered.map((key) => {
          const active = selected.indexOf(key) > -1;
          return '<button type="button" class="metric-chip ' + (active ? 'active' : '') + '" draggable="' + (active ? 'true' : 'false') + '" data-key="' + esc(attrEscape(key)) + '">' + esc(metricMeta(key).label || key) + '</button>';
        }).join('') + '</div>' +
        '</div>';
    }

    function getMetricPrefs() {
      try {
        return JSON.parse(localStorage.getItem(DASHBOARD_METRIC_PREFS_KEY) || '{}') || {};
      } catch (err) {
        localStorage.removeItem(DASHBOARD_METRIC_PREFS_KEY);
        return {};
      }
    }

    function setMetricPrefs(prefs) {
      try { localStorage.setItem(DASHBOARD_METRIC_PREFS_KEY, JSON.stringify(prefs || {})); } catch (err) {}
    }

    function syncMetricPrefsWithServer(devices) {
      const prefs = getMetricPrefs();
      let changed = false;
      (devices || []).forEach((device) => {
        if (Array.isArray(device.dashboard_metrics) && device.dashboard_metrics.length && prefs[device.device_id]) {
          delete prefs[device.device_id];
          changed = true;
        }
      });
      if (changed) setMetricPrefs(prefs);
    }

    function saveDeviceMetricPrefs(deviceId, keys) {
      const prefs = getMetricPrefs();
      prefs[deviceId] = (keys || []).filter(Boolean).slice(0, 12);
      setMetricPrefs(prefs);
    }

    window.toggleDeviceMetricEditor = function (deviceId) {
      state.metricEditorDeviceId = state.metricEditorDeviceId === deviceId ? '' : (deviceId || '');
      renderDeviceList();
    };

    window.resetDeviceMetricPrefs = function (deviceId) {
      const prefs = getMetricPrefs();
      delete prefs[deviceId];
      setMetricPrefs(prefs);
      renderDeviceList();
    };

    function metricMeta(metric) {
      return (state.data.metricMeta && state.data.metricMeta[metric]) || inferMetricMeta(metric);
    }

    function inferMetricMeta(metric) {
      const raw = String(metric || '');
      const readable = inferReadableMetricMeta(raw);
      if (readable) return readable;
      const direct = {
        current_total: { label: '現在人数', unit: '人' },
        max_counted: { label: '最大人数', unit: '人' },
        Max_counted: { label: '最大人数', unit: '人' },
        total_mapped_regions: { label: '設定済みエリア数', unit: '' },
        in_counted: { label: '入場人数', unit: '人' },
        out_counted: { label: '退場人数', unit: '人' },
        capacity_counted: { label: '在室増減', unit: '人' },
        total_data_in_cumulative_counted: { label: '累計入場人数', unit: '人' },
        total_data_out_cumulative_counted: { label: '累計退場人数', unit: '人' },
        total_data_capacity_cumulative_counted: { label: '累計在室増減', unit: '人' },
        line_trigger_data_in: { label: '入場トリガー', unit: '人' },
        line_trigger_data_out: { label: '退場トリガー', unit: '人' }
      };
      if (direct[raw]) return direct[raw];
      const sensorEnable = inferSensorEnableMetricMeta(raw);
      if (sensorEnable) return sensorEnable;
      const vs121 = inferVs121MetricMeta(raw);
      if (vs121) return vs121;
      const vs125 = inferVs125MetricMeta(raw);
      if (vs125) return vs125;

      let m = raw.match(/^flow_data_([A-D])_([A-D])$/);
      if (m) return { label: m[1] + '-' + m[2] + ' 人流', unit: '人' };

      m = raw.match(/^current_counted_(\d+)$/);
      if (m) return { label: 'エリア' + (Number(m[1]) + 1) + ' 現在人数', unit: '人' };

      if (!device) return false;
      if (typeof device.online === 'boolean') return device.online;

    function batteryMetricKey(device) {
      const metrics = (device && device.metrics) || {};
      const keys = Object.keys(metrics);
      const preferred = ['battery', 'battery_level', 'battery_percent', 'battery_percentage'];
      for (let i = 0; i < preferred.length; i++) {
        if (Object.prototype.hasOwnProperty.call(metrics, preferred[i])) return preferred[i];

      for (let j = 0; j < keys.length; j++) {
        if (isBatteryMetric(keys[j])) return keys[j];

      return '';

    function getCachedDashboard() {
      try {
        const raw = localStorage.getItem(DASHBOARD_CACHE_KEY);

        const cached = JSON.parse(raw);
        if (isExpiredCache(cached, DASHBOARD_CACHE_MAX_AGE_MS)) {
          localStorage.removeItem(DASHBOARD_CACHE_KEY);
          return null;
        }
        return cached;
      } catch (err) {
        try { localStorage.removeItem(DASHBOARD_CACHE_KEY); } catch (e) {}
        return null;
      }
    }

    function saveCachedDashboard(data) {
      try {
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({
          data: data,
          cached_at: new Date().toISOString()
        }));
      } catch (err) {}
    }

    function applyCachedDashboard() {
      const cached = getCachedDashboard();
      if (!cached) return;
      const data = cached.data || cached;
      state.data = data;
      render(data);
      state.lastSuccessfulAt = 0;
      setStatus(t('common.status.cached'));
    }

    function getStored(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v == null ? fallback : v;
      } catch (err) {
        return fallback;
      }
    }

    function setStored(key, value) {
      try { localStorage.setItem(key, value); } catch (err) {}
    }

    function cleanupLocalStorage(namespace, allowedKeys, maxAgeMs) {
      try {
        const allowed = {};
        allowedKeys.forEach((key) => allowed[key] = true);
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (!key || key.indexOf(namespace) !== 0) continue;
          if (!allowed[key]) {
            localStorage.removeItem(key);
            continue;
          }
          if (key === DASHBOARD_CACHE_KEY || key === DASHBOARD_MEETING_CACHE_KEY) {
            const cached = JSON.parse(localStorage.getItem(key) || 'null');
            if (isExpiredCache(cached, maxAgeMs)) localStorage.removeItem(key);
          }
        }
      } catch (err) {}
    }

    function isExpiredCache(cached, maxAgeMs) {
      if (!cached || !cached.cached_at) return false;
      const t = new Date(cached.cached_at).getTime();
      return isFinite(t) && Date.now() - t > maxAgeMs;
    }

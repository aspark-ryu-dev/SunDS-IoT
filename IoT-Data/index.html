<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070910;
      --bg-1: #0b0e17;
      --panel: rgba(255,255,255,0.038);
      --panel-2: rgba(255,255,255,0.055);
      --panel-hi: rgba(255,255,255,0.085);
      --glass: rgba(13,17,27,0.72);
      --card-border: rgba(255,255,255,0.07);
      --card-border-2: rgba(255,255,255,0.11);
      --ink: #eef1f8;
      --ink-dim: #c7cdda;
      --muted: #8b93a7;
      --muted-2: #5c6478;
      --line: rgba(255,255,255,0.07);
      --accent: #2dd4bf;
      --accent-2: #5b9df6;
      --accent-3: #818cf8;
      --grad: linear-gradient(115deg, #2dd4bf 0%, #5b9df6 55%, #818cf8 100%);
      --grad-soft: linear-gradient(115deg, rgba(45,212,191,.18), rgba(129,140,248,.18));
      --ok: #34d399;
      --ok-soft: rgba(52,211,153,.13);
      --warn: #fbbf24;
      --warn-soft: rgba(251,191,36,.13);
      --bad: #fb7185;
      --bad-soft: rgba(251,113,133,.13);
      --field: rgba(255,255,255,0.055);
      --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -16px rgba(0,0,0,.7);
      --shadow-2: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 56px -28px rgba(0,0,0,.78);
      --glow: 0 8px 24px -8px rgba(45,212,191,.5);
      --r-sm: 9px;
      --r-md: 12px;
      --r-lg: 16px;
      --header-h: 64px;
      --side-w: 248px;
      --side-w-collapsed: 76px;
      font-family: "Zen Kaku Gothic New", "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-display: "Outfit", "Zen Kaku Gothic New", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    body.theme-light {
      color-scheme: light;
      --bg: #eef1f7;
      --bg-1: #f6f8fc;
      --panel: rgba(15,23,42,0.028);
      --panel-2: rgba(15,23,42,0.045);
      --panel-hi: rgba(15,23,42,0.07);
      --glass: rgba(255,255,255,0.78);
      --card-border: rgba(15,23,42,0.09);
      --card-border-2: rgba(15,23,42,0.14);
      --ink: #0f1626;
      --ink-dim: #36405a;
      --muted: #687288;
      --muted-2: #97a0b4;
      --line: rgba(15,23,42,0.09);
      --field: rgba(15,23,42,0.045);
      --shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 8px 22px -16px rgba(15,23,42,.4);
      --shadow-2: 0 1px 0 rgba(255,255,255,.7) inset, 0 24px 50px -28px rgba(15,23,42,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 4% -10%, rgba(45,212,191,.14), transparent 58%),
        radial-gradient(1000px 620px at 106% -8%, rgba(129,140,248,.16), transparent 56%),
        radial-gradient(700px 500px at 80% 120%, rgba(91,157,246,.10), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: var(--header-h);
      padding: 0 18px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(140%);
      border-bottom: 1px solid var(--line);
    }
    .menu-toggle {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      background: var(--panel-2);
      color: var(--ink-dim);
      border: 1px solid var(--card-border-2);
      box-shadow: none;
    }
    .menu-toggle:hover { background: var(--panel-hi); color: var(--ink); }
    .menu-toggle svg { width: 20px; height: 20px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo {
      width: 38px; height: 38px; flex: none;
      border-radius: 11px;
      background: var(--grad);
      display: grid; place-items: center;
      box-shadow: var(--glow);
    }
    .logo svg { width: 21px; height: 21px; display: block; }
    h1 {
      margin: 0;
      font: 800 18px/1.1 var(--font-display);
      letter-spacing: 0;
      background: linear-gradient(90deg, var(--ink), var(--ink-dim));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      margin: 0 0 13px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    h2::before {
      content: "";
      width: 4px;
      height: 15px;
      border-radius: 2px;
      background: var(--grad);
      flex: none;
    }
    .app {
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr);
      min-height: 100vh;
      padding-top: var(--header-h);
      transition: grid-template-columns .2s ease;
    }
    body.menu-collapsed .app {
      grid-template-columns: var(--side-w-collapsed) minmax(0, 1fr);
    }
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--side-w);
      height: calc(100vh - var(--header-h));
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(18px);
      padding: 16px 12px;
      transition: width .2s ease;
    }
    body.menu-collapsed .sidebar { width: var(--side-w-collapsed); }
    .nav-group { display: grid; gap: 4px; }
    .nav-label {
      padding: 14px 12px 6px;
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .nav-item {
      position: relative;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: transparent;
      color: var(--ink-dim);
      box-shadow: none;
      text-align: left;
      transition: .14s;
      font-weight: 700;
    }
    .nav-item:hover {
      background: var(--panel-2);
      color: var(--ink);
    }
    .nav-item.active {
      background: var(--grad-soft);
      border-color: rgba(45,212,191,0.32);
      color: var(--ink);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 50%;
      width: 3px;
      height: 22px;
      border-radius: 0 3px 3px 0;
      background: var(--grad);
      transform: translateY(-50%);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--ink-dim);
      font-size: 12px;
      font-weight: 800;
      font-family: var(--font-display);
    }
    .nav-icon svg { width: 15px; height: 15px; }
    .nav-item.active .nav-icon { background: rgba(45,212,191,.18); color: var(--accent); }
    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.menu-collapsed .nav-item {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 10px 8px;
    }
    body.menu-collapsed .nav-text,
    body.menu-collapsed .nav-label {
      display: none;
    }
    .content {
      display: grid;
      gap: 18px;
      padding: 20px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      grid-column: 2;
    }
    .page { display: grid; gap: 18px; animation: fade .26s ease; }
    .page.hidden { display: none; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 24;
      background: rgba(0,0,0,0.45);
      display: none;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    section::before {
      content: "";
      display: block;
      height: 3px;
      margin: -18px -18px 15px;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      background: var(--grad);
      opacity: .85;
    }
    .grid { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(340px, .9fr); gap: 18px; align-items: start; }
    .map-admin-grid { grid-template-columns: 1fr; }
    .three { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .stack { display: grid; gap: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .full { grid-column: 1 / -1; }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font: inherit;
      background: var(--field);
      color: var(--ink);
    }
    select option {
      background: var(--bg-1);
      color: var(--ink);
    }
    textarea {
      min-height: 78px;
      resize: vertical;
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12.5px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(45,212,191,0.55);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.14);
    }
    button {
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 8px 13px;
      font: inherit;
      font-weight: 700;
      background: var(--grad);
      color: #052420;
      cursor: pointer;
      box-shadow: 0 8px 18px -8px rgba(45,212,191,0.6);
    }
    button.secondary {
      background: var(--panel-2);
      color: var(--ink-dim);
      border-color: var(--card-border-2);
      box-shadow: none;
    }
    button.secondary:hover { background: var(--panel-hi); color: var(--ink); }
    button.danger {
      background: var(--bad-soft);
      color: var(--bad);
      border-color: rgba(251,113,133,.32);
      box-shadow: none;
    }
    button:disabled { opacity: .55; cursor: wait; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 9px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    th {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    tbody tr:hover { background: var(--panel-2); }
    td button { padding: 5px 10px; font-size: 12px; }
    code {
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 11.5px;
      color: #c8ccff;
      background: rgba(129,140,248,0.13);
      border: 1px solid rgba(129,140,248,0.18);
      border-radius: 5px;
      padding: 1px 5px;
    }
    .muted { color: var(--muted); }
    .status { min-height: 22px; color: var(--ink-dim); font-size: 12.5px; }
    .status.error { color: #fca5a5; }
    .brand-sub {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-top: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .clock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .clock-time { font: 700 15px var(--font-mono); color: var(--ink); }
    .clock-date { font-size: 10.5px; color: var(--muted); font-weight: 700; }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(91,157,246,.3);
      background: rgba(91,157,246,.13);
      color: var(--accent-2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .03em;
    }
    .live-dot i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(91,157,246,.55);
      animation: pulse 2s infinite;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      flex: none;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--card-border-2);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      cursor: pointer;
      transition: .16s;
      box-shadow: none;
    }
    .icon-btn:hover { background: var(--panel-hi); color: var(--ink); }
    .icon-btn svg { width: 19px; height: 19px; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(91,157,246,.5); }
      70% { box-shadow: 0 0 0 7px rgba(91,157,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(91,157,246,0); }
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
    }
    .check input { width: 16px; height: 16px; accent-color: var(--accent); }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(45,212,191,0.28);
      color: var(--accent);
      background: rgba(45,212,191,0.12);
      font-size: 11px;
      font-weight: 800;
    }
    .pill.off {
      color: #fca5a5;
      border-color: rgba(248,113,113,0.32);
      background: rgba(248,113,113,0.12);
    }
    .metric-picks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--panel);
    }
    .metric-picks:empty::before {
      content: "選択可能な指標がありません";
      color: var(--muted);
      font-size: 12px;
    }
    .metric-toggle-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--panel);
      min-height: 58px;
    }
    .metric-toggle-list:empty::before {
      content: "受信済み key がありません";
      color: var(--muted);
      font-size: 12px;
    }
    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }
    .metric-chip.active {
      border-color: rgba(45,212,191,.5);
      background: rgba(45,212,191,.16);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(45,212,191,.12);
    }
    .metric-chip.dragging { opacity: .55; cursor: grabbing; }
    .map-preview {
      position: relative;
      width: 100%;
      aspect-ratio: var(--map-aspect, 1.5);
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background-color: #0d1422;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      overflow: hidden;
      touch-action: none;
      box-shadow: 0 24px 60px -24px rgba(0,0,0,.75), 0 0 0 1px var(--line);
    }
    .map-preview:empty::before {
      content: "プレビューなし";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .map-preview-item {
      position: absolute;
      transform: translate(-50%, -50%);
      width: var(--card-w, 150px);
      min-width: 100px;
      max-width: 360px;
      min-height: 54px;
      max-height: 260px;
      padding: 7px 9px;
      border-radius: var(--r-sm);
      border: 1px solid rgba(15,23,42,.1);
      background: rgba(255,255,255,.97);
      color: #141a26;
      box-shadow: 0 14px 32px -10px rgba(8,12,20,.55), 0 2px 6px rgba(8,12,20,.2);
      font-size: 11px;
      cursor: grab;
      user-select: none;
      overflow: hidden;
      z-index: 2;
    }
    .map-preview-item.dragging { cursor: grabbing; opacity: .86; z-index: 5; }
    .map-preview-item.selected {
      outline: 2px solid rgba(45,212,191,.78);
      outline-offset: 3px;
      z-index: 7;
    }
    .map-preview-item.popup {
      width: auto;
      min-width: 86px;
      max-width: 130px;
      padding: 6px 8px;
      border-color: rgba(45,212,191,.45);
      background: rgba(236,253,245,.96);
      z-index: 9;
    }
    .map-preview-item::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 0;
      height: 2.5px;
      border-radius: 0 0 3px 3px;
      background: var(--grad);
    }
    .map-preview-item.popup .map-preview-metrics { display: none; }
    .map-resize {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 16px;
      height: 16px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: nwse-resize;
      opacity: .58;
    }
    .map-resize::before {
      content: "";
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 10px;
      height: 10px;
      border-right: 2px solid #64748b;
      border-bottom: 2px solid #64748b;
    }
    .map-preview-item.popup .map-resize { display: none; }
    .map-item-editor {
      position: absolute;
      z-index: 20;
      width: min(360px, calc(100% - 24px));
      transform: translate(-50%, 14px);
      padding: 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--card-border-2);
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(145%);
      box-shadow: var(--shadow-2);
      color: var(--ink);
    }
    .map-item-editor::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      border-left: 1px solid var(--card-border-2);
      border-top: 1px solid var(--card-border-2);
      background: var(--glass);
    }
    .map-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .map-editor-head b { font: 800 13px var(--font-display); }
    .map-editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .map-editor-grid .full { grid-column: 1 / -1; }
    .map-editor-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--panel);
      min-height: 48px;
    }
    .map-editor-metrics:empty::before {
      content: "受信済み key がありません";
      color: var(--muted);
      font-size: 12px;
    }
    .map-editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }
    .map-preview-title {
      color: #64708a;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .map-preview-metrics {
      display: grid;
      gap: 2px;
      margin-top: 4px;
    }
    .map-preview-metric {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #7a8498;
    }
    .map-preview-value {
      color: #141a26;
      font-weight: 800;
    }
    /* delete button on a placed marker */
    .map-del {
      position: absolute;
      top: -9px;
      right: -9px;
      width: 20px;
      height: 20px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1.5px solid #fff;
      background: var(--bad);
      color: #fff;
      font: 800 13px/1 var(--font-display);
      box-shadow: 0 4px 10px -3px rgba(0,0,0,.5);
      opacity: 0;
      transform: scale(.7);
      transition: .14s;
      cursor: pointer;
    }
    .map-preview-item:hover .map-del,
    .map-preview-item:focus-within .map-del { opacity: 1; transform: scale(1); }
    @media (hover: none) { .map-del { opacity: 1; transform: scale(1); } }
    .map-del:hover { background: #ef4444; }
    .map-hint {
      position: absolute;
      left: 12px;
      bottom: 10px;
      z-index: 4;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border-2);
      color: var(--ink-dim);
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .map-edit-note {
      margin-top: 16px;
      padding: 12px 13px;
      border: 1px solid var(--card-border);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink-dim);
      font-size: 12px;
      line-height: 1.7;
    }
    .map-save-state {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 9px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 11px;
      font-weight: 800;
    }
    .map-save-state.dirty {
      color: var(--warn);
      border-color: rgba(251,191,36,.35);
      background: var(--warn-soft);
    }
    .map-preview.dirty {
      box-shadow: 0 24px 60px -24px rgba(0,0,0,.75), 0 0 0 2px rgba(251,191,36,.42);
    }
    .map-control-grid {
      display: grid;
      grid-template-columns: minmax(360px, .9fr) minmax(420px, 1.1fr);
      gap: 18px;
      align-items: start;
    }
    .map-coordinate-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .map-target-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid #fff;
      background: rgba(34,211,238,.26);
      box-shadow: 0 0 0 5px rgba(34,211,238,.18), 0 12px 24px -12px rgba(0,0,0,.75);
      z-index: 6;
      pointer-events: none;
    }
    .map-target-dot::before,
    .map-target-dot::after {
      content: "";
      position: absolute;
      background: #fff;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .map-target-dot::before { width: 30px; height: 2px; }
    .map-target-dot::after { width: 2px; height: 30px; }
    /* quick-add popover anchored at the clicked point */
    .map-add-popover {
      position: absolute;
      z-index: 8;
      transform: translate(-50%, 12px);
      width: 248px;
      max-width: calc(100% - 24px);
      padding: 13px;
      border-radius: var(--r-md);
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--card-border-2);
      box-shadow: var(--shadow-2);
      display: grid;
      gap: 9px;
    }
    .map-add-popover::before {
      content: "";
      position: absolute;
      top: -7px;
      left: 50%;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      background: var(--glass);
      border-left: 1px solid var(--card-border-2);
      border-top: 1px solid var(--card-border-2);
    }
    .map-add-popover .map-add-title { font: 800 12px var(--font-display); color: var(--ink); display: flex; align-items: center; gap: 7px; }
    .map-add-popover .map-add-title::before { content: ""; width: 12px; height: 2px; border-radius: 2px; background: var(--grad); }
    .map-add-popover select { font-size: 13px; }
    .map-add-popover .map-add-actions { display: flex; gap: 7px; }
    .map-add-popover .map-add-actions button { flex: 1; padding: 7px 10px; font-size: 12px; }
    .map-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      box-shadow: 0 4px 10px -3px rgba(0,0,0,.5);
      z-index: 7;
      pointer-events: none;
    }
    .latest-device-list {
      display: grid;
      gap: 8px;
    }
    .latest-device {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--panel-2);
      color: var(--ink);
      text-align: left;
      box-shadow: none;
    }
    .latest-device.active {
      border-color: rgba(45,212,191,0.55);
      background: var(--grad-soft);
    }
    .latest-device-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }
    .latest-device-meta {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 600;
    }
    @media (max-width: 960px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid, .three, .form-grid, .map-admin-grid { grid-template-columns: 1fr; }
      .app,
      body.menu-collapsed .app { display: block; padding-top: 110px; }
      .content { padding: 16px; }
      .map-preview { min-height: 360px; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 25;
        width: min(300px, 86vw);
        height: 100vh;
        transform: translateX(-105%);
        transition: transform .18s ease;
        background: rgba(11,13,19,0.96);
      }
      body.menu-open .sidebar { transform: translateX(0); }
      body.menu-open .sidebar-backdrop { display: block; }
    }
    /* --- section head with primary action --- */
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 13px; }
    .section-head h2 { margin: 0; }
    .btn-add { background: var(--grad); color: #052420; box-shadow: 0 8px 18px -8px rgba(45,212,191,.6); white-space: nowrap; }

    /* --- KPI strip --- */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .kpi { position: relative; overflow: hidden; border: 1px solid var(--card-border); border-radius: var(--r-lg); padding: 15px 16px 13px; background: var(--panel); box-shadow: var(--shadow); }
    .kpi::after { content: ""; position: absolute; inset: 0 0 auto 0; height: 3px; background: var(--grad); opacity: .85; }
    .kpi-top { display: flex; align-items: center; justify-content: space-between; }
    .kpi-label { color: var(--muted); font-size: 10.5px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; }
    .kpi-ico { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: var(--grad-soft); color: var(--accent); }
    .kpi-ico svg { width: 16px; height: 16px; }
    .kpi-val { font: 800 28px/1 var(--font-display); margin: 11px 0 5px; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
    .kpi-foot { font-size: 11.5px; color: var(--muted); }
    .kpi.kpi-ok .kpi-ico { color: var(--ok); background: var(--ok-soft); }
    .kpi.kpi-bad .kpi-ico { color: var(--bad); background: var(--bad-soft); }

    /* --- table polish --- */
    thead th { position: sticky; top: 0; z-index: 1; background: var(--bg-1); }
    tbody tr.editing { background: var(--grad-soft); box-shadow: inset 3px 0 0 var(--accent); }

    /* --- slide-in drawer (device add/edit) --- */
    .drawer-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s; }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; z-index: 41;
      width: min(460px, 94vw); height: 100vh; overflow: auto;
      background: var(--bg-1); border-left: 1px solid var(--card-border-2);
      box-shadow: -30px 0 60px -30px rgba(0,0,0,.8);
      transform: translateX(105%); transition: transform .24s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: none; }
    .drawer-head {
      position: sticky; top: 0; z-index: 2;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      padding: 18px 20px; background: var(--glass); backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .drawer-title { font: 800 17px var(--font-display); }
    .drawer-sub { color: var(--muted); font-size: 12px; margin-top: 3px; font-family: var(--font-mono); }
    .drawer-body { padding: 18px 20px 28px; }
    .field-group { margin-bottom: 18px; }
    .field-group > h3 {
      margin: 0 0 10px; font-size: 11px; font-weight: 800; letter-spacing: .08em;
      text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 7px;
    }
    .field-group > h3::before { content: ""; width: 14px; height: 2px; border-radius: 2px; background: var(--grad); }
    .drawer-actions { display: flex; gap: 9px; margin-top: 4px; }
    .drawer-actions button { flex: 1; }
    input[readonly] { opacity: .65; cursor: not-allowed; background: rgba(127,127,127,.08); }
    .lock-hint { font-size: 10px; color: var(--muted-2); font-weight: 700; text-transform: none; letter-spacing: 0; }
    .hint { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.6; }

    /* --- toast --- */
    #toastWrap { position: fixed; right: 18px; bottom: 18px; z-index: 60; display: grid; gap: 8px; }
    .toast {
      display: flex; align-items: center; gap: 9px; padding: 11px 15px; border-radius: var(--r-sm);
      background: var(--glass); backdrop-filter: blur(18px); border: 1px solid var(--card-border-2);
      box-shadow: var(--shadow-2); color: var(--ink); font-size: 13px; font-weight: 700;
      animation: toastIn .26s ease;
    }
    .toast.ok { border-color: rgba(52,211,153,.4); } .toast.ok b { color: var(--ok); }
    .toast.err { border-color: rgba(251,113,133,.4); } .toast.err b { color: var(--bad); }
    .toast i { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); flex: none; }
    .toast.err i { background: var(--bad); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    @media (max-width: 960px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .drawer { width: 100vw; }
      #toastWrap { right: 12px; left: 12px; bottom: 12px; }
    }
  </style>
</head>

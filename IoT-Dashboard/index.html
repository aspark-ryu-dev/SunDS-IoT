        n.classList.toggle('active', n.getAttribute('data-page-target') === target);
      });
      document.querySelectorAll('[data-page]').forEach((section) => {
        section.classList.toggle('hidden', section.getAttribute('data-page') !== target);
      });
      if (persist !== false) setStored(DASHBOARD_PAGE_KEY, target);
      if (target === 'map') setTimeout(fitStageToWrap, 0);
      if (target === 'meeting') {
        if (!state.meetingLoaded) applyCachedMeeting();
        loadMeeting(!!state.meetingLoaded);
      } else if (target === 'dashboard' || target === 'map') {
        load(!!state.data);
      } else if (!state.data && !state.requests.apiGetDashboardState) {
        load(true);
      }
    }

    function normalizePage(page) {
      if (page === 'iot') return 'map';
      if (page === 'devices') return 'dashboard';
      if (page === 'parking') return 'pmc';
      return page || 'dashboard';
    }

    function scheduleRefresh(delaySeconds) {
      clearTimeout(state.timer);
      const seconds = Number(delaySeconds) || selectedRefreshIntervalSec();
      state.timer = setTimeout(() => {
        const dashboardPage = document.querySelector('[data-page="dashboard"]:not(.hidden),[data-page="map"]:not(.hidden)');
        const meetingPage = document.querySelector('[data-page="meeting"]');
        if (dashboardPage) load(true);
        if (meetingPage && !meetingPage.classList.contains('hidden')) loadMeeting(true);
      }, Math.max(60, seconds) * 1000);
    }

    function refreshAfterResume() {
      if (document.visibilityState === 'hidden') return;
      clearTimeout(state.timer);
      const dashboardPage = document.querySelector('[data-page="dashboard"]:not(.hidden),[data-page="map"]:not(.hidden)');
      const meetingPage = document.querySelector('[data-page="meeting"]');
      if (dashboardPage) load(true, true);
      if (meetingPage && !meetingPage.classList.contains('hidden')) loadMeeting(true, true);
    }

    function refreshIfStale() {
      if (document.visibilityState === 'hidden') return;
      const allowedMs = selectedRefreshIntervalSec() * 1500 + 15000;
      if (!state.lastSuccessfulAt || Date.now() - state.lastSuccessfulAt > allowedMs) {
        refreshAfterResume();
      }
    }

    function selectedRefreshIntervalSec() {
      const n = Number($('refreshInterval').value || getStored(DASHBOARD_REFRESH_KEY, ''));
      return n === 300 || n === 600 ? n : 60;
    }

    function applyRefreshIntervalControl(config) {
      const stored = getStored(DASHBOARD_REFRESH_KEY, '');
      const fromConfig = Number(config.refresh_interval_sec || 60);
      const value = stored || String(fromConfig === 300 || fromConfig === 600 ? fromConfig : 60);
      $('refreshInterval').value = value;
    }

    function setIotGroupCollapsed(collapsed) {
      $('iotMenuParent').setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      $('iotMenuGroup').classList.toggle('collapsed', !!collapsed);
      setStored(DASHBOARD_IOT_GROUP_KEY, collapsed ? '1' : '0');
    }

    function setStatus(text, isError) {
      $('status').textContent = text || '';
      $('status').className = 'status' + (isError ? ' error' : '');
    }

    function tickClock() {
      const d = new Date();
      $('clkTime').textContent = d.toLocaleTimeString('ja-JP');
      $('clkDate').textContent = d.toLocaleDateString('ja-JP', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    const THEME_ICONS = {
      light: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>',
      dark: '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
      system: '<rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/>'
    };
    const THEME_LABELS = { light: 'Light', dark: 'Dark', system: 'System (OS追従)' };
    function systemPrefersDark() {
      return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    function applyTheme(mode) {
      const m = (mode === 'light' || mode === 'system') ? mode : 'dark';
      const dark = m === 'system' ? systemPrefersDark() : (m === 'dark');
      document.body.classList.toggle('theme-light', !dark);
      if ($('themeIco')) $('themeIco').innerHTML = THEME_ICONS[m];
      if ($('themeToggle')) $('themeToggle').setAttribute('title', 'テーマ: ' + THEME_LABELS[m]);
    }

    function formatValue(v, unit) {
      if (v === null || v === undefined || String(v).trim() === '') return '--';
      const n = Number(v);
      const body = isFinite(n) ? String(Math.round(n * 100) / 100) : String(v == null ? '' : v);
      return unit ? body + unit : body;
    }

    function hasMetricValue(hit) {
      return !!hit && hit.value !== null && hit.value !== undefined && String(hit.value).trim() !== '';
    }

    function shortDate(v) {
      if (!v) return '';
      const d = new Date(v);
      return isNaN(d.getTime()) ? v : d.toLocaleString('ja-JP');
    }

    function esc(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function attrEscape(v) {
      return String(v == null ? '' : v).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    $('refreshInterval').addEventListener('change', () => {
      setStored(DASHBOARD_REFRESH_KEY, String(selectedRefreshIntervalSec()));
      scheduleRefresh();
    });
    function setActiveThemeSeg(mode) {
      document.querySelectorAll('#themeSeg button').forEach((b) => b.classList.toggle('on', b.getAttribute('data-theme') === mode));
    }
    function setTheme(mode) {
      setStored(DASHBOARD_THEME_KEY, mode);
      applyTheme(mode);
      setActiveThemeSeg(mode);
    }
    $('themeSeg').addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (b) setTheme(b.getAttribute('data-theme'));
    });
    $('settingsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      $('settingsPanel').classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#settingsPanel') && !e.target.closest('#settingsBtn')) $('settingsPanel').classList.remove('open');
    });
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (getStored(DASHBOARD_THEME_KEY, 'dark') === 'system') applyTheme('system');
      });
    }
    $('iotMenuParent').addEventListener('click', () => {
      setIotGroupCollapsed($('iotMenuParent').getAttribute('aria-expanded') !== 'false');
    });
    if ($('collapsePopupsBtn')) $('collapsePopupsBtn').addEventListener('click', closeAllMapPopups);
    $('fullscreenBtn').addEventListener('click', toggleBrowserFullscreen);
    $('stageFullscreenBtn').addEventListener('click', toggleMapFullscreen);
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && document.body.classList.contains('map-fullscreen')) toggleMapFullscreen();
    });
    $('deviceList').addEventListener('click', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (!chip) return;
      const editor = chip.closest('.metric-editor');
      if (!editor) return;
      chip.classList.toggle('active');
      chip.setAttribute('draggable', chip.classList.contains('active') ? 'true' : 'false');
      saveDeviceMetricPrefs(editor.getAttribute('data-device-id'), Array.from(editor.querySelectorAll('.metric-chip.active')).map((n) => n.getAttribute('data-key')));
      renderDeviceList();
    });
    $('deviceList').addEventListener('dragstart', (ev) => {
      const chip = ev.target.closest('.metric-chip.active');
      if (!chip) return;
      chip.classList.add('dragging');
    });
    $('deviceList').addEventListener('dragend', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (chip) chip.classList.remove('dragging');
      const editor = ev.target.closest('.metric-editor');
      if (!editor) return;
      saveDeviceMetricPrefs(editor.getAttribute('data-device-id'), Array.from(editor.querySelectorAll('.metric-chip.active')).map((n) => n.getAttribute('data-key')));
      renderDeviceList();
    });
    $('deviceList').addEventListener('dragover', (ev) => {
      const editor = ev.target.closest('.metric-editor');
      if (!editor) return;
      const dragging = editor.querySelector('.metric-chip.dragging');
      const over = ev.target.closest('.metric-chip.active');
      if (!dragging || !over || dragging === over) return;
      ev.preventDefault();
      const box = over.getBoundingClientRect();
      const before = ev.clientX < box.left + box.width / 2;
      over.parentNode.insertBefore(dragging, before ? over : over.nextSibling);
    });
    function toggleMeetingFilter(node) {
      const filter = node.getAttribute('data-meeting-filter') || 'all';
      state.meetingFilter = state.meetingFilter === filter ? 'all' : filter;
      setStored(DASHBOARD_MEETING_FILTER_KEY, state.meetingFilter);
      renderMeetingSummary();
      renderMeetingRooms();
    }
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape') closeMeetingHeatmap();
    });
    function hideMeetingTrendTip() {
      const wrap = $('meetingAnalytics') && $('meetingAnalytics').querySelector('.meeting-trend-wrap');
      if (!wrap) return;
      wrap.querySelector('.meeting-trend-cursor').style.display = 'none';
      wrap.querySelector('.meeting-trend-tip').style.display = 'none';
    }
    $('meetingAnalytics').addEventListener('mousemove', (ev) => {
      const wrap = ev.target.closest('.meeting-trend-wrap');
      if (!wrap) { hideMeetingTrendTip(); return; }
      const pts = state.meetingTrend || [];
      if (!pts.length) return;
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0, 0).getTime();
      const rangeMs = 14 * 3600000;
      const box = wrap.getBoundingClientRect();
      const tms = Math.min(start + Math.max(0, Math.min(1, (ev.clientX - box.left) / box.width)) * rangeMs, pts[pts.length - 1].t);
      let hit = pts[0];
      for (let i = 0; i < pts.length; i++) {
        if (pts[i].t <= tms) hit = pts[i];
        else break;
      }
      const leftPct = Math.max(0, Math.min(100, (hit.t - start) / rangeMs * 100));
      const cursor = wrap.querySelector('.meeting-trend-cursor');
      cursor.style.left = leftPct + '%';
      cursor.style.display = 'block';
      const time = new Date(hit.t);
      const hh = ('0' + time.getHours()).slice(-2) + ':' + ('0' + time.getMinutes()).slice(-2);
      const roomRows = Object.keys(hit.rooms || {}).sort((a, b) => hit.rooms[b] - hit.rooms[a]).slice(0, 6)
        .map((loc) => '<div class="row"><span>' + esc(loc) + '</span><span>' + esc(hit.rooms[loc] + '人') + '</span></div>').join('');
      const tip = wrap.querySelector('.meeting-trend-tip');
      tip.innerHTML = '<b>' + esc(hh) + ' ・ ' + esc(hit.v + '人') + '</b>' + roomRows;
      tip.style.display = 'block';
      const flip = leftPct > 55;
      tip.style.left = flip ? '' : 'calc(' + leftPct + '% + 8px)';
      tip.style.right = flip ? 'calc(' + (100 - leftPct) + '% + 8px)' : '';
    });
    $('meetingAnalytics').addEventListener('mouseleave', hideMeetingTrendTip);
    $('meetingRooms').addEventListener('dragstart', (ev) => {
      const card = ev.target.closest('.meeting-room[draggable="true"]');
      if (!card) return;
      card.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      try { ev.dataTransfer.setData('text/plain', card.getAttribute('data-room-location') || ''); } catch (err) {}
    });
    $('meetingRooms').addEventListener('dragover', (ev) => {
      const dragging = $('meetingRooms').querySelector('.meeting-room.dragging');
      if (!dragging) return;
      ev.preventDefault();
      const over = ev.target.closest('.meeting-room');
      if (!over || over === dragging) return;
      const box = over.getBoundingClientRect();
      const before = ev.clientX < box.left + box.width / 2;
      over.parentNode.insertBefore(dragging, before ? over : over.nextSibling);
    });
    $('meetingRooms').addEventListener('dragend', () => {
      const dragging = $('meetingRooms').querySelector('.meeting-room.dragging');
      if (!dragging) return;
      dragging.classList.remove('dragging');
      saveMeetingRoomOrderFromDom();
    });
    $('meetingSummary').addEventListener('click', (ev) => {
      const item = ev.target.closest('[data-meeting-filter]');
      if (item) toggleMeetingFilter(item);
    });
    $('meetingSummary').addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter' && ev.key !== ' ') return;
      const item = ev.target.closest('[data-meeting-filter]');
      if (!item) return;
      ev.preventDefault();
      toggleMeetingFilter(item);
    });
    window.addEventListener('resize', fitStageToWrap);
    window.addEventListener('focus', refreshIfStale);
    window.addEventListener('online', refreshAfterResume);
    window.addEventListener('pageshow', refreshIfStale);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshIfStale();
    });
    $('stage').addEventListener('click', (ev) => {
      if (ev.target.closest('.popup-close')) {
        ev.stopPropagation();
        const popup = ev.target.closest('.map-popup');
        const popupId = popup && popup.getAttribute('data-popup-id');
        if (popup) popup.remove();
        if (popupId) {
          const point = $('stage').querySelector('.map-point[data-point-id="' + cssEscape(popupId) + '"]');
          if (point) point.classList.remove('open');
        }
        return;
      }
      if (ev.target.closest('.map-popup')) ev.stopPropagation();
    });
    $('menuToggle').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 920px)').matches) {
        document.body.classList.toggle('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DASHBOARD_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarCollapse').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 920px)').matches) {
        document.body.classList.remove('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DASHBOARD_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarBackdrop').addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
    document.querySelectorAll('[data-page-target]').forEach((btn) => {
      btn.addEventListener('click', () => {
        activatePage(btn.getAttribute('data-page-target'), true);
        document.body.classList.remove('menu-open');
      });
    });
    $('search').addEventListener('input', (ev) => {
      state.query = ev.target.value || '';
      setStored(DASHBOARD_QUERY_KEY, state.query);
      renderDeviceList();
    });
    document.querySelectorAll('#filterSeg [data-filter]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.filter = btn.getAttribute('data-filter') || 'all';
        document.querySelectorAll('#filterSeg [data-filter]').forEach((b) => b.classList.toggle('on', b === btn));
        renderDeviceList();
      });
    });
    cleanupLocalStorage('iotDashboard.', DASHBOARD_ALLOWED_STORAGE_KEYS, DASHBOARD_CACHE_MAX_AGE_MS);
    initText();
    if (getStored(DASHBOARD_MENU_KEY, '0') === '1') document.body.classList.add('menu-collapsed');
    setIotGroupCollapsed(getStored(DASHBOARD_IOT_GROUP_KEY, '0') === '1');
    (function () { const tm = getStored(DASHBOARD_THEME_KEY, 'dark'); applyTheme(tm); setActiveThemeSeg(tm); })();
    applyLogoConfig({});
    tickClock();
    setInterval(tickClock, 1000);
    setInterval(refreshIfStale, DASHBOARD_STALE_CHECK_MS);
    applyCachedDashboard();
  </script>
</body>
</html>

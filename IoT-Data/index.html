      <div>
        <div class="drawer-title" id="deviceDrawerTitle">デバイス追加</div>
        <div class="drawer-sub" id="deviceDrawerSub"></div>
      </div>
      <button class="icon-btn" id="deviceDrawerClose" type="button" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <form id="deviceForm">
        <div class="field-group">
          <h3>基本情報</h3>
          <div class="form-grid">
            <label class="full" data-i18n-label="data.deviceEdit.deviceId"><input id="device_id" required> <span class="lock-hint" id="deviceIdHint"></span></label>
            <label class="full" data-i18n-label="data.deviceEdit.name"><input id="device_name"></label>
          </div>
        </div>
        <div class="field-group">
          <h3>設置場所</h3>
          <div class="form-grid">
            <label data-i18n-label="data.deviceEdit.area"><input id="device_area_id" list="dl_area"></label>
            <label data-i18n-label="data.deviceEdit.location"><input id="device_location" list="dl_location"></label>
          </div>
        </div>
        <div class="field-group">
          <h3>種別・電源</h3>
          <div class="form-grid">
            <label data-i18n-label="data.deviceEdit.type"><input id="device_type" list="dl_type"></label>
            <label data-i18n-label="data.deviceEdit.sensorType"><input id="device_sensor_type" list="dl_sensor_type" placeholder="iaq / occupancy"></label>
            <label class="full" data-i18n-label="data.deviceEdit.power"><input id="device_power_source" list="dl_power" placeholder="battery / poe"></label>
          </div>
        </div>
        <div class="field-group">
          <h3>送信設定・メモ</h3>
          <div class="form-grid">
            <label data-i18n-label="data.deviceEdit.reportInterval"><input id="device_report_interval_min" type="number" min="0.1" step="0.1" placeholder="10"></label>
            <label class="check"><input id="device_enabled" type="checkbox" checked> <span data-i18n="common.enabled"></span></label>
            <label class="full" data-i18n-label="data.deviceEdit.note"><textarea id="device_note"></textarea></label>
          </div>
        </div>
        <div class="field-group">
          <h3>マップ表示</h3>
          <div class="form-grid">
            <div id="deviceMetricToggles" class="metric-toggle-list full"></div>
            <p class="hint full">実際に受信した key だけ表示します。点灯している key がカードに表示され、ドラッグで表示順を変更できます。</p>
          </div>
        </div>
        <div class="drawer-actions">
          <button type="submit" data-i18n="common.actions.save"></button>
          <button id="deleteDeviceBtn" type="button" class="danger">削除</button>
        </div>
      </form>
    </div>
  </aside>

  <datalist id="dl_type"></datalist>
  <datalist id="dl_sensor_type"></datalist>
  <datalist id="dl_location"></datalist>
  <datalist id="dl_area"></datalist>
  <datalist id="dl_power"></datalist>

  <div id="toastWrap"></div>

  <script>
    const I18N = {
      ja: {
        common: {
          enabled: '有効',
          actions: { save: '保存', new: '新規', delete: '削除', refresh: '更新' },
          status: { loading: '処理中...', ready: '準備完了' }
        },
        data: {
          header: { title: 'IoT-Data 管理', build: 'ビルド' },
          menu: { label: 'Menu', devices: 'デバイス', dashboard: 'マップ設定', examples: 'JSON サンプル', definitions: '定義', latest: '最新値' },
          devices: { title: 'デバイス', searchPlaceholder: 'デバイス ID、エリア、場所、種別で検索', none: 'デバイスがありません', columns: { device: 'デバイス', place: '場所', type: '種別', status: '状態' } },
          deviceEdit: { title: 'デバイス編集', deviceId: 'Device ID', name: '名称', area: 'エリア ID', location: '場所', type: '種別', sensorType: 'センサー種別', power: '電源', reportInterval: '送信間隔 (min)', note: 'メモ' },
          dashboard: { title: 'ダッシュボード設定', background: '背景画像 URL', refreshInterval: '更新間隔', offlineTimeout: 'Offline 判定', saveBackground: '背景を保存', saveSettings: '設定を保存' },
          layout: { title: '配置', itemId: '配置 ID', device: 'デバイス', label: '表示名', x: 'X 座標 0-1', y: 'Y 座標 0-1', displayMode: '表示方式', metrics: '表示指標', preview: 'Map プレビュー' },
          examples: { title: '送信 JSON サンプル', model: 'モデル', deviceId: 'Device ID', generate: 'サンプル生成', payload: 'Payload' },
          ingest: { title: 'Ingest', show: '接続情報', test: 'テスト書き込み' },
          definitions: { title: '定義', name: '名称', type: '種別', source: '対象', expression: '式', none: '定義がありません', seedKnown: '既知キーを追加' },
          definitionEdit: { title: '定義編集', test: 'テスト' },
          latest: { title: '最新値', devicesTitle: 'デバイス別最新値', detailTitle: '受信データ詳細', metric: '指標', value: '値', ts: '時刻', count: '件', none: '最新値がありません', selectDevice: 'デバイスを選択してください', noDeviceData: 'このデバイスの受信データがありません' }
        }
      }
    };
    const LANG = 'ja';
    const DATA_CACHE_KEY = 'iotData.adminSnapshot';
    const DATA_PAGE_KEY = 'iotData.activePage';
    const DATA_QUERY_KEY = 'iotData.deviceQuery';
    const DATA_LATEST_DEVICE_KEY = 'iotData.latestDevice';
    const DATA_MENU_KEY = 'iotData.menuCollapsed';
    const DATA_THEME_KEY = 'iotData.theme';
    const DATA_ALLOWED_STORAGE_KEYS = [DATA_CACHE_KEY, DATA_PAGE_KEY, DATA_QUERY_KEY, DATA_LATEST_DEVICE_KEY, DATA_MENU_KEY, DATA_THEME_KEY];
    const DATA_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const state = { snapshot: null, deviceMap: {}, deviceQuery: '', latestDeviceId: '', editingDeviceId: '', keyCatalogQuery: '', mapDraft: null, mapAddPoint: null, mapEditorItemId: '', mapSuppressClick: false };
    const $ = (id) => document.getElementById(id);

    function t(path) {
      return path.split('.').reduce((cur, key) => cur && cur[key], I18N[LANG]) || path;
    }

    function initText() {
      $('title').textContent = t('data.header.title');
      $('refreshBtn').textContent = t('common.actions.refresh');
      $('deviceSearch').placeholder = t('data.devices.searchPlaceholder');
      state.deviceQuery = getStored(DATA_QUERY_KEY, '');
      state.latestDeviceId = getStored(DATA_LATEST_DEVICE_KEY, '');
      $('deviceSearch').value = state.deviceQuery;
      document.querySelectorAll('[data-i18n]').forEach((el) => el.textContent = t(el.getAttribute('data-i18n')));
      document.querySelectorAll('[data-i18n-label]').forEach((label) => {
        const input = label.querySelector('input,select,textarea');
        const text = document.createTextNode(t(label.getAttribute('data-i18n-label')));
        label.insertBefore(text, input);
      });
      activatePage(getStored(DATA_PAGE_KEY, 'devices'), false);
    }

    function callServer(name, args, onSuccess) {
      setStatus(t('common.status.loading'));
      document.querySelectorAll('button').forEach((b) => b.disabled = true);
      google.script.run
        .withSuccessHandler((res) => {
          document.querySelectorAll('button').forEach((b) => b.disabled = false);
          setStatus(t('common.status.ready'));
          onSuccess(res);
        })
        .withFailureHandler((err) => {
          document.querySelectorAll('button').forEach((b) => b.disabled = false);
          setStatus(err && err.message ? err.message : String(err), true);
        })[name](...args);
    }

    function load() {
      callServer('apiGetAdminSnapshot', [], render);
    }

    function render(snapshot) {
      state.snapshot = snapshot || {};
      state.deviceMap = buildDeviceMap(state.snapshot.devices || []);
      saveCachedSnapshot(state.snapshot);
      $('build').textContent = t('data.header.build') + ' ' + (state.snapshot.build || '');
      $('bgUrl').value = (state.snapshot.dashboard && state.snapshot.dashboard.config && state.snapshot.dashboard.config.background_image_url) || '';
      $('refreshInterval').value = String((state.snapshot.dashboard && state.snapshot.dashboard.config && state.snapshot.dashboard.config.refresh_interval_sec) || 60);
      resetMapDraft();
      renderDevices();
      renderDeviceKpis();
      renderDeviceDatalists();
      renderLayout();
      renderMapPreview();
      renderMapAddControls();
      renderDefinitions();
      renderKeyCatalog();
      renderLatest();
      renderExampleModels();
    }

    function getCachedSnapshot() {
      try {
        const raw = localStorage.getItem(DATA_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (isExpiredCache(cached, DATA_CACHE_MAX_AGE_MS)) {
          localStorage.removeItem(DATA_CACHE_KEY);
          return null;
        }
        return cached;
      } catch (err) {
        try { localStorage.removeItem(DATA_CACHE_KEY); } catch (e) {}
        return null;
      }
    }

    function saveCachedSnapshot(snapshot) {
      try {
        localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({
          snapshot: snapshot,
          cached_at: new Date().toISOString()
        }));
      } catch (err) {}
    }

    function applyCachedSnapshot() {
      const cached = getCachedSnapshot();
      if (!cached) return;
      render(cached.snapshot || cached);
      setStatus('キャッシュを表示中、同期しています...');
    }

    function getStored(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v == null ? fallback : v;
      } catch (err) {
        return fallback;
      }
    }

    function setStored(key, value) {
      try { localStorage.setItem(key, value); } catch (err) {}
    }

    function cleanupLocalStorage(namespace, allowedKeys, maxAgeMs) {
      try {
        const allowed = {};
        allowedKeys.forEach((key) => allowed[key] = true);
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (!key || key.indexOf(namespace) !== 0) continue;
          if (!allowed[key]) {
            localStorage.removeItem(key);
            continue;
          }
          if (key === DATA_CACHE_KEY) {
            const cached = JSON.parse(localStorage.getItem(key) || 'null');
            if (isExpiredCache(cached, maxAgeMs)) localStorage.removeItem(key);
          }
        }
      } catch (err) {}
    }

    function isExpiredCache(cached, maxAgeMs) {
      if (!cached || !cached.cached_at) return false;
      const t = new Date(cached.cached_at).getTime();
      return isFinite(t) && Date.now() - t > maxAgeMs;
    }

    function activatePage(page, persist) {
      const target = page || 'devices';
      document.querySelectorAll('[data-page-target]').forEach((n) => {
        n.classList.toggle('active', n.getAttribute('data-page-target') === target);
      });
      document.querySelectorAll('[data-page]').forEach((section) => {
        section.classList.toggle('hidden', section.getAttribute('data-page') !== target);
      });
      if (persist !== false) setStored(DATA_PAGE_KEY, target);
    }

    function renderDevices() {
      const q = state.deviceQuery.toLowerCase();
      const rows = (state.snapshot.devices || []).filter((d) => {
        const hay = [d.device_id, d.name, d.area_id, d.location, d.type, d.sensor_type].join(' ').toLowerCase();
        return !q || hay.indexOf(q) > -1;
      }).sort((a, b) => String(a.sensor_type || '').localeCompare(String(b.sensor_type || '')) || String(a.area_id || a.device_id).localeCompare(String(b.area_id || b.device_id)));
      $('deviceRows').innerHTML = rows.map((d) => `
        <tr class="${d.device_id === state.editingDeviceId ? 'editing' : ''}">
          <td><code>${esc(d.device_id)}</code><div class="muted">${esc(d.name || '')}</div></td>
          <td>${esc([d.area_id, d.location].filter(Boolean).join(' / '))}</td>
          <td>${esc([d.sensor_type, d.type].filter(Boolean).join(' / '))}</td>
          <td><span class="pill ${isDeviceOnline(d) ? '' : 'off'}">${isDeviceOnline(d) ? 'Online' : 'Offline'}</span><div class="muted">${esc(statusDetail(d))}</div></td>
          <td><div class="row"><button class="secondary" type="button" onclick='editDevice(${jsonAttr(d)})'>編集</button><button class="danger" type="button" onclick='deleteDevice(${jsonAttr(d.device_id)})'>削除</button></div></td>
        </tr>`).join('') || `<tr><td colspan="5" class="muted">${esc(t('data.devices.none'))}</td></tr>`;
    }

    function renderDeviceSelects() {}

    function isDeviceOnline(device) {
      if (!device) return false;
      if (typeof device.online === 'boolean') return device.online;
      return device.enabled !== false;
    }

    function statusDetail(device) {
      if (!device) return '';
      if (device.offline_reason === 'disabled') return '無効';
      if (device.offline_reason === 'never_seen') return '未受信';
      const interval = device.report_interval_min ? device.report_interval_min + 'min' : '';
      const after = device.offline_after_min ? ' / Offline ' + device.offline_after_min + 'min' : '';
      return [interval, shortDate(device.last_seen)].filter(Boolean).join(' / ') + after;
    }

    function renderMetricChoices() {}

    function renderLayout() {
      updateMapDirtyUi();
    }

    function renderMapPreview() {
      const el = $('mapPreview');
      const dashboard = (state.snapshot && state.snapshot.dashboard) || {};
      const config = dashboard.config || {};
      const bg = config.background_url || config.background_image_url || '';
      const w = Number(config.map_width || 1200);
      const h = Number(config.map_height || 800);
      el.style.setProperty('--map-aspect', String(w && h ? w / h : 1.5));
      el.style.backgroundImage = bg ? 'url("' + bg + '")' : '';
      const layout = getMapDraftItems();
      const devices = deviceMap();
      const items = layout.map((item) => {
        const device = devices[item.bind_ref] || {};
        const cfg = item.style_config || parseStyle(item.style);
        const metrics = (cfg.metrics || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m)).slice(0, 2);
        const title = item.label || device.area_id || device.name || item.bind_ref;
        const mode = cfg.displayMode === 'popup' ? 'popup' : 'card';
        const selected = item.item_id === state.mapEditorItemId ? ' selected' : '';
        const sizeStyle = mode === 'card'
          ? ';--card-w:' + (Number(cfg.cardWidth) || 150) + 'px;height:' + (Number(cfg.cardHeight) || 0 || 'auto') + (Number(cfg.cardHeight) ? 'px' : '')
          : '';
        return '<div class="map-preview-item ' + mode + selected + '" data-item-id="' + esc(attrEscape(item.item_id)) + '" style="left:' + (Number(item.x_norm) * 100) + '%;top:' + (Number(item.y_norm) * 100) + '%' + sizeStyle + '">' +
          '<button class="map-del" type="button" title="削除" data-del-id="' + esc(attrEscape(item.item_id)) + '">×</button>' +
          '<div class="map-preview-title">' + esc(title) + '</div>' +
          '<div class="map-preview-metrics">' + metrics.map((m) => previewMetricLine(device, m)).join('') + '</div>' +
          '<button class="map-resize" type="button" title="サイズ変更" aria-label="サイズ変更"></button>' +
          '</div>';
      }).join('');
      const hint = bg ? '<div class="map-hint">クリックで位置指定、ドラッグで移動、最後に保存</div>' : '';
      const target = state.mapAddPoint
        ? '<div class="map-target-dot" style="left:' + (state.mapAddPoint.x * 100) + '%;top:' + (state.mapAddPoint.y * 100) + '%"></div>'
        : '';
      el.innerHTML = items + renderMapItemEditor() + target + hint;
      updateMapDirtyUi();
    }

    function renderMapItemEditor() {
      const item = layoutById(state.mapEditorItemId);
      if (!item) return '';
      const cfg = item.style_config || parseStyle(item.style);
      const mode = cfg.displayMode === 'popup' ? 'popup' : 'card';
      const x = Number(item.x_norm || 0.5);
      const y = Number(item.y_norm || 0.5);
      const left = Math.max(18, Math.min(82, x * 100));
      const top = Math.min(82, y * 100);
      const devices = mapEditorDeviceOptions(item.bind_ref);
      const metrics = renderMapEditorMetricChips(item);
      const width = Number(cfg.cardWidth) || 150;
      const height = Number(cfg.cardHeight) || '';
      return '<div class="map-item-editor" data-editor-id="' + esc(attrEscape(item.item_id)) + '" style="left:' + left + '%;top:' + top + '%">' +
        '<div class="map-editor-head"><b>配置編集</b><button class="icon-btn map-editor-close" type="button" aria-label="閉じる">×</button></div>' +
        '<div class="map-editor-grid">' +
        '<label class="full">デバイス<select id="mapEditDevice">' + devices + '</select></label>' +
        '<label>表示方式<select id="mapEditDisplayMode"><option value="card" ' + (mode === 'card' ? 'selected' : '') + '>カード固定</option><option value="popup" ' + (mode === 'popup' ? 'selected' : '') + '>クリック表示</option></select></label>' +
        '<label>表示名<input id="mapEditLabel" value="' + esc(attrEscape(item.label || '')) + '"></label>' +
        '<label>X<input id="mapEditX" type="number" min="0" max="1" step="0.001" value="' + x.toFixed(3) + '"></label>' +
        '<label>Y<input id="mapEditY" type="number" min="0" max="1" step="0.001" value="' + y.toFixed(3) + '"></label>' +
        '<label>幅<input id="mapEditWidth" type="number" min="100" max="360" step="1" value="' + esc(attrEscape(String(width))) + '"></label>' +
        '<label>高さ<input id="mapEditHeight" type="number" min="54" max="260" step="1" value="' + esc(attrEscape(String(height))) + '"></label>' +
        '<div class="full"><div class="hint" style="margin-bottom:6px">点灯した key が表示されます。ドラッグで順序を変更できます。</div><div id="mapEditMetrics" class="map-editor-metrics">' + metrics + '</div></div>' +
        '</div>' +
        '<div class="map-editor-actions"><button type="button" class="secondary map-editor-close">閉じる</button><button type="button" class="danger map-editor-delete">削除</button></div>' +
        '</div>';
    }

    function renderMapAddControls() {
      const select = $('mapAddDeviceSelect');
      if (!select || !state.snapshot) return;
      const current = select.value;
      const placed = {};
      getMapDraftItems().forEach((item) => {
        if (item.bind_ref) placed[item.bind_ref] = true;
      });
      const devices = (state.snapshot.devices || []).filter((d) => d.enabled !== false && !placed[d.device_id]);
      select.innerHTML = devices.map((d) => {
        const label = (d.area_id || d.name) ? (d.area_id || d.name) + ' (' + d.device_id + ')' : d.device_id;
        return '<option value="' + esc(d.device_id) + '">' + esc(label) + '</option>';
      }).join('') || '<option value="">配置できる有効デバイスがありません</option>';
      if (current && devices.some((d) => d.device_id === current)) select.value = current;
      const p = state.mapAddPoint || { x: 0.5, y: 0.5 };
      $('mapAddX').value = Number(p.x).toFixed(3);
      $('mapAddY').value = Number(p.y).toFixed(3);
    }

    function mapEditorDeviceOptions(currentDeviceId) {
      const placed = {};
      getMapDraftItems().forEach((item) => {
        if (item.bind_ref && item.bind_ref !== currentDeviceId) placed[item.bind_ref] = true;
      });
      return (state.snapshot.devices || []).filter((d) => d.enabled !== false && (!placed[d.device_id] || d.device_id === currentDeviceId)).map((d) => {
        const label = (d.area_id || d.name) ? (d.area_id || d.name) + ' (' + d.device_id + ')' : d.device_id;
        return '<option value="' + esc(attrEscape(d.device_id)) + '" ' + (d.device_id === currentDeviceId ? 'selected' : '') + '>' + esc(label) + '</option>';
      }).join('');
    }

    function renderMapEditorMetricChips(item) {
      const cfg = item.style_config || parseStyle(item.style);
      const device = deviceMap()[item.bind_ref] || {};
      const keys = (device.metricKeys || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const selected = [];
      (cfg.metrics || []).forEach((key) => {
        if (keys.indexOf(key) > -1 && selected.indexOf(key) < 0) selected.push(key);
      });
      const ordered = selected.concat(keys.filter((key) => selected.indexOf(key) < 0));
      return ordered.map((key) => {
        const active = selected.indexOf(key) > -1;
        return '<button type="button" class="metric-chip map-editor-chip ' + (active ? 'active' : '') + '" draggable="' + (active ? 'true' : 'false') + '" data-key="' + esc(attrEscape(key)) + '">' + esc(metricLabel(key)) + '</button>';
      }).join('');
    }

    function selectedMapEditorItem() {
      return layoutById(state.mapEditorItemId);
    }

    function openMapItemEditor(itemId) {
      state.mapEditorItemId = itemId || '';
      state.mapAddPoint = null;
      renderMapPreview();
    }

    function closeMapItemEditor() {
      state.mapEditorItemId = '';
      renderMapPreview();
    }

    function updateMapEditorDraft(options) {
      const item = selectedMapEditorItem();
      if (!item) return;
      const cfg = item.style_config || parseStyle(item.style);
      const oldRef = item.bind_ref;
      const nextRef = $('mapEditDevice') ? $('mapEditDevice').value : item.bind_ref;
      item.bind_ref = nextRef || item.bind_ref;
      item.label = $('mapEditLabel') ? $('mapEditLabel').value : item.label;
      item.x_norm = Math.max(0, Math.min(1, Number(($('mapEditX') && $('mapEditX').value) || item.x_norm || 0.5)));
      item.y_norm = Math.max(0, Math.min(1, Number(($('mapEditY') && $('mapEditY').value) || item.y_norm || 0.5)));
      const mode = $('mapEditDisplayMode') && $('mapEditDisplayMode').value === 'popup' ? 'popup' : 'card';
      const width = Math.max(100, Math.min(360, Number(($('mapEditWidth') && $('mapEditWidth').value) || cfg.cardWidth || 150)));
      const heightRaw = Number(($('mapEditHeight') && $('mapEditHeight').value) || cfg.cardHeight || 0);
      const height = heightRaw ? Math.max(54, Math.min(260, heightRaw)) : 0;
      let metrics = Array.from(document.querySelectorAll('#mapEditMetrics .metric-chip.active')).map((chip) => chip.getAttribute('data-key')).filter(Boolean);
      if (oldRef !== item.bind_ref || (options && options.resetMetrics)) {
        const dev = deviceMap()[item.bind_ref] || {};
        metrics = (dev.metricKeys || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      }
      item.style_config = {
        metrics: metrics.slice(0, 12),
        displayMode: mode,
        cardWidth: mode === 'card' ? Math.round(width) : 0,
        cardHeight: mode === 'card' ? Math.round(height) : 0
      };
      markMapDirty();
      renderMapPreview();
      renderMapAddControls();
    }

    function renderDeviceMetricToggles(device, selectedMetrics) {
      const el = $('deviceMetricToggles');
      if (!el) return;
      const keys = ((device && device.metricKeys) || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const selected = [];
      (selectedMetrics || []).forEach((key) => {
        if (keys.indexOf(key) > -1 && selected.indexOf(key) < 0) selected.push(key);
      });
      const ordered = selected.concat(keys.filter((key) => selected.indexOf(key) < 0));
      el.innerHTML = ordered.map((key) => {
        const active = selected.indexOf(key) > -1;
        return '<button type="button" class="metric-chip ' + (active ? 'active' : '') + '" draggable="' + (active ? 'true' : 'false') + '" data-key="' + esc(attrEscape(key)) + '">' + esc(metricLabel(key)) + '</button>';
      }).join('');
    }

    function previewMetricLine(device, metric) {
      const hit = device.metrics && device.metrics[metric];
      const meta = state.snapshot.metricMeta && state.snapshot.metricMeta[metric];
      const label = meta && meta.label ? meta.label : metric;
      const value = hit ? formatPreviewValue(hit.value, meta && meta.unit) : '--';
      return '<div class="map-preview-metric"><span>' + esc(label) + '</span><span class="map-preview-value">' + esc(value) + '</span></div>';
    }

    function formatPreviewValue(value, unit) {
      const n = Number(value);
      const body = isFinite(n) ? (Math.round(n * 10) / 10) : String(value);
      return unit ? body + unit : body;
    }

    function renderDefinitions() {
      const defs = state.snapshot.definitions || [];
      $('definitionRows').innerHTML = defs.map((d) => `
        <tr>
          <td><code>${esc(d.id)}</code></td>
          <td>${esc(d.name)}</td>
          <td>${esc(d.type)}</td>
          <td>${esc(d.source)}</td>
          <td><code>${esc(d.expression)}</code></td>
          <td><button class="secondary" type="button" onclick='editDefinition(${jsonAttr(d)})'>編集</button></td>
        </tr>`).join('') || `<tr><td colspan="6" class="muted">${esc(t('data.definitions.none'))}</td></tr>`;
    }

    function renderKeyCatalog() {
      const rows = (state.snapshot.keyCatalog || []).filter((row) => isDisplayMetric(row.key));
      const q = String(state.keyCatalogQuery || '').trim().toLowerCase();
      const filtered = q ? rows.filter((row) => {
        return [row.key, row.label_ja, row.data_type, row.unit, row.models, row.source]
          .join(' ').toLowerCase().indexOf(q) > -1;
      }) : rows;
      $('keyCatalogRows').innerHTML = filtered.slice(0, 120).map((row) => {
        const models = String(row.models || '').split(',').filter(Boolean);
        const modelText = models.length > 3 ? models.slice(0, 3).join(', ') + ' +' + (models.length - 3) : models.join(', ');
        return `<tr>
          <td><code>${esc(row.key)}</code></td>
          <td>${esc(row.label_ja)}</td>
          <td>${esc(row.data_type)}</td>
          <td>${esc(row.unit)}</td>
          <td class="muted">${esc(modelText)}</td>
          <td><button class="secondary" type="button" onclick='toggleKeyCatalogVisibility(${jsonAttr(row.key)}, ${row.enabled === false ? 'true' : 'false'})'>${row.enabled === false ? '非表示' : '表示'}</button></td>
          <td><button class="secondary" type="button" onclick='applyKeyCatalog(${jsonAttr(row)})'>定義へ反映</button></td>
        </tr>`;
      }).join('') || '<tr><td colspan="7" class="muted">キーDBがありません</td></tr>';
    }

    function renderLatest() {
      const latest = (state.snapshot.latest || []).slice();
      const byDevice = {};
      latest.forEach((row) => {
        if (!isDisplayMetric(row.metric)) return;
        const id = String(row.device_id || '').trim();
        if (!id) return;
        if (!byDevice[id]) byDevice[id] = [];
        byDevice[id].push(row);
      });
      const devices = Object.keys(byDevice).sort((a, b) => deviceSortLabel(a).localeCompare(deviceSortLabel(b)));
      if (!state.latestDeviceId || !byDevice[state.latestDeviceId]) {
        state.latestDeviceId = devices[0] || '';
        setStored(DATA_LATEST_DEVICE_KEY, state.latestDeviceId);
      }
      $('latestDeviceRows').innerHTML = devices.map((id) => {
        const d = deviceMap()[id] || { device_id: id };
        const rows = byDevice[id] || [];
        const title = d.area_id || d.name || id;
        const meta = [d.location, d.sensor_type || d.type, id].filter(Boolean).join(' / ');
        return `<button class="latest-device ${id === state.latestDeviceId ? 'active' : ''}" type="button" onclick="selectLatestDevice('${esc(attrEscape(id))}')">
          <span class="latest-device-title">${esc(title)}</span>
          <span class="pill">${rows.length} ${esc(t('data.latest.count'))}</span>
          <span class="latest-device-meta">${esc(meta)}</span>
        </button>`;
      }).join('') || `<div class="muted">${esc(t('data.latest.none'))}</div>`;

      const selected = state.latestDeviceId;
      const selectedDevice = deviceMap()[selected] || { device_id: selected };
      const rows = (byDevice[selected] || []).filter((row) => isDisplayMetric(row.metric)).slice().sort((a, b) => String(a.metric).localeCompare(String(b.metric)));
      $('latestDetailTitle').textContent = selected ? (selectedDevice.area_id || selectedDevice.name || selected) : t('data.latest.detailTitle');
      $('latestDetailMeta').textContent = selected ? [selectedDevice.location, selectedDevice.sensor_type || selectedDevice.type, selected].filter(Boolean).join(' / ') : t('data.latest.selectDevice');
      $('latestRows').innerHTML = rows.map((r) => {
        const meta = state.snapshot.metricMeta && state.snapshot.metricMeta[r.metric];
        const label = meta && meta.label ? meta.label + ' (' + r.metric + ')' : r.metric;
        const value = meta && meta.unit ? String(r.value) + meta.unit : r.value;
        return `<tr><td><code>${esc(label)}</code></td><td>${esc(value)}</td><td>${esc(shortDate(r.ts))}</td></tr>`;
      }).join('') || `<tr><td colspan="3" class="muted">${esc(selected ? t('data.latest.noDeviceData') : t('data.latest.selectDevice'))}</td></tr>`;
    }

    function renderExampleModels() {
      const current = $('exampleModel').value;
      const models = state.snapshot.deviceExamples || [];
      $('exampleModel').innerHTML = models.map((m) => `<option value="${esc(m.model)}">${esc(m.model)}</option>`).join('');
      if (current) $('exampleModel').value = current;
    }

    const ICO = {
      box: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>',
      pulse: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
      warn: '<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',
      layers: '<path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5M2 17l10 5 10-5"/>'
    };

    function renderDeviceKpis() {
      const devices = state.snapshot.devices || [];
      const online = devices.filter(isDeviceOnline).length;
      const offline = devices.length - online;
      const types = {};
      devices.forEach((d) => { const k = String(d.sensor_type || d.type || '').trim(); if (k) types[k] = 1; });
      const ratio = devices.length ? Math.round(online / devices.length * 100) : 0;
      const cards = [
        { label: 'デバイス', val: devices.length, foot: '登録総数', ico: ICO.box, cls: '' },
        { label: 'Online', val: online, foot: ratio + '% 稼働', ico: ICO.pulse, cls: 'kpi-ok' },
        { label: 'Offline', val: offline, foot: offline ? '要確認' : '正常', ico: ICO.warn, cls: offline ? 'kpi-bad' : '' },
        { label: 'センサー種別', val: Object.keys(types).length, foot: '種類', ico: ICO.layers, cls: '' }
      ];
      $('deviceKpis').innerHTML = cards.map((c) =>
        '<div class="kpi ' + c.cls + '"><div class="kpi-top"><span class="kpi-label">' + esc(c.label) + '</span>' +
        '<span class="kpi-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + c.ico + '</svg></span></div>' +
        '<div class="kpi-val">' + c.val + '</div><div class="kpi-foot">' + esc(c.foot) + '</div></div>'
      ).join('');
    }

    function renderDeviceDatalists() {
      const devices = state.snapshot.devices || [];
      const collect = (key, seed) => {
        const set = {};
        (seed || []).forEach((v) => set[v] = 1);
        devices.forEach((d) => { const v = String(d[key] || '').trim(); if (v) set[v] = 1; });
        return Object.keys(set).sort();
      };
      fillDatalist('dl_type', collect('type'));
      fillDatalist('dl_sensor_type', collect('sensor_type', ['iaq', 'occupancy', 'people_count', 'temperature', 'co2']));
      fillDatalist('dl_location', collect('location'));
      fillDatalist('dl_area', collect('area_id'));
      fillDatalist('dl_power', collect('power_source', ['battery', 'poe', 'dc', 'ac']));
    }

    function fillDatalist(id, values) {
      const el = $(id);
      if (!el) return;
      el.innerHTML = values.map((v) => '<option value="' + esc(v) + '"></option>').join('');
    }

    function openDeviceDrawer(mode, d) {
      d = d || {};
      const isEdit = mode === 'edit';
      $('device_id').value = d.device_id || '';
      $('device_name').value = d.name || '';
      $('device_area_id').value = d.area_id || '';
      $('device_location').value = d.location || '';
      $('device_type').value = d.type || '';
      $('device_sensor_type').value = d.sensor_type || '';
      $('device_power_source').value = d.power_source || '';
      $('device_report_interval_min').value = d.report_interval_min || '';
      $('device_note').value = d.note || '';
      $('device_enabled').checked = d.enabled !== false;
      const layout = findLayoutForDevice(d.device_id);
      const cfg = layout ? (layout.style_config || parseStyle(layout.style)) : { metrics: [], displayMode: 'card' };
      renderDeviceMetricToggles(d, cfg.metrics || []);
      $('device_id').readOnly = isEdit;
      $('deviceIdHint').textContent = isEdit ? '（変更不可）' : '';
      $('deviceDrawerTitle').textContent = isEdit ? 'デバイス編集' : 'デバイス追加';
      $('deviceDrawerSub').textContent = isEdit ? (d.device_id || '') : '新規登録';
      $('deleteDeviceBtn').style.display = isEdit ? '' : 'none';
      state.editingDeviceId = isEdit ? (d.device_id || '') : '';
      renderDevices();
      $('deviceDrawer').classList.add('open');
      $('drawerBackdrop').classList.add('open');
      $('deviceDrawer').setAttribute('aria-hidden', 'false');
      setTimeout(() => $((isEdit ? 'device_name' : 'device_id')).focus(), 60);
    }

    function closeDeviceDrawer() {
      $('deviceDrawer').classList.remove('open');
      $('drawerBackdrop').classList.remove('open');
      $('deviceDrawer').setAttribute('aria-hidden', 'true');
      state.editingDeviceId = '';
      renderDevices();
    }

    function showToast(msg, isError) {
      const wrap = $('toastWrap');
      if (!wrap) return;
      const el = document.createElement('div');
      el.className = 'toast ' + (isError ? 'err' : 'ok');
      el.innerHTML = '<i></i><b>' + (isError ? 'エラー' : 'OK') + '</b><span>' + esc(msg) + '</span>';
      wrap.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity .3s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 320);
      }, 2600);
    }

    function toastRender(msg) {
      return (snapshot) => { render(snapshot); showToast(msg); };
    }

    window.editDevice = function (d) {
      openDeviceDrawer('edit', d);
    };

    window.deleteDevice = function (deviceId) {
      const target = String(deviceId || '').trim();
      if (!target) return;
      if (!confirm('このデバイスを削除しますか？\n' + target + '\n\n関連するマップ配置も削除されます。')) return;
      callServer('apiDeleteDevice', [target], function (snapshot) {
        if ($('device_id').value === target) {
          $('deviceForm').reset();
          $('device_enabled').checked = true;
        }
        if (state.latestDeviceId === target) {
          state.latestDeviceId = '';
          setStored(DATA_LATEST_DEVICE_KEY, '');
        }
        render(snapshot);
        closeDeviceDrawer();
        showToast('デバイスを削除しました');
      });
    };

    window.editLayout = function () {
      showToast('マップ上で位置だけ編集します。デバイス設定はデバイス画面で変更してください。');
    };

    window.editDefinition = function (d) {
      $('def_id').value = d.id || '';
      $('def_type').value = d.type || 'metric';
      $('def_name').value = d.name || '';
      $('def_unit').value = d.unit || '';
      $('def_source').value = d.source || '*';
      $('def_expression').value = d.expression || '';
      $('def_params').value = d.params || '';
      $('def_enabled').checked = d.enabled !== false;
      $('testResult').textContent = '';
    };

    window.applyKeyCatalog = function (row) {
      row = row || {};
      $('def_id').value = row.key || '';
      $('def_type').value = 'metric';
      $('def_name').value = row.label_ja || row.key || '';
      $('def_unit').value = row.unit || '';
      $('def_source').value = row.source || 'device-examples';
      $('def_expression').value = '';
      $('def_params').value = JSON.stringify({
        data_type: row.data_type || 'number',
        models: row.models || '',
        note: row.note || ''
      }, null, 2);
      $('def_enabled').checked = row.enabled !== false;
      $('testResult').textContent = '';
    };

    window.toggleKeyCatalogVisibility = function (key, enabled) {
      callServer('apiSaveKeyCatalogVisibility', [key, enabled], toastRender(enabled ? '表示対象にしました' : '非表示にしました'));
    };

    window.selectLatestDevice = function (deviceId) {
      state.latestDeviceId = deviceId || '';
      setStored(DATA_LATEST_DEVICE_KEY, state.latestDeviceId);
      renderLatest();
    };

    function collectDevice() {
      return {
        device_id: $('device_id').value,
        name: $('device_name').value,
        area_id: $('device_area_id').value,
        location: $('device_location').value,
        type: $('device_type').value,
        sensor_type: $('device_sensor_type').value,
        power_source: $('device_power_source').value,
        report_interval_min: $('device_report_interval_min').value,
        note: $('device_note').value,
        enabled: $('device_enabled').checked
      };
    }

    function findLayoutForDevice(deviceId) {
      const target = String(deviceId || '').trim();
      if (!target || !state.snapshot || !state.snapshot.dashboard) return null;
      const rows = state.snapshot.dashboard.layout || [];
      return rows.find((item) => String(item.bind_ref || '').trim() === target) || null;
    }

    function collectDeviceLayoutSettings() {
      return {
        metrics: Array.from($('deviceMetricToggles').querySelectorAll('.metric-chip.active')).map((chip) => chip.getAttribute('data-key')).filter(Boolean)
      };
    }

    function collectDefinition() {
      return {
        id: $('def_id').value,
        type: $('def_type').value,
        name: $('def_name').value,
        unit: $('def_unit').value,
        source: $('def_source').value || '*',
        expression: $('def_expression').value,
        params: $('def_params').value,
        enabled: $('def_enabled').checked
      };
    }

    function metricsFromText() {
      const textEl = $('layout_metrics_text');
      const pickEl = $('metricChoices');
      const fromText = textEl ? textEl.value.split(',').map((s) => s.trim()).filter(Boolean) : [];
      const checked = pickEl ? Array.from(pickEl.querySelectorAll('input:checked')).map((i) => i.value) : [];
      return Array.from(new Set(fromText.concat(checked))).slice(0, 3);
    }

    function deviceMap() {
      return state.deviceMap || {};
    }

    function buildDeviceMap(devices) {
      const out = {};
      (devices || []).forEach((d) => out[d.device_id] = d);
      return out;
    }

    function deviceSortLabel(deviceId) {
      const d = deviceMap()[deviceId] || {};
      return String(d.area_id || d.name || deviceId || '');
    }

    function metricLabel(key) {
      const meta = state.snapshot.metricMeta && state.snapshot.metricMeta[key];
      return meta && meta.label ? meta.label + ' (' + key + ')' : key;
    }

    function isBatteryMetric(metric) {
      const key = String(metric || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
      return key === 'battery' || key === 'battery_level' || key === 'battery_percent' || key === 'battery_percentage' || /(^|_)battery($|_)/.test(key);
    }

    function isDisplayMetric(metric) {
      const key = String(metric || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) return false;
      if (/^(application|gateway|deviceaddress|devaddr|fcnt|fport|datarate|frequency|rssi|snr|adr|confirmed|token)$/.test(key)) return false;
      if (/^(name|model|devicename|devname|devicemodel)$/.test(key)) return false;
      if (/^(ts|timestamp|time|datetime|date)$/.test(key)) return false;
      if (/^(event|reporttype|snapshot)$/.test(key)) return false;
      if (/^deviceinfo(device|devicesn|devicemac|ipaddress)$/.test(key)) return false;
      if (/^timeinfo(time|timezone|dststatus|starttime|endtime)$/.test(key)) return false;
      if (/^regionsname\d*$/.test(key)) return false;
      if (/^dwelltimedata\d*(dwellstarttime|dwellendtime)$/.test(key)) return false;
      return true;
    }

    function resetMapDraft() {
      const rows = (((state.snapshot || {}).dashboard || {}).layout || []).filter((item) => item.enabled !== false);
      state.mapDraft = {
        items: rows.map(cloneLayoutItem),
        deletedIds: {},
        dirty: false
      };
      updateMapDirtyUi();
    }

    function cloneLayoutItem(item) {
      const cfg = item.style_config || parseStyle(item.style);
      return {
        item_id: String(item.item_id || ''),
        bind_type: item.bind_type || 'device',
        bind_ref: item.bind_ref || '',
        x_norm: Number(item.x_norm) || 0,
        y_norm: Number(item.y_norm) || 0,
        label: item.label || '',
        style_config: { metrics: (cfg.metrics || []).slice(0, 12), displayMode: cfg.displayMode === 'popup' ? 'popup' : 'card', cardWidth: Number(cfg.cardWidth) || 0, cardHeight: Number(cfg.cardHeight) || 0 },
        enabled: item.enabled !== false
      };
    }

    function getMapDraftItems() {
      if (!state.mapDraft) resetMapDraft();
      return (state.mapDraft && state.mapDraft.items) || [];
    }

    function markMapDirty() {
      if (!state.mapDraft) resetMapDraft();
      state.mapDraft.dirty = true;
      updateMapDirtyUi();
    }

    function updateMapDirtyUi() {
      const status = $('mapDirtyStatus');
      const preview = $('mapPreview');
      if (!status || !preview || !state.mapDraft) return;
      const dirty = !!state.mapDraft.dirty;
      status.textContent = dirty ? '未保存' : '保存済み';
      status.classList.toggle('dirty', dirty);
      preview.classList.toggle('dirty', dirty);
    }

    function removeDraftLayout(itemId) {
      if (!state.mapDraft) resetMapDraft();
      const id = String(itemId || '').trim();
      if (!id) return;
      state.mapDraft.items = state.mapDraft.items.filter((item) => item.item_id !== id);
      state.mapDraft.deletedIds[id] = true;
      markMapDirty();
      renderMapPreview();
      renderMapAddControls();
    }

    function saveMapDraft() {
      if (!state.mapDraft || !state.mapDraft.dirty) {
        showToast('保存する変更はありません');
        return;
      }
      const items = getMapDraftItems().map(cloneLayoutItem);
      const deletedIds = Object.keys(state.mapDraft.deletedIds || {});
      callServer('apiSaveMapLayout', [items, deletedIds], toastRender('マップを保存しました'));
    }

    function layoutById(itemId) {
      const rows = getMapDraftItems();
      return rows.find((item) => item.item_id === itemId) || null;
    }

    function saveDraggedLayout(item, x, y) {
      item.x_norm = x;
      item.y_norm = y;
      markMapDirty();
    }

    function saveResizedLayout(item, width, height) {
      const cfg = item.style_config || parseStyle(item.style);
      item.style_config = {
        metrics: (cfg.metrics || []).slice(0, 12),
        displayMode: cfg.displayMode === 'popup' ? 'popup' : 'card',
        cardWidth: Math.max(100, Math.min(360, Math.round(width))),
        cardHeight: Math.max(54, Math.min(260, Math.round(height)))
      };
      markMapDirty();
    }

    function pointToNorm(ev) {
      const box = $('mapPreview').getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (ev.clientX - box.left) / box.width));
      const y = Math.max(0, Math.min(1, (ev.clientY - box.top) / box.height));
      return { x: x, y: y };
    }

    function closeMapAddPopover() {
      const el = document.querySelector('.map-add-popover');
      if (el) el.remove();
      const dot = document.querySelector('.map-dot');
      if (dot) dot.remove();
    }

    function openMapAddPopover(x, y) {
      closeMapAddPopover();
      state.mapAddPoint = { x: Number(x.toFixed(3)), y: Number(y.toFixed(3)) };
      renderMapPreview();
      renderMapAddControls();
    }

    function addLayoutAt(deviceId, x, y) {
      if (!deviceId) { showToast('デバイスを選択してください', true); return; }
      const dev = deviceMap()[deviceId] || {};
      const metrics = (dev.metricKeys || []).filter((m) => isDisplayMetric(m) && !isBatteryMetric(m));
      const displayMode = $('mapAddDisplayMode').value === 'popup' ? 'popup' : 'card';
      const item = {
        item_id: 'item_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
        bind_type: 'device',
        bind_ref: deviceId,
        x_norm: x,
        y_norm: y,
        label: '',
        style_config: { metrics: metrics, displayMode: displayMode, cardWidth: displayMode === 'card' ? 150 : 0, cardHeight: 0 },
        enabled: true
      };
      getMapDraftItems().push(item);
      state.mapAddPoint = null;
      state.mapEditorItemId = item.item_id;
      markMapDirty();
      renderMapPreview();
      renderMapAddControls();
      showToast('マップに追加しました');
    }

    function parseStyle(style) {
      try {
        const obj = JSON.parse(style || '{}');
        return { metrics: Array.isArray(obj.metrics) ? obj.metrics : [], displayMode: obj.displayMode === 'popup' ? 'popup' : 'card', cardWidth: Number(obj.cardWidth || obj.card_width) || 0, cardHeight: Number(obj.cardHeight || obj.card_height) || 0 };
      } catch (err) {
        return { metrics: [], displayMode: 'card', cardWidth: 0, cardHeight: 0 };
      }
    }

    $('refreshBtn').addEventListener('click', load);
    $('themeToggle').addEventListener('click', () => {
      const next = document.body.classList.contains('theme-light') ? 'dark' : 'light';
      setStored(DATA_THEME_KEY, next);
      applyTheme(next);
    });
    $('menuToggle').addEventListener('click', () => {
      if (window.matchMedia('(max-width: 960px)').matches) {
        document.body.classList.toggle('menu-open');
      } else {
        document.body.classList.toggle('menu-collapsed');
        setStored(DATA_MENU_KEY, document.body.classList.contains('menu-collapsed') ? '1' : '0');
      }
    });
    $('sidebarBackdrop').addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
    document.querySelectorAll('[data-page-target]').forEach((btn) => {
      btn.addEventListener('click', () => {
        activatePage(btn.getAttribute('data-page-target'), true);
        document.body.classList.remove('menu-open');
      });
    });
    $('deviceSearch').addEventListener('input', (ev) => {
      state.deviceQuery = ev.target.value || '';
      setStored(DATA_QUERY_KEY, state.deviceQuery);
      renderDevices();
    });
    $('deviceForm').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const dev = collectDevice();
      if (!String(dev.device_id || '').trim()) { showToast('Device ID を入力してください', true); return; }
      callServer('apiSaveDevice', [dev], (snapshot) => {
        state.snapshot = snapshot;
        state.deviceMap = buildDeviceMap(snapshot.devices || []);
        callServer('apiSaveDeviceLayoutSettings', [dev.device_id, collectDeviceLayoutSettings()], (nextSnapshot) => {
          render(nextSnapshot);
          closeDeviceDrawer();
          showToast('デバイスを保存しました');
        });
      });
    });
    $('deviceMetricToggles').addEventListener('click', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (!chip) return;
      chip.classList.toggle('active');
      chip.draggable = chip.classList.contains('active');
    });
    $('deviceMetricToggles').addEventListener('dragstart', (ev) => {
      const chip = ev.target.closest('.metric-chip.active');
      if (!chip) { ev.preventDefault(); return; }
      chip.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      ev.dataTransfer.setData('text/plain', chip.getAttribute('data-key') || '');
    });
    $('deviceMetricToggles').addEventListener('dragend', (ev) => {
      const chip = ev.target.closest('.metric-chip');
      if (chip) chip.classList.remove('dragging');
    });
    $('deviceMetricToggles').addEventListener('dragover', (ev) => {
      const dragging = $('deviceMetricToggles').querySelector('.metric-chip.dragging');
      const over = ev.target.closest('.metric-chip.active');
      if (!dragging || !over || dragging === over) return;
      ev.preventDefault();
      const box = over.getBoundingClientRect();
      const before = ev.clientX < box.left + box.width / 2;
      over.parentNode.insertBefore(dragging, before ? over : over.nextSibling);
    });
    $('addDeviceBtn').addEventListener('click', () => openDeviceDrawer('add'));
    $('deviceDrawerClose').addEventListener('click', closeDeviceDrawer);
    $('drawerBackdrop').addEventListener('click', closeDeviceDrawer);
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && $('deviceDrawer').classList.contains('open')) closeDeviceDrawer();
    });
    $('deleteDeviceBtn').addEventListener('click', () => {
      deleteDevice($('device_id').value);
    });
    $('dashboardForm').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const url = $('bgUrl').value.trim();
      const save = (width, height) => callServer('apiSaveDashboardSettings', [{
        imageUrl: url,
        width: width || 0,
        height: height || 0,
        refresh_interval_sec: Number($('refreshInterval').value || 60)
      }], toastRender('設定を保存しました'));
      if (!url) return save(0, 0);
      const img = new Image();
      img.onload = () => save(img.naturalWidth, img.naturalHeight);
      img.onerror = () => save(0, 0);
      img.src = url;
    });
    $('saveMapBtn').addEventListener('click', saveMapDraft);
    $('resetMapBtn').addEventListener('click', () => {
      resetMapDraft();
      state.mapAddPoint = null;
      renderMapPreview();
      renderMapAddControls();
      showToast('マップ編集を戻しました');
    });
    $('mapAddBtn').addEventListener('click', () => {
      const x = Math.max(0, Math.min(1, Number($('mapAddX').value || 0.5)));
      const y = Math.max(0, Math.min(1, Number($('mapAddY').value || 0.5)));
      addLayoutAt($('mapAddDeviceSelect').value, x, y);
    });
    $('mapClearPointBtn').addEventListener('click', () => {
      state.mapAddPoint = null;
      renderMapPreview();
      renderMapAddControls();
    });
    ['mapAddX', 'mapAddY'].forEach((id) => {
      $(id).addEventListener('input', () => {
        const x = Math.max(0, Math.min(1, Number($('mapAddX').value || 0.5)));
        const y = Math.max(0, Math.min(1, Number($('mapAddY').value || 0.5)));
        state.mapAddPoint = { x: x, y: y };
        renderMapPreview();
      });
    });
    $('mapPreview').addEventListener('pointerdown', (ev) => {
      if (ev.target.closest('.map-del') || ev.target.closest('.map-add-popover') || ev.target.closest('.map-item-editor')) return;
      const target = ev.target.closest('.map-preview-item');
      if (!target) return;
      const item = layoutById(target.getAttribute('data-item-id'));
      if (!item) return;
      ev.preventDefault();
      const resize = ev.target.closest('.map-resize');
      if (resize) {
        ev.stopPropagation();
        target.classList.add('dragging');
        target.setPointerCapture(ev.pointerId);
        const startX = ev.clientX;
        const startY = ev.clientY;
        const startW = target.offsetWidth;
        const startH = target.offsetHeight;
        let nextW = startW;
        let nextH = startH;
        const moveResize = (moveEv) => {
          nextW = Math.max(100, Math.min(360, startW + moveEv.clientX - startX));
          nextH = Math.max(54, Math.min(260, startH + moveEv.clientY - startY));
          target.style.setProperty('--card-w', Math.round(nextW) + 'px');
          target.style.height = Math.round(nextH) + 'px';
        };
        const upResize = () => {
          target.classList.remove('dragging');
          target.removeEventListener('pointermove', moveResize);
          target.removeEventListener('pointerup', upResize);
          target.removeEventListener('pointercancel', upResize);
          saveResizedLayout(item, nextW, nextH);
          state.mapSuppressClick = true;
          setTimeout(() => state.mapSuppressClick = false, 0);
        };
        target.addEventListener('pointermove', moveResize);
        target.addEventListener('pointerup', upResize);
        target.addEventListener('pointercancel', upResize);
        return;
      }
      target.classList.add('dragging');
      target.setPointerCapture(ev.pointerId);
      const box = $('mapPreview').getBoundingClientRect();
      let moved = false;
      let lastX = Number(item.x_norm || 0.5);
      let lastY = Number(item.y_norm || 0.5);
      const move = (moveEv) => {
        const x = Math.max(0, Math.min(1, (moveEv.clientX - box.left) / box.width));
        const y = Math.max(0, Math.min(1, (moveEv.clientY - box.top) / box.height));
        target.style.left = (x * 100) + '%';
        target.style.top = (y * 100) + '%';
        lastX = Number(x.toFixed(3));
        lastY = Number(y.toFixed(3));
        moved = true;
      };
      const up = (upEv) => {
        target.classList.remove('dragging');
        target.removeEventListener('pointermove', move);
        target.removeEventListener('pointerup', up);
        target.removeEventListener('pointercancel', up);
        if (moved) {
          saveDraggedLayout(item, lastX, lastY);
          state.mapSuppressClick = true;
          setTimeout(() => state.mapSuppressClick = false, 0);
        }
      };
      target.addEventListener('pointermove', move);
      target.addEventListener('pointerup', up);
      target.addEventListener('pointercancel', up);
    });
    $('mapPreview').addEventListener('input', (ev) => {
      if (!ev.target.closest('.map-item-editor')) return;
      if (ev.target.closest('#mapEditMetrics')) return;
      if (ev.target.id === 'mapEditLabel') return;
      updateMapEditorDraft();
    });
    $('mapPreview').addEventListener('change', (ev) => {
      if (!ev.target.closest('.map-item-editor')) return;
      updateMapEditorDraft({ resetMetrics: ev.target.id === 'mapEditDevice' });
    });
    $('mapPreview').addEventListener('dragstart', (ev) => {
      const chip = ev.target.closest('#mapEditMetrics .metric-chip.active');
      if (!chip) return;
      chip.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      ev.dataTransfer.setData('text/plain', chip.getAttribute('data-key') || '');
    });
    $('mapPreview').addEventListener('dragend', (ev) => {
      const chip = ev.target.closest('#mapEditMetrics .metric-chip');
      if (chip) chip.classList.remove('dragging');
      updateMapEditorDraft();
    });
    $('mapPreview').addEventListener('dragover', (ev) => {
      const dragging = $('mapPreview').querySelector('#mapEditMetrics .metric-chip.dragging');
      const over = ev.target.closest('#mapEditMetrics .metric-chip.active');
      if (!dragging || !over || dragging === over) return;
      ev.preventDefault();
      const box = over.getBoundingClientRect();
      const before = ev.clientX < box.left + box.width / 2;
      over.parentNode.insertBefore(dragging, before ? over : over.nextSibling);
    });
    $('mapPreview').addEventListener('click', (ev) => {
      if (state.mapSuppressClick) {
        ev.stopPropagation();
        return;
      }
      const editor = ev.target.closest('.map-item-editor');
      if (editor) {
        ev.stopPropagation();
        const chip = ev.target.closest('#mapEditMetrics .metric-chip');
        if (chip) {
          chip.classList.toggle('active');
          chip.draggable = chip.classList.contains('active');
          updateMapEditorDraft();
          return;
        }
        if (ev.target.closest('.map-editor-close')) {
          closeMapItemEditor();
          return;
        }
        if (ev.target.closest('.map-editor-delete')) {
          const item = selectedMapEditorItem();
          if (item && confirm('この配置を削除しますか?\n' + item.item_id)) {
            removeDraftLayout(item.item_id);
            state.mapEditorItemId = '';
            showToast('配置を削除しました');
          }
          return;
        }
        return;
      }
      const del = ev.target.closest('.map-del');
      if (del) {
        ev.stopPropagation();
        const id = del.getAttribute('data-del-id');
        if (id && confirm('この配置を削除しますか?\n' + id)) {
          removeDraftLayout(id);
          showToast('配置を削除しました');
        }
        return;
      }
      const itemNode = ev.target.closest('.map-preview-item');
      if (itemNode) {
        ev.stopPropagation();
        openMapItemEditor(itemNode.getAttribute('data-item-id'));
        return;
      }
      if (ev.target.closest('.map-add-popover')) return;
      const p = pointToNorm(ev);
      openMapAddPopover(p.x, p.y);
    });
    document.addEventListener('click', (ev) => {
      if (!ev.target.closest('.map-add-popover') && !ev.target.closest('#mapPreview')) closeMapAddPopover();
    });
    $('definitionForm').addEventListener('submit', (ev) => {
      ev.preventDefault();
      callServer('apiSaveDefinition', [collectDefinition()], toastRender('定義を保存しました'));
    });
    $('seedDefsBtn').addEventListener('click', () => {
      callServer('apiSeedKnownMetricDefinitions', [], toastRender('既知キーを追加しました'));
    });
    $('seedKeyCatalogBtn').addEventListener('click', () => {
      callServer('apiSeedKeyCatalog', [], toastRender('キーDBを更新しました'));
    });
    $('keyCatalogSearch').addEventListener('input', (ev) => {
      state.keyCatalogQuery = ev.target.value || '';
      renderKeyCatalog();
    });
    $('deleteDefBtn').addEventListener('click', () => {
      const id = $('def_id').value.trim();
      if (!id || !confirm('定義 "' + id + '" を削除しますか?')) return;
      callServer('apiDeleteDefinition', [id], toastRender('定義を削除しました'));
    });
    $('testDefBtn').addEventListener('click', () => {
      const scope = prompt('スコープ JSON', '{"temperature":25,"humidity":60}') || '';
      callServer('apiTestExpression', [$('def_expression').value, scope], (res) => {
        $('testResult').textContent = res.ok ? ('結果: ' + res.value) : ('エラー: ' + res.error);
      });
    });
    $('newDefBtn').addEventListener('click', () => {
      $('definitionForm').reset();
      $('def_type').value = 'metric';
      $('def_source').value = '*';
      $('def_enabled').checked = true;
      $('testResult').textContent = '';
    });
    $('generateExampleBtn').addEventListener('click', () => {
      callServer('apiGenerateDevicePayload', [$('exampleModel').value, $('exampleDeviceId').value], (res) => {
        $('examplePayload').value = res.json || '';
      });
    });
    $('showIngestBtn').addEventListener('click', () => {
      callServer('apiGetIngestInfo', [], (res) => {
        $('ingestInfo').innerHTML = 'スプレッドシート: <code>' + esc(res.spreadsheet_id) + '</code><br>認証: <code>' + esc(res.endpoint_auth) + '</code>';
      });
    });
    $('testIngestBtn').addEventListener('click', () => {
      callServer('apiTestIngest', [], (res) => {
        $('ingestInfo').innerHTML = '<code>' + esc(JSON.stringify(res)) + '</code>';
        load();
      });
    });

    function setStatus(text, isError) {
      $('status').textContent = text || '';
      $('status').className = 'status' + (isError ? ' error' : '');
    }

    function tickClock() {
      const d = new Date();
      $('clkTime').textContent = d.toLocaleTimeString('ja-JP');
      $('clkDate').textContent = d.toLocaleDateString('ja-JP', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function applyTheme(theme) {
      const light = theme === 'light';
      document.body.classList.toggle('theme-light', light);
      $('themeIco').innerHTML = light
        ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>'
        : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
    }
    function esc(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }
    function jsonAttr(v) {
      return esc(JSON.stringify(v));
    }
    function attrEscape(v) {
      return String(v == null ? '' : v).replace(/\\/g, '\\\\').replace(/'/g, '\\\'').replace(/\n/g, '');
    }
    function shortDate(v) {
      if (!v) return '';
      const d = new Date(v);
      return isNaN(d.getTime()) ? v : d.toLocaleString('ja-JP');
    }

    cleanupLocalStorage('iotData.', DATA_ALLOWED_STORAGE_KEYS, DATA_CACHE_MAX_AGE_MS);
    initText();
    if (getStored(DATA_MENU_KEY, '0') === '1') document.body.classList.add('menu-collapsed');
    applyTheme(getStored(DATA_THEME_KEY, 'dark'));
    tickClock();
    setInterval(tickClock, 1000);
    applyCachedSnapshot();
    load();
  </script>
</body>
</html>
